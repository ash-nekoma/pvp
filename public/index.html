<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick N' Trade | VIP Games Test</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* ================= BASE STYLES ================= */
        :root {
            --ps-bg: #000814; --ps-glow: #00a2ff;
            --glass-bg: rgba(0, 10, 25, 0.75); --glass-border: rgba(255, 255, 255, 0.15);
            --danger: #ff3366; --success: #00e676; --credits: #ffb400; --playable: #b366ff;
            --table-green: #006400; --table-dark: #002200; --table-wood: #3d2314;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #000a1f 0%, #001f4d 50%, #000000 100%); color: #f8fafc; height: 100vh; width: 100vw; overflow: hidden; }
        button { cursor: pointer; } button i { pointer-events: none; }
        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }

        /* ================= QUICK UI COMPONENTS ================= */
        .btn-play { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); padding: 12px 15px; border-radius: 8px; font-size: 1rem; font-weight: 900; text-transform: uppercase; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-play:hover:not(:disabled) { background: white; color: black; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,255,255,0.2); }
        .btn-play:disabled { background: rgba(0,0,0,0.5) !important; color: gray !important; cursor: not-allowed !important; border-color: transparent !important; transform: none !important; }
        .input-control { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; border-radius: 8px; font-size: 1rem; font-weight: 600; text-align: center; }
        .input-control:focus { border-color: var(--ps-glow); }
        
        .topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 999; background: rgba(0, 5, 15, 0.95); border-bottom: 1px solid var(--glass-border); padding: 12px 25px; height: 75px; display: flex; align-items: center; justify-content: space-between; }
        .brand-title { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; color: white; text-shadow: 0 0 10px rgba(0, 162, 255, 0.5); }
        .topbar-right { display: flex; gap: 15px; align-items: center; font-weight: 800; font-size: 1.1rem; }
        
        .main-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 75px); margin-top: 75px; width: 100vw; position: relative; }
        .view-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .btn-back-fixed { position: fixed; top: 95px; left: 25px; z-index: 1000; background: rgba(0,0,0,0.8); border: 1px solid var(--glass-border); color: white; padding: 10px 20px; border-radius: 8px; font-weight: 800; }

        /* LOBBY CARDS */
        .lobby-modes-container { display: flex; gap: 40px; }
        .game-card { width: 300px; height: 350px; background: #020813; border: 1px solid var(--glass-border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .game-card:hover { transform: translateY(-8px); border-color: var(--ps-glow); box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(0,162,255,0.2); }
        .game-card i { font-size: 5rem; color: var(--ps-glow); margin-bottom: 20px; }
        .game-card h3 { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }

        /* OVERLAYS & FLASHES */
        .local-flash { position: absolute; bottom: 25px; right: 25px; z-index: 2500; color: var(--danger); font-size: 1.1rem; font-weight: 900; text-transform: uppercase; opacity: 0; display: none; text-shadow: 0 2px 10px rgba(0,0,0,0.8), 0 0 15px var(--danger); }
        .local-flash.show { display: block; animation: flashAnim 2.5s forwards; }
        .local-flash.success { color: var(--success); text-shadow: 0 2px 10px rgba(0,0,0,0.8), 0 0 15px var(--success); }
        @keyframes flashAnim { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-10px); } }

        /* ================= VIP BLACKJACK (Absolute Fixed Coordinates) ================= */
        .mbj-board {
            width: 1000px;
            height: 550px;
            background: #050505;
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            overflow: hidden; /* Clips the table curve perfectly */
        }

        .mbj-table-surface {
            position: absolute;
            top: -200px;
            left: -100px;
            width: 1200px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 100%, var(--table-green), var(--table-dark));
            border: 15px solid var(--table-wood);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            pointer-events: none; /* Let clicks pass through to absolute seats */
        }

        .mbj-text { position: absolute; top: 200px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; width: 100%; }
        .mbj-text h1 { font-size: 3rem; color: rgba(255,255,255,0.3); letter-spacing: 5px; margin-bottom: 5px; }
        .mbj-text p { font-size: 0.85rem; color: rgba(255,255,255,0.2); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }

        .mbj-dealer-area { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .mbj-shoe { position: absolute; top: 20px; right: 80px; width: 50px; height: 75px; background: repeating-linear-gradient(45deg, #111, #111 10px, #222 10px, #222 20px); border: 2px solid #555; border-radius: 6px; box-shadow: -5px 10px 20px rgba(0,0,0,0.8); }

        /* ABSOLUTE SEAT ANCHORS (They will never shift) */
        .mbj-seat-anchor {
            position: absolute;
            width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        
        /* Calculated precise arc coordinates */
        #mbj-anchor-1 { top: 320px; left: 80px; }
        #mbj-anchor-2 { top: 380px; left: 260px; }
        #mbj-anchor-3 { top: 400px; left: 450px; } /* Dead center (1000/2 - 50) */
        #mbj-anchor-4 { top: 380px; left: 640px; }
        #mbj-anchor-5 { top: 320px; left: 820px; }

        .mbj-seat-circle { width: 60px; height: 60px; border: 2px dashed rgba(255,255,255,0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.3); z-index: 5;}
        .mbj-seat-circle:hover { border-color: white; background: rgba(255,255,255,0.2); }
        .mbj-seat-circle.occupied { border: 2px solid rgba(255,255,255,0.9); background: transparent; cursor: default; }
        .mbj-seat-anchor.active-turn .mbj-seat-circle { border-color: var(--ps-glow); box-shadow: 0 0 20px var(--ps-glow); background: rgba(0, 162, 255, 0.2); }

        /* Cards flow upwards from the seat */
        .mbj-hand-cards { position: absolute; bottom: 70px; display: flex; justify-content: center; width: 100px; height: 65px; pointer-events: none; }
        .mbj-card { width: 45px; height: 65px; background: white; color: black; border-radius: 4px; border: 1px solid #ccc; box-shadow: 2px 5px 15px rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; position: absolute; bottom: 0; }
        .mbj-card .val { font-size: 1.2rem; line-height: 1;}
        .mbj-card .suit { font-size: 1.4rem; line-height: 1; }
        .card-red { color: #e60000; }
        
        .mbj-status { position: absolute; top: -20px; background: var(--ps-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; border: 1px solid var(--glass-border); white-space: nowrap; z-index: 15; pointer-events: none; }

        /* Action Buttons (Floating Bottom Right) */
        .mbj-controls-right { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 20; }
        .mbj-action-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); color: white; font-size: 0.8rem; font-weight: 900; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.8); text-transform: uppercase; line-height: 1.2; }
        .mbj-action-circle:hover { transform: scale(1.1); border-color: white; }
        .mbj-action-circle.hit { background: radial-gradient(circle, #00e676, #008040); color: black; border: none; }
        .mbj-action-circle.stand { background: radial-gradient(circle, #ff3366, #99002b); color: white; border: none; }
        .mbj-action-circle.double { background: radial-gradient(circle, #ffcc00, #997a00); color: black; border: none; }
        .mbj-action-circle.split { background: radial-gradient(circle, #b366ff, #5900b3); color: black; border: none; }

        /* Bet Controls (Floating Bottom Left) */
        .mbj-controls-left { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 20; align-items: center; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--glass-border); }

        .mbj-timer-display { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--glass-border); color: white; font-weight: 900; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; font-family: 'Rajdhani', monospace; z-index: 20; }
        .mbj-timer-display.closing { color: var(--danger); border-color: var(--danger); animation: pulseRed 1s infinite; }

        /* ================= RETRO HORSE DERBY ================= */
        .hr-board { width: 100%; max-width: 900px; background: #111; border: 4px solid #333; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .hr-track { width: 100%; height: 350px; background: #222; border: 2px solid #555; position: relative; display: flex; flex-direction: column; justify-content: space-evenly; overflow: hidden; }
        
        .hr-lane { width: 100%; height: 50px; border-bottom: 2px dashed #444; position: relative; display: flex; align-items: center; }
        .hr-horse-group { position: absolute; left: 0; display: flex; align-items: center; gap: 10px; transition: left 0.05s linear; z-index: 10; }
        .hr-badge { width: 24px; height: 24px; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-weight: 900; color: white; font-size: 0.8rem; font-family: 'Press Start 2P', monospace; }
        .hr-sprite { font-size: 2.5rem; transform: scaleX(-1); }
        
        .retro-gallop { animation: retroBounce 0.25s infinite; }
        @keyframes retroBounce { 0%, 100% { transform: scaleX(-1) translateY(0); } 50% { transform: scaleX(-1) translateY(-6px) rotate(5deg); } }

        .hr-finish-line { position: absolute; right: -50px; top: 0; bottom: 0; width: 20px; background: repeating-linear-gradient(to bottom, #fff, #fff 20px, #000 20px, #000 40px); z-index: 5; border-left: 4px solid white; transition: right 2s cubic-bezier(0.1, 0.7, 0.1, 1); }
        
        .hr-controls { display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .hr-bet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .hr-bet-btn { background: #1a1a1a; border: 2px solid #444; color: white; padding: 15px 10px; font-family: 'Press Start 2P', monospace; font-size: 0.7rem; border-radius: 6px; cursor: pointer; transition: 0.2s; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .hr-bet-btn:hover:not(:disabled) { transform: translateY(-3px); border-color: white; }
        .hr-bet-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .hr-odds-text { color: var(--success); font-size: 0.9rem; margin-top: 5px; }
        .hr-my-bet-text { color: var(--credits); font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1rem; }

        .hr-ticker { text-align: center; color: var(--credits); font-family: 'Press Start 2P', monospace; font-size: 1rem; text-shadow: 0 0 10px var(--credits); margin-bottom: 5px; }
    </style>
</head>
<body>

  <div id="auth-container">
      <div class="auth-box">
          <div class="auth-title">STICK N' TRADE</div>
          <div class="auth-sub">VIP TEST BUILD</div>
          <div id="auth-form-login">
              <div class="input-group" style="margin-bottom:20px;">
                  <input type="text" id="login-user" class="input-control" placeholder="Username">
              </div>
              <div class="input-group" style="margin-bottom:15px;">
                  <div class="pwd-input-wrapper">
                      <input type="password" id="login-pass" class="input-control" placeholder="Password">
                  </div>
              </div>
              <div id="auth-error-login" class="auth-msg auth-error"></div>
              <button class="btn-play" style="width:100%;" onclick="submitAuth('login')">LOGIN TO CASINO</button>
          </div>
      </div>
  </div>

  <div id="app-container">
      
      <header class="topbar">
          <div class="brand-title">STICK N' TRADE</div>
          <div class="topbar-right">
              <div style="color:var(--credits);"><span id="nav-credits">0</span> TC</div>
          </div>
      </header>

      <div class="main-wrapper">
        <button class="btn-back-fixed hidden" id="global-back-btn" onclick="backToHub()">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> BACK TO LOBBY
        </button>
        
        <div class="content">
          
          <div id="view-casino" class="view-container">
            <h1 class="header-title">SELECT TABLE</h1>
            <div class="lobby-modes-container">
                <div class="game-card" onclick="openGame('mbj')">
                    <i class="fas fa-coins" style="font-size: 5rem; color: white; margin-top: 30px;"></i>
                    <div class="game-info" style="margin-top: auto;">
                        <div class="game-title">VIP BLACKJACK</div>
                        <div class="game-desc">Premium Absolute Layout</div>
                    </div>
                </div>
                <div class="game-card" onclick="openGame('horserace')">
                    <i class="fas fa-horse-head" style="font-size: 5rem; color: var(--danger); margin-top: 30px;"></i>
                    <div class="game-info" style="margin-top: auto;">
                        <div class="game-title">RETRO DERBY</div>
                        <div class="game-desc">Dynamic Shuffling Odds</div>
                    </div>
                </div>
            </div>
          </div>

          <div id="view-mbj" class="view-container hidden">
              <div class="mbj-board">
                  
                  <div class="mbj-table-surface"></div>
                  
                  <div class="mbj-text">
                      <h1>BLACKJACK</h1>
                      <p>BLACKJACK PAYS 3 TO 2<br>DEALER MUST DRAW TO 16 AND STAND ON ALL 17s</p>
                  </div>

                  <div class="mbj-dealer-area">
                      <div style="color:white; font-weight:900; background:rgba(0,0,0,0.7); padding:4px 15px; border-radius:50px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.2); font-size: 0.8rem; z-index: 15;">DEALER <span id="mbj-d-score-val" style="color:var(--danger); margin-left: 5px;">0</span></div>
                      <div id="mbj-fs-dealer-hand" style="display:flex; gap:5px; height:65px; z-index:10; position:relative;"></div>
                  </div>
                  <div class="mbj-shoe"></div>

                  <div class="mbj-timer-display" id="mbj-timer-box">
                      <i class="fas fa-clock"></i> <span id="mbj-timer">15</span>
                  </div>

                  <div id="mbj-seats-container">
                      </div>

                  <div class="mbj-controls-left">
                      <button class="btn-play" onclick="socket.emit('mbjLeaveSeat');" style="background: rgba(255,51,102,0.2); border-color: var(--danger); padding: 10px; font-size: 0.8rem;">CLEAR / STAND</button>
                      <div style="width: 150px;">
                          <input type="number" id="mbj-bet-input" class="input-control bet-input" placeholder="Bet Amount">
                      </div>
                  </div>

                  <div class="mbj-controls-right" id="mbj-action-panel" style="display:none;">
                      <button class="mbj-action-circle double" id="btn-mbj-double" onclick="socket.emit('mbjAction', {type:'double'})" style="display:none;">x2</button>
                      <button class="mbj-action-circle split" id="btn-mbj-split" onclick="socket.emit('mbjAction', {type:'split'})" style="display:none;">SPLIT</button>
                      <button class="mbj-action-circle stand" onclick="socket.emit('mbjAction', {type:'stand'})">STAND</button>
                      <button class="mbj-action-circle hit" onclick="socket.emit('mbjAction', {type:'hit'})">HIT</button>
                  </div>

                  <div id="flash-mbj" class="local-flash"></div> 
              </div>
          </div>

          <div id="view-horserace" class="view-container hidden">
              <div class="hr-board">
                  <div class="hr-ticker" id="hr-ticker">WAITING FOR NEXT RACE...</div>
                  
                  <div class="hr-track">
                      <div class="hr-finish-line" id="hr-finish-line"></div>
                      <div id="hr-lanes-container"></div>
                  </div>

                  <div class="hr-controls">
                      <div style="display:flex; gap:15px; align-items:center;">
                          <div class="timer-box" id="hr-timer-box" style="margin:0;"><i class="fas fa-clock"></i> <span id="hr-timer">40</span></div>
                          <input type="number" id="hr-bet-input" class="input-control bet-input" placeholder="Bet Amount" style="width:150px;">
                      </div>
                      <div style="text-align:right; font-weight:900; color:white; font-size:1.2rem;">TOTAL BET: <span id="hr-my-bet" style="color:var(--credits)">0 TC</span></div>
                  </div>

                  <div class="hr-bet-grid" id="hr-bet-grid"></div>

                  <div id="flash-horserace" class="local-flash" style="bottom: 5px;"></div> 
              </div>
          </div>

        </div> 
      </div>
  </div>

  <script>
    const socket = io(); 
    let myUsername = '', myCredits = 0;
    let activeGame = null;
    
    // States
    let mbjGameState = 'BETTING';
    let hrState = { time: 40, status: 'BETTING', currentOdds: {} };
    let mySBets = {};

    function submitAuth(mode) { 
        const user = document.getElementById('login-user').value.trim(); 
        const pass = document.getElementById('login-pass').value; 
        if(!user || !pass) return document.getElementById('auth-error-login').innerText = "Please fill all fields."; 
        socket.emit('login', { username: user, password: pass }); 
    }
    
    socket.on('loginSuccess', (data) => { 
        myUsername = data.username; 
        myCredits = data.credits; 
        document.getElementById('nav-credits').innerText = myCredits.toLocaleString(); 
        document.getElementById('auth-container').style.display = 'none'; 
        document.getElementById('app-container').style.display = 'block'; 
        switchView('casino'); 
    });
    
    socket.on('balanceUpdateData', (data) => {
        myCredits = data.credits;
        document.getElementById('nav-credits').innerText = myCredits.toLocaleString();
    });

    socket.on('localGameError', (data) => {
        let f = document.getElementById('flash-' + data.game);
        if(f) {
            f.innerText = data.msg;
            f.classList.remove('show', 'success', 'error');
            void f.offsetWidth;
            f.classList.add('show', 'error');
            setTimeout(() => f.classList.remove('show'), 2500);
        }
    });

    function switchView(viewId) { 
        document.querySelectorAll('.view-container').forEach(d => d.classList.add('hidden')); 
        let v = document.getElementById('view-' + viewId); 
        if (v) v.classList.remove('hidden'); 
        
        let backBtn = document.getElementById('global-back-btn'); 
        if (viewId === 'casino') { 
            backBtn.classList.add('hidden'); 
        } else { 
            backBtn.classList.remove('hidden'); 
        } 
    }

    function backToHub() {
        if(activeGame === 'mbj') socket.emit('mbjLeaveSeat');
        if(activeGame === 'horserace' && hrState.status === 'BETTING' && Object.keys(mySBets).length > 0) {
            let f = document.getElementById('flash-horserace');
            if(f) { f.innerText = "Wait for race to finish!"; f.classList.add('show'); setTimeout(() => f.classList.remove('show'), 2500); }
            return;
        }
        if(activeGame) socket.emit('leaveRoom', activeGame);
        activeGame = null;
        switchView('casino');
    }

    function openGame(id) {
        activeGame = id;
        socket.emit('joinRoom', id);
        if (id === 'mbj') {
            renderMBJSeats({ 1:null, 2:null, 3:null, 4:null, 5:null });
            switchView('mbj');
        } else if (id === 'horserace') {
            setupDerbyUI();
            switchView('horserace');
        }
    }

    // =========================================================================
    // VIP BLACKJACK LOGIC (Absolute Anchors)
    // =========================================================================
    let currentMBJSeats = { 1:null, 2:null, 3:null, 4:null, 5:null };
    
    function renderMBJSeats(seats, activeTurnObj = null, turnTime = 0) {
        currentMBJSeats = seats; 
        let cont = document.getElementById('mbj-seats-container'); 
        if(!cont) return; 
        cont.innerHTML = '';
        
        for(let i=1; i<=5; i++) {
            let s = seats[i]; 
            let isMe = s && s.username === myUsername; 
            let isMySeatTurn = activeTurnObj && activeTurnObj.seat == i;
            let boxClass = `mbj-seat-circle ${s ? 'occupied' : ''}`;
            
            let clickAction = `socket.emit('mbjTakeSeat', ${i})`;
            if (s && !isMe && mbjGameState === 'BETTING') clickAction = `placeMBJBetBehind(${i})`;

            // Note: the wrapper has the specific anchor ID which controls absolute CSS position
            let html = `<div class="mbj-seat-anchor ${isMySeatTurn ? 'active-turn' : ''}" id="mbj-anchor-${i}">`;
            
            // Cards flow upwards from the seat circle
            html += `<div class="mbj-hand-cards">`;
            if (s && s.hands && s.hands.length > 0) {
                s.hands.forEach((hand, hIdx) => {
                    hand.cards.forEach((c, cIdx) => { 
                        let offset = (hIdx * 40) + (cIdx * 15); // Spread split hands horizontally
                        html += `<div class="mbj-card" style="left: ${offset}px;"><div class="val">${c.raw}</div><div class="suit">${c.suitHtml}</div></div>`; 
                    });
                    if(hand.status && hand.status !== 'WAITING' && hand.status !== 'PLAYING') {
                        let stColor = hand.status === 'BUST' ? 'var(--danger)' : (hand.status === 'BLACKJACK' ? 'var(--credits)' : 'white');
                        html += `<div class="mbj-status" style="left: ${hIdx * 40}px; color:${stColor}; border-color:${stColor};">${hand.status}</div>`;
                    }
                });
            }
            html += `</div>`;

            // Seat Circle
            html += `<div class="${boxClass}" onclick="${clickAction}">`;
            if (s) {
                let totalSeatBet = s.hands && s.hands.length > 0 ? s.hands.reduce((sum, h)=>sum+h.bet, 0) : s.bet || 0;
                let sScore = s.hands && s.hands.length > 0 ? s.hands[0].score : '';
                html += `<div style="font-weight:900; font-size:1.5rem; color:white;">${sScore}</div>`;
                html += `</div>`; // close circle

                // Text flows downwards below the circle
                html += `<div style="text-align: center; margin-top: 5px;">`;
                html += `<div style="font-weight: 900; color: ${isMe ? 'var(--ps-glow)' : 'white'}; font-size: 0.9rem; text-transform: uppercase; white-space:nowrap;">${s.username}</div>`;
                html += `<div style="color: var(--credits); font-weight: 800; font-size: 0.8rem; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; margin-top: 2px; border:1px solid var(--glass-border);">${totalSeatBet > 0 ? totalSeatBet + ' TC' : 'WAITING'}</div>`;
                html += `</div>`;
                
                if(isMe && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0) && mbjGameState === 'BETTING') {
                    html += `<button class="btn-play" onclick="event.stopPropagation(); placeMBJBet()" style="margin-top:10px; padding:6px 15px; font-size:0.8rem; background:var(--success); color:black; border:none; z-index:10;">BET</button>`;
                }
            } else { 
                html += `<i class="fas fa-plus" style="font-size:1.2rem; opacity:0.5; color: white;"></i></div>`; 
                html += `<div style="color:var(--text-muted); font-weight:800; font-size:0.7rem; margin-top: 5px; text-transform: uppercase;">Empty</div>`;
            }
            html += `</div>`; 
            cont.innerHTML += html;
        }
    }

    function placeMBJBet() { 
        let i = document.getElementById('mbj-bet-input'); 
        let a = parseFloat(i.value); 
        if (isNaN(a) || a < 10) return; 
        socket.emit('mbjPlaceBet', a); 
    }

    socket.on('mbjUpdate', async (data) => {
        if(activeGame !== 'mbj') return;
        
        if(data.event === 'timer') {
            mbjGameState = 'BETTING'; 
            let r = document.getElementById('mbj-timer-box'), s = document.getElementById('mbj-timer'); 
            if (s) s.innerText = data.time; 
            if (data.time <= 5 && r) r.classList.add('closing'); else if(r) r.classList.remove('closing');
        } 
        else if (data.event === 'sync_seats') {
            renderMBJSeats(data.seats, data.activeTurn, data.time);
        } 
        else if (data.event === 'lock_bets') {
            mbjGameState = 'DEALING'; 
            let r = document.getElementById('mbj-timer-box'); 
            if (r) { r.classList.remove('closing'); r.style.color = 'var(--danger)'; r.style.borderColor = 'var(--danger)'; } 
            let s = document.getElementById('mbj-timer'); if (s) s.innerText = '0'; 
        } 
        else if (data.event === 'deal') {
            renderMBJSeats(data.seats); 
            let dHand = document.getElementById('mbj-fs-dealer-hand');
            if(dHand) { 
                dHand.innerHTML = ''; 
                const dealInit = async () => {
                    for(let i=0; i<data.dealerHand.length; i++) {
                        let c = data.dealerHand[i];
                        let isHidden = c.raw === '?'; 
                        let hClass = isHidden ? 'card-back' : ''; 
                        let cHtml = isHidden ? '?' : `<div class="val">${c.raw}</div><div class="suit">${c.suitHtml}</div>`; 
                        dHand.innerHTML += `<div class="mbj-card anim-slide-deal ${hClass}" style="position:relative;">${cHtml}</div>`; 
                        await delay(800);
                    }
                };
                dealInit();
            } 
        } 
        else if (data.event === 'turn') {
            mbjGameState = 'PLAYER_TURN'; 
            renderMBJSeats(data.seats, data.activeTurn, data.time);
            
            let s = data.seats[data.activeTurn.seat]; 
            let ap = document.getElementById('mbj-action-panel'); 
            let dBtn = document.getElementById('btn-mbj-double'); 
            let spBtn = document.getElementById('btn-mbj-split');
            
            if (ap) {
                if (s && s.username === myUsername) {
                    ap.style.display = 'flex'; 
                    let activeHand = s.hands[data.activeTurn.handIdx];
                    if (activeHand && activeHand.cards.length === 2) { 
                        dBtn.style.display = 'flex'; 
                        if (activeHand.cards[0].raw === activeHand.cards[1].raw) spBtn.style.display = 'flex'; 
                        else spBtn.style.display = 'none'; 
                    } else { dBtn.style.display = 'none'; spBtn.style.display = 'none'; }
                } else { ap.style.display = 'none'; }
            }
        } 
        else if (data.event === 'dealer_resolved') {
            mbjGameState = 'RESOLVING'; 
            let ap = document.getElementById('mbj-action-panel'); 
            if(ap) ap.style.display = 'none'; 
            renderMBJSeats(data.seats);
            
            let dHand = document.getElementById('mbj-fs-dealer-hand'); 
            let dScore = document.getElementById('mbj-d-score-val');
            
            if(dHand) {
                dHand.innerHTML = `<div class="mbj-card" style="position:relative;"><div class="val">${data.dealerHand[0].raw}</div><div class="suit">${data.dealerHand[0].suitHtml}</div></div>`;
                let revealCard = data.dealerHand[1]; 
                dHand.innerHTML += `<div class="mbj-card anim-flip" style="position:relative;"><div class="val">${revealCard.raw}</div><div class="suit">${revealCard.suitHtml}</div></div>`; 
                
                const drawRemaining = async () => {
                    for(let i=2; i<data.dealerHand.length; i++) { 
                        await delay(800); 
                        let c = data.dealerHand[i]; 
                        dHand.innerHTML += `<div class="mbj-card anim-slide-deal" style="position:relative;"><div class="val">${c.raw}</div><div class="suit">${c.suitHtml}</div></div>`; 
                    }
                    await delay(500); 
                    if(dScore) dScore.innerText = data.dealerScore;
                }; 
                drawRemaining();
            }
        } 
        else if (data.event === 'new_round') {
            mbjGameState = 'BETTING'; 
            let r = document.getElementById('mbj-timer-box'); 
            if (r) { r.style.color = 'white'; r.style.borderColor = 'var(--glass-border)'; } 
            let dHand = document.getElementById('mbj-fs-dealer-hand'); 
            let dScore = document.getElementById('mbj-d-score-val'); 
            if(dHand) dHand.innerHTML = ''; 
            if(dScore) dScore.innerText = '0'; 
            renderMBJSeats(data.seats); 
            let ap = document.getElementById('mbj-action-panel'); 
            if(ap) ap.style.display = 'none';
        }
    });

    // =========================================================================
    // RETRO HORSE DERBY LOGIC
    // =========================================================================
    const hexColors = {'Red':'#ff3366', 'Blue':'#00a2ff', 'Green':'#00e676', 'Yellow':'#ffcc00', 'Purple':'#b366ff', 'Orange':'#ff8800'};
    
    function setupDerbyUI() {
        let container = document.getElementById('hr-lanes-container');
        if(!container) return;
        
        let trackHTML = '';
        ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach((c, idx) => {
            trackHTML += `
            <div class="hr-lane">
                <div id="horse-${c}" class="hr-horse-group">
                    <div class="hr-badge" style="background:${hexColors[c]};">${idx+1}</div>
                    <div class="hr-sprite" id="sprite-${c}">🏇</div>
                </div>
            </div>`;
        });
        container.innerHTML = trackHTML;
        
        let bg = document.getElementById('hr-bet-grid');
        if(bg) {
            bg.innerHTML = '';
            ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach((c) => {
                let oText = hrState.currentOdds && hrState.currentOdds[c] ? hrState.currentOdds[c] + 'x' : '?x';
                bg.innerHTML += `<button class="hr-bet-btn" data-choice="${c}" style="border-bottom-color:${hexColors[c]};" onclick="placeHRBet('${c}')">${c}<span class="hr-odds-text" id="odds-${c}">${oText}</span><div class="tile-bet-badge" id="badge-${c}">0</div></button>`;
            });
        }
        let fLineEl = document.getElementById('hr-finish-line');
        if(fLineEl) fLineEl.style.right = '-50px'; 
    }

    function placeHRBet(c) {
        if(hrState.status !== 'BETTING') return;
        let i = document.getElementById('hr-bet-input');
        let a = parseFloat(i.value);
        if(isNaN(a) || a < 10) return;
        socket.emit('placeSharedBet', { room: 'horserace', choice: c, amount: a });
    }

    socket.on('sharedBetConfirmed', (data) => {
        if (data.room !== activeGame) return;
        let c = data.choice;
        if (!mySBets[c]) mySBets[c] = 0;
        mySBets[c] += data.amount;
        
        let tot = Object.values(mySBets).reduce((sum, val) => sum + val, 0);
        let mb = document.getElementById('hr-my-bet');
        if (mb) mb.innerHTML = `${tot} TC`;

        let badge = document.getElementById('badge-' + c);
        if (badge) { badge.innerText = mySBets[c]; badge.style.display = 'block'; }
    });

    socket.on('hrTimerUpdate', (data) => {
        hrState.time = data.time;
        if (data.odds) hrState.currentOdds = data.odds;
        if(activeGame === 'horserace' && hrState.status === 'BETTING') {
            let s = document.getElementById('hr-timer');
            if(s) s.innerText = data.time;
            
            // Update explicit odds on buttons dynamically
            ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach(c => {
                let el = document.getElementById('odds-' + c);
                if(el && hrState.currentOdds[c]) el.innerText = hrState.currentOdds[c] + 'x';
            });
        }
    });

    socket.on('hrLockBets', () => {
        if(activeGame !== 'horserace') return;
        hrState.status = 'RACING';
        document.getElementById('hr-ticker').innerText = "AND THEY'RE OFF!";
        document.querySelectorAll('.hr-bet-btn').forEach(b => b.disabled = true);
    });

    let hrRaceInterval;
    socket.on('hrRaceStart', (data) => {
        if(activeGame !== 'horserace') return;
        
        const horses = ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'];
        let pos = { Red: 0, Blue: 0, Green: 0, Yellow: 0, Purple: 0, Orange: 0 };
        let targetPos = { Red: 0, Blue: 0, Green: 0, Yellow: 0, Purple: 0, Orange: 0 };

        let duration = data.duration; 
        let startTime = Date.now();
        let finishLineX = 85; 

        let fLineEl = document.getElementById('hr-finish-line');
        if(fLineEl) fLineEl.style.right = '-50px'; 

        if(hrRaceInterval) clearInterval(hrRaceInterval);

        horses.forEach(h => {
            let el = document.getElementById('horse-' + h);
            if(el) el.style.left = '0%';
            let sprite = document.getElementById('sprite-' + h);
            if(sprite) {
                sprite.classList.add('retro-gallop');
                sprite.style.animationDuration = (0.2 + Math.random() * 0.1) + 's';
            }
            pos[h] = 0; targetPos[h] = 0; 
        });

        let nextTargetUpdate = startTime + 1000;

        hrRaceInterval = setInterval(() => {
            let now = Date.now();
            let elapsed = now - startTime;
            let timeRemaining = duration - elapsed;

            if (now > nextTargetUpdate && timeRemaining > 4000) {
                horses.forEach(h => { targetPos[h] = pos[h] + (Math.random() * 15 + 2); });
                nextTargetUpdate = now + 1000 + Math.random() * 1000;
            }

            if (timeRemaining <= 4000) {
                if (fLineEl) fLineEl.style.right = '10%'; 
                horses.forEach(h => {
                    if (h === data.winner) { targetPos[h] = 100; } 
                    else { targetPos[h] = finishLineX - (Math.random() * 20 + 2); }
                });
            }

            if(elapsed >= duration) {
                clearInterval(hrRaceInterval);
                horses.forEach(h => {
                    let sprite = document.getElementById('sprite-' + h);
                    if(sprite) sprite.classList.remove('retro-gallop');
                    let el = document.getElementById('horse-' + h);
                    if(el) el.style.left = (h === data.winner ? 100 : Math.min(pos[h], finishLineX - 2)) + '%';
                });
                return;
            }

            horses.forEach(h => {
                let currentSpeed = (h === data.winner && timeRemaining <= 4000) ? 0.08 : 0.02;
                pos[h] += (targetPos[h] - pos[h]) * currentSpeed;
                let el = document.getElementById('horse-' + h);
                if(el) el.style.left = Math.max(0, Math.min(pos[h], 100)) + '%';
            });
        }, 30); 
    });

    socket.on('hrRaceResults', (data) => {
        if(activeGame !== 'horserace') return;
        let w = data.winner;
        let msg = `${w.toUpperCase()} WINS!`;
        document.getElementById('hr-ticker').innerText = msg;
        document.getElementById('hr-ticker').style.color = hexColors[w];
    });

    socket.on('hrNewRound', (data) => {
        if(activeGame === 'horserace') {
            hrState.status = 'BETTING'; hrState.time = 40;
            if (data && data.odds) hrState.currentOdds = data.odds;
            
            document.getElementById('hr-ticker').innerText = "WAITING FOR NEXT RACE...";
            document.getElementById('hr-ticker').style.color = "var(--credits)";
            
            setupDerbyUI();
            mySBets = {};
            let m = document.getElementById('hr-my-bet'); 
            if (m) m.innerHTML = '0 TC'; 
            document.querySelectorAll('.hr-bet-btn').forEach(b => b.disabled = false);
        }
    });

  </script>
</body>
</html>
