<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIP Blackjack Simulator</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #login-screen { text-align: center; }
        #login-screen input { padding: 10px; font-size: 1.2rem; text-align: center; }
        #login-screen button { padding: 10px 20px; font-size: 1.2rem; cursor: pointer; }

        #game-screen { display: none; width: 1000px; height: 700px; background: radial-gradient(circle, #0f5132 0%, #062c19 100%); border-radius: 200px / 100px; border: 15px solid #3e2723; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; }
        
        .dealer-area { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .hand { display: flex; gap: 5px; min-height: 100px; margin-top: 10px;}
        .card { width: 70px; height: 100px; background: white; color: black; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; border: 1px solid #ccc; }
        .card-red { color: red; }
        .card-hidden { background: #001f4d; color: transparent; border: 2px solid white; }
        
        #timer-display { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); font-size: 3rem; font-weight: bold; opacity: 0.5; pointer-events: none; }
        #status-display { position: absolute; top: 200px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-weight: bold; color: #ffb400; text-transform: uppercase; }

        .seats-container { position: absolute; bottom: 40px; width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0 40px; }
        .seat { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-height: 200px; position: relative; }
        .seat-circle { width: 60px; height: 60px; border: 2px dashed rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .seat-circle:hover { background: rgba(255,255,255,0.1); }
        .seat.occupied .seat-circle { border: 2px solid #ffb400; cursor: default; background: rgba(0,0,0,0.5); }
        .seat.active-turn .seat-circle { border-color: #00e676; box-shadow: 0 0 15px #00e676; }
        
        .seat-name { margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
        .seat-bet { color: #ffb400; font-weight: bold; }
        .seat-score { background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 10px; margin-bottom: 5px; font-size: 0.9rem; }
        
        #controls { margin-top: 20px; display: flex; gap: 10px; height: 50px; }
        #controls button { padding: 10px 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; text-transform: uppercase; display: none; }
        #controls input { padding: 10px; font-size: 1.2rem; text-align: center; width: 150px; display: none; }
        
        #btn-sit { background: #00a2ff; color: white; display: none; }
        #btn-leave { background: #ff3366; color: white; display: none; }
        #btn-bet { background: #ffb400; color: black; display: none; }
        #btn-hit { background: #00e676; color: black; display: none; }
        #btn-stand { background: #ff3366; color: white; display: none; }
        #btn-double { background: #ffb400; color: black; display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Enter Sandbox</h2>
        <input type="text" id="username" placeholder="Enter a fake name">
        <button onclick="joinSandbox()">JOIN TABLE</button>
    </div>

    <div id="game-screen">
        <div class="dealer-area">
            <div id="dealer-score" class="seat-score" style="display:none;">0</div>
            <div id="dealer-hand" class="hand"></div>
        </div>
        
        <div id="timer-display">15</div>
        <div id="status-display">WAITING FOR BETS</div>

        <div class="seats-container" id="seats-container">
            </div>
    </div>

    <div id="controls">
        <button id="btn-leave" onclick="leaveSeat()">Leave Seat</button>
        <input type="number" id="bet-input" placeholder="Bet Amount">
        <button id="btn-bet" onclick="placeBet()">Place Bet</button>
        <button id="btn-hit" onclick="sendAction('hit')">Hit</button>
        <button id="btn-stand" onclick="sendAction('stand')">Stand</button>
        <button id="btn-double" onclick="sendAction('double')">Double</button>
    </div>

    <script>
        const socket = io();
        let myName = '';
        let mySeat = null;

        function joinSandbox() {
            let name = document.getElementById('username').value.trim();
            if(!name) return alert("Enter a name");
            myName = name;
            socket.emit('join', myName);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
        }

        function takeSeat(seatNum) { socket.emit('takeSeat', seatNum); }
        function leaveSeat() { socket.emit('leaveSeat'); }
        function placeBet() {
            let amt = parseInt(document.getElementById('bet-input').value);
            if(!amt || amt <= 0) return alert("Invalid bet");
            socket.emit('placeBet', amt);
            document.getElementById('bet-input').value = '';
        }
        function sendAction(action) { socket.emit('playerAction', action); }

        socket.on('stateUpdate', (state) => {
            // 1. Update Timer & Status
            document.getElementById('timer-display').innerText = state.timer;
            document.getElementById('status-display').innerText = state.status.replace('_', ' ');

            // 2. Render Dealer
            let dHand = document.getElementById('dealer-hand');
            dHand.innerHTML = '';
            state.dealer.cards.forEach(c => {
                if (c === 'hidden') dHand.innerHTML += `<div class="card card-hidden">?</div>`;
                else dHand.innerHTML += `<div class="card ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}">${c.val}${c.suit}</div>`;
            });
            if (state.dealer.score > 0) {
                document.getElementById('dealer-score').style.display = 'block';
                document.getElementById('dealer-score').innerText = state.dealer.score;
            } else {
                document.getElementById('dealer-score').style.display = 'none';
            }

            // 3. Render Seats
            let seatsHtml = '';
            mySeat = null;
            for(let i=1; i<=5; i++) {
                let seat = state.seats[i];
                let isActiveTurn = state.activeSeat === i;
                
                if (seat) {
                    if (seat.name === myName) mySeat = i;
                    
                    let cardsHtml = '';
                    seat.cards.forEach(c => {
                        cardsHtml += `<div class="card ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}">${c.val}${c.suit}</div>`;
                    });

                    seatsHtml += `
                    <div class="seat occupied ${isActiveTurn ? 'active-turn' : ''}">
                        ${seat.result ? `<div style="color:white; font-weight:bold; font-size:1.2rem; text-shadow:0 0 10px black; margin-bottom:5px;">${seat.result}</div>` : ''}
                        <div class="seat-score" style="display:${seat.score > 0 ? 'block' : 'none'}">${seat.score}</div>
                        <div class="hand">${cardsHtml}</div>
                        <div class="seat-circle">
                            ${seat.bet > 0 ? `<div class="seat-bet">${seat.bet}</div>` : 'WAIT'}
                        </div>
                        <div class="seat-name">${seat.name}</div>
                    </div>`;
                } else {
                    seatsHtml += `
                    <div class="seat">
                        <div class="seat-circle" onclick="takeSeat(${i})">SIT</div>
                    </div>`;
                }
            }
            document.getElementById('seats-container').innerHTML = seatsHtml;

            // 4. Update Controls based on State
            document.getElementById('btn-leave').style.display = (mySeat !== null && state.status === 'BETTING') ? 'block' : 'none';
            
            let canBet = mySeat !== null && state.status === 'BETTING' && state.seats[mySeat].bet === 0;
            document.getElementById('bet-input').style.display = canBet ? 'block' : 'none';
            document.getElementById('btn-bet').style.display = canBet ? 'block' : 'none';

            let isMyTurn = mySeat !== null && state.activeSeat === mySeat && state.status === 'PLAYER_TURN';
            document.getElementById('btn-hit').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('btn-stand').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('btn-double').style.display = (isMyTurn && state.seats[mySeat].cards.length === 2) ? 'block' : 'none';
        });

    </script>
</body>
</html>
