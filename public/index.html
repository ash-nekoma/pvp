<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIP Blackjack Sandbox</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: sans-serif; outline: none; }
        body { background: #000814; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #login-screen { text-align: center; background: rgba(0, 10, 25, 0.9); padding: 40px; border-radius: 12px; border: 1px solid #00a2ff; }
        #login-screen input { padding: 12px; font-size: 1.2rem; text-align: center; margin-bottom: 20px; width: 100%; border-radius: 8px; border: none; }
        #login-screen button { padding: 12px 20px; font-size: 1.2rem; cursor: pointer; background: #00a2ff; color: black; font-weight: bold; border: none; border-radius: 8px; width: 100%; }

        #main-layout { display: none; display: flex; gap: 20px; width: 100%; max-width: 1450px; height: 700px; justify-content: center; }
        
        .game-column { display: flex; flex-direction: column; gap: 20px; width: 1100px; max-width: 1100px; flex-shrink: 0; }

        /* PREMIUM GAME BOARD */
        #game-screen { flex: 1; width: 100%; background: radial-gradient(circle at center, #0e5b32 0%, #042412 100%); border-radius: 20px; border: 12px solid #2a1a14; box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        /* TABLE WATERMARK */
        .table-logo { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.15; pointer-events: none; z-index: 1; width: 100%; }
        .table-logo h1 { font-size: 4.5rem; letter-spacing: 15px; margin: 0 0 10px 0; color: #fff; }
        .table-logo p { font-weight: bold; font-size: 1.2rem; letter-spacing: 3px; color: #fff; margin: 5px 0; }

        #timer-display { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); transition: opacity 0.3s; z-index: 20; color: white; display: flex; gap: 8px; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}

        .dealer-area { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        
        @keyframes dealFly {
            0% { transform: translate(100px, -200px) scale(0.5); opacity: 0; }
            100% { transform: translate(0, 0) scale(1); opacity: 1; }
        }

        .hand { display: flex; gap: -30px; justify-content: center; min-height: 105px; position: relative;}
        
        .card { width: 70px; height: 105px; background: white; color: black; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; font-size: 1.1rem; border: 1px solid #ccc; box-shadow: -4px 4px 10px rgba(0,0,0,0.6); }
        .anim-card { animation: dealFly 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .card-red { color: #ff3366; }
        .card-hidden { background: repeating-linear-gradient(45deg, #001f4d, #001f4d 10px, #000a1f 10px, #000a1f 20px); border: 2px solid white; color: transparent; }
        
        .seats-container { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; align-items: flex-end; gap: 20px; padding: 0 10px; transition: all 0.5s ease; z-index: 10; }
        .seat { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; transition: all 0.5s ease; min-width: 100px; }
        
        .hands-wrapper { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 10px; }
        .single-hand-container { display: flex; flex-direction: column; align-items: center; position: relative; justify-content: flex-end; }

        /* BET PILL (MOVED TO BOTTOM ABOVE NAME) */
        .seat-bet { background: rgba(0,0,0,0.8); color: #ffb400; padding: 4px 15px; border-radius: 50px; font-weight: bold; font-size: 0.95rem; border: 1px solid rgba(255, 180, 0, 0.5); margin-bottom: 5px; z-index: 5; box-shadow: 0 2px 5px black;}

        .seat-circle { width: 60px; height: 60px; border: 2px dashed rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; background: rgba(0,0,0,0.4); margin-bottom: 5px;}
        .seat-circle:hover { background: rgba(255,255,255,0.2); border-color: white; }
        .seat.occupied .seat-circle { border: 2px solid transparent; cursor: default; background: transparent; }
        
        .seat-name { margin-top: 5px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; text-shadow: 0 2px 4px black; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; text-align: center; letter-spacing: 1px;}
        
        /* TICKING PLAYER TIMER BAR */
        .player-timer-track { width: 100%; height: 8px; background: rgba(0,0,0,0.8); border-radius: 50px; margin-top: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); box-shadow: inset 0 2px 5px rgba(0,0,0,0.9); }
        .player-timer-fill { height: 100%; background: linear-gradient(90deg, #00e676, #00b359); width: 100%; transition: width 1s linear; box-shadow: 0 0 10px #00e676; border-radius: 50px; }

        /* UNIFORM SCORE BADGES (NO BORDER, TOP-LEFT) */
        .seat-score { position: absolute; top: -15px; left: -15px; background: #222; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; border-radius: 50%; font-weight: bold; z-index: 20; box-shadow: 0 4px 10px rgba(0,0,0,0.8); font-size: 1rem; color: white; border: none; }
        .score-active { background: linear-gradient(135deg, #FFDF00, #D4AF37); color: black; box-shadow: 0 2px 10px rgba(218,165,32,0.6); border: none; }
        .score-bust { background: linear-gradient(to bottom, #cc0033, #9b0022); color: white; width: auto; height: 30px; padding: 0 10px; border-radius: 50px; font-size: 0.8rem; border: none; }
        .score-bj { background: linear-gradient(to bottom, #00b359, #008040); color: white; width: auto; height: 30px; padding: 0 10px; border-radius: 50px; font-size: 0.8rem; letter-spacing: 1px; border: none; }
        
        /* NARROWER RESULT PILLS (MOVED HIGHER) */
        .hand-result { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; font-weight: 900; padding: 4px 12px; border-radius: 50px; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.9); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 1px 3px rgba(0,0,0,0.5);}
        .res-win { background: linear-gradient(to bottom, #00e676, #00b359); color: black; text-shadow: none; box-shadow: 0 0 15px rgba(0,230,118,0.5), 0 5px 15px rgba(0,0,0,0.9);}
        .res-loss { background: linear-gradient(to bottom, #ff3366, #cc0033); color: white; }
        .res-push { background: linear-gradient(to bottom, #777, #444); color: white; }

        /* PREMIUM CONTROLS */
        #controls { display: flex; gap: 15px; height: 75px; justify-content: center; align-items: center; width: 100%; background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #controls-msg { font-weight: 900; font-size: 1.2rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-action { padding: 0 25px; font-size: 1.05rem; font-weight: 900; cursor: pointer; border-radius: 50px; border: none; text-transform: uppercase; display: none; height: 100%; transition: all 0.2s ease; letter-spacing: 1px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        /* INPUT STRICTLY TEXT TO HIDE ARROWS */
        #bet-input { padding: 0 20px; font-size: 1.2rem; text-align: center; width: 180px; display: none; height: 100%; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; font-weight: bold; }
        
        #btn-leave { background: linear-gradient(to bottom, #ff3366, #cc0033); color: white; border: 1px solid #ff6688; }
        #btn-leave:hover { box-shadow: 0 5px 15px rgba(255,51,102,0.5); }
        
        #btn-bet { background: linear-gradient(to bottom, #00e676, #00b359); color: black; border: 1px solid #33ff99; text-shadow: none; }
        #btn-bet:hover { box-shadow: 0 5px 20px rgba(0,230,118,0.6); }

        #btn-rebet { background: linear-gradient(to bottom, #00a2ff, #0077cc); color: white; border: 1px solid #66c2ff; }
        #btn-rebet:hover { box-shadow: 0 5px 20px rgba(0,162,255,0.5); }
        
        #btn-hit { background: linear-gradient(to bottom, #00e676, #00b359); color: black; border: 1px solid #33ff99; text-shadow: none; }
        #btn-hit:hover { box-shadow: 0 5px 15px rgba(0,230,118,0.5); }
        #btn-stand { background: linear-gradient(to bottom, #ff3366, #cc0033); color: white; border: 1px solid #ff6688; }
        #btn-stand:hover { box-shadow: 0 5px 15px rgba(255,51,102,0.5); }
        #btn-double { background: linear-gradient(to bottom, #ffd700, #ffb400); color: black; border: 1px solid #ffe666; text-shadow: none; }
        #btn-double:hover { box-shadow: 0 5px 15px rgba(255,180,0,0.5); }
        #btn-split { background: linear-gradient(to bottom, #00a2ff, #0077cc); color: white; border: 1px solid #66c2ff; }
        #btn-split:hover { box-shadow: 0 5px 15px rgba(0,162,255,0.5); }

        /* LIVE CHAT */
        .chat-panel { width: 320px; height: 100%; display: flex; flex-direction: column; background: rgba(0, 10, 25, 0.85); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; overflow: hidden; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chat-header { padding: 15px; background: rgba(0,0,0,0.7); font-weight: bold; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); letter-spacing: 1px; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-line { font-size: 0.95rem; line-height: 1.4; text-align: left; }
        .chat-line .name { color: #00a2ff; font-weight: bold; margin-right: 5px; }
        .chat-input-area { display: flex; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); gap: 10px; }
        .chat-input-area input { flex: 1; padding: 10px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; text-align: left; }
        .chat-input-area button { width: 44px; height: 44px; background: linear-gradient(to bottom, #00a2ff, #0077cc); border: 1px solid #66c2ff; border-radius: 50px; cursor: pointer; color: white; transition: 0.2s;}
        .chat-input-area button:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(0,162,255,0.5);}
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Enter VIP Sandbox</h2>
        <input type="text" id="username" placeholder="Enter your name">
        <button onclick="joinSandbox()">ENTER CASINO</button>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div id="main-layout">
            
            <div class="game-column">
                <div id="game-screen">
                    
                    <div class="table-logo">
                        <h1>BLACKJACK</h1>
                        <p>BLACKJACK PAYS 3 TO 2</p>
                        <p>DEALER MUST DRAW TO 16 AND STAND ON ALL 17s</p>
                    </div>

                    <div id="timer-display"><i class="fas fa-stopwatch"></i> <span id="timer-val">15</span></div>

                    <div class="dealer-area">
                        <div class="single-hand-container">
                            <div id="dealer-score" class="seat-score" style="display:none;">0</div>
                            <div id="dealer-hand" class="hand"></div>
                        </div>
                    </div>

                    <div class="seats-container" id="seats-container">
                        </div>
                </div>

                <div id="controls">
                    <div id="controls-msg">TAKE A SEAT TO PLAY</div>
                    <button class="btn-action" id="btn-leave" onclick="leaveSeat()">LEAVE</button>
                    <input type="text" id="bet-input" placeholder="Amount" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <button class="btn-action" id="btn-bet" onclick="placeBet()">PLACE BET</button>
                    <button class="btn-action" id="btn-rebet" onclick="rebet()">REBET</button>
                    
                    <button class="btn-action" id="btn-hit" onclick="sendAction('hit')">HIT</button>
                    <button class="btn-action" id="btn-stand" onclick="sendAction('stand')">STAND</button>
                    <button class="btn-action" id="btn-double" onclick="sendAction('double')">DOUBLE</button>
                    <button class="btn-action" id="btn-split" onclick="sendAction('split')">SPLIT</button>
                </div>
            </div>

            <div class="chat-panel">
                <div class="chat-header">LIVE CHAT</div>
                <div class="chat-body" id="chat-box">
                    <div class="chat-line" style="color: #00a2ff; text-align: center; font-weight: bold;">Connected to table.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Chat here..." onkeypress="if(event.key==='Enter') sendChat();">
                    <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const socket = io();
        let myName = '';
        let mySeat = null;
        let lastBetAmount = 0; // Tracks bet for REBET
        
        let cardRenderMemory = { dealer: 0, seats: { 1:[], 2:[], 3:[], 4:[], 5:[] } };

        function joinSandbox() {
            let name = document.getElementById('username').value.trim();
            if(!name) return alert("Enter a name");
            myName = name;
            socket.emit('join', myName);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-layout').style.display = 'flex';
        }

        function takeSeat(seatNum) { socket.emit('takeSeat', seatNum); }
        function leaveSeat() { socket.emit('leaveSeat'); }
        
        function placeBet() {
            let amt = parseInt(document.getElementById('bet-input').value);
            if(!amt || amt <= 0) return alert("Invalid bet");
            lastBetAmount = amt;
            socket.emit('placeBet', amt);
            document.getElementById('bet-input').value = '';
        }
        
        function rebet() {
            if (lastBetAmount > 0) {
                socket.emit('placeBet', lastBetAmount);
            }
        }
        
        function sendAction(action) { socket.emit('playerAction', action); }

        function sendChat() {
            let input = document.getElementById('chat-input');
            let msg = input.value.trim();
            if (msg) {
                socket.emit('sendChat', msg);
                input.value = '';
            }
        }
        socket.on('chatMessage', (data) => {
            let box = document.getElementById('chat-box');
            box.innerHTML += `<div class="chat-line"><span class="name">${data.name}:</span> ${data.msg}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        socket.on('timerTick', (timeData) => {
            let timerEl = document.getElementById('timer-display');
            let timerVal = document.getElementById('timer-val');
            
            if (timeData.status === 'BETTING') {
                timerVal.innerText = timeData.timer;
                timerEl.style.opacity = timeData.hasBets ? '1' : '0';
            } else {
                timerEl.style.opacity = '0'; 
            }

            // Sync the active player's ticking timer bar smoothly
            if (timeData.status === 'PLAYER_TURN' && timeData.activeTurn && timeData.activeTurn.seat) {
                let bar = document.getElementById(`timer-bar-${timeData.activeTurn.seat}`);
                if (bar) {
                    bar.style.width = (timeData.timer / 15) * 100 + '%';
                }
            }
        });

        socket.on('stateUpdate', (state) => {
            if (state.status === 'BETTING') {
                cardRenderMemory = { dealer: 0, seats: { 1:[], 2:[], 3:[], 4:[], 5:[] } };
            }

            // Render Dealer
            let dHand = document.getElementById('dealer-hand');
            dHand.innerHTML = '';
            state.dealer.cards.forEach((c, idx) => {
                let isNew = idx >= cardRenderMemory.dealer;
                let animClass = isNew ? 'anim-card' : '';
                
                if (c === 'hidden') dHand.innerHTML += `<div class="card card-hidden ${animClass}" style="margin-left: ${idx > 0 ? '-45px' : '0'};">?</div>`;
                else dHand.innerHTML += `<div class="card ${animClass} ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}" style="margin-left: ${idx > 0 ? '-45px' : '0'}; z-index: ${idx};">
                    <div>${c.val}</div>
                    <div style="font-size:1.8rem; text-align:center; margin-top:5px;">${c.suit}</div>
                </div>`;
            });
            cardRenderMemory.dealer = state.dealer.cards.length;

            let dScoreEl = document.getElementById('dealer-score');
            if (state.dealer.score > 0) { dScoreEl.style.display = 'flex'; dScoreEl.innerText = state.dealer.score; } else { dScoreEl.style.display = 'none'; }

            // Render Seats
            let seatsHtml = '';
            mySeat = null;
            let activeHandObj = null; 
            
            for(let i=1; i<=5; i++) {
                let seat = state.seats[i];
                let isMySeatTurn = state.activeTurn.seat === i;
                
                if (seat) {
                    if (seat.name === myName) mySeat = i;
                    
                    let isIdle = seat.hands.length === 0 || seat.hands[0].bet === 0;
                    if (state.status !== 'BETTING' && isIdle) continue; 

                    if (!cardRenderMemory.seats[i]) cardRenderMemory.seats[i] = [];

                    let handsHtml = '';
                    let totalBet = 0; // Calculate total bet for this seat
                    
                    seat.hands.forEach((hand, hIdx) => {
                        totalBet += hand.bet;
                        let isHandActive = isMySeatTurn && state.activeTurn.handIdx === hIdx;
                        if (isHandActive && seat.name === myName) activeHandObj = hand; 

                        let prevCardCount = cardRenderMemory.seats[i][hIdx] || 0;
                        let cardsHtml = '';
                        hand.cards.forEach((c, cIdx) => {
                            let isNew = cIdx >= prevCardCount;
                            let animClass = isNew ? 'anim-card' : '';

                            cardsHtml += `<div class="card ${animClass} ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}" style="margin-left: ${cIdx > 0 ? '-50px' : '0'}; z-index: ${cIdx};">
                                <div>${c.val}</div>
                                <div style="font-size:1.8rem; text-align:center; margin-top:5px;">${c.suit}</div>
                            </div>`;
                        });
                        cardRenderMemory.seats[i][hIdx] = hand.cards.length;

                        let badgeClass = isHandActive ? 'score-active' : '';
                        let badgeText = hand.score;
                        if (hand.status === 'BUST') { badgeClass = 'score-bust'; badgeText = 'BUST'; }
                        else if (hand.status === 'BLACKJACK') { badgeClass = 'score-bj'; badgeText = 'BLACKJACK'; }

                        let resHtml = '';
                        if (hand.result) {
                            let rClass = hand.result === 'WIN' ? 'res-win' : (hand.result === 'LOSS' ? 'res-loss' : 'res-push');
                            resHtml = `<div class="hand-result ${rClass}">${hand.result}</div>`;
                        }

                        handsHtml += `
                        <div class="single-hand-container">
                            <div class="seat-score ${badgeClass}" style="display:${hand.score > 0 ? 'flex' : 'none'};">${badgeText}</div>
                            <div class="hand">
                                ${resHtml}
                                ${cardsHtml}
                            </div>
                        </div>`;
                    });

                    seatsHtml += `
                    <div class="seat occupied ${isMySeatTurn ? 'active-turn' : ''}">
                        <div class="hands-wrapper">${handsHtml}</div>
                        ${state.status === 'BETTING' && !isIdle ? `
                            <div class="seat-circle">
                                <i class="fas fa-check" style="color: #00e676; font-size: 1.5rem;"></i>
                            </div>
                        ` : ''}
                        
                        ${totalBet > 0 ? `<div class="seat-bet">${totalBet}</div>` : ''}
                        <div class="seat-name" style="color:${seat.name === myName ? '#00a2ff' : 'white'};">${seat.name}</div>
                        ${state.status !== 'BETTING' ? `
                            <div class="player-timer-track" style="opacity: ${isMySeatTurn ? 1 : 0};">
                                <div class="player-timer-fill" id="timer-bar-${i}" style="width: 100%;"></div>
                            </div>
                        ` : ''}
                    </div>`;
                } else {
                    if (state.status === 'BETTING') {
                        seatsHtml += `<div class="seat"><div class="seat-circle" onclick="takeSeat(${i})"><i class="fas fa-plus" style="color:white; opacity:0.3;"></i></div></div>`;
                    }
                }
            }
            document.getElementById('seats-container').innerHTML = seatsHtml;

            // UI Controls Visibility Logic
            let s = mySeat ? state.seats[mySeat] : null;
            let isSeatedNoBet = mySeat !== null && state.status === 'BETTING' && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0);
            let isMyTurn = activeHandObj !== null;

            let btnLeave = document.getElementById('btn-leave');
            let inputBet = document.getElementById('bet-input');
            let btnBet = document.getElementById('btn-bet');
            let btnRebet = document.getElementById('btn-rebet');
            
            let btnHit = document.getElementById('btn-hit');
            let btnStand = document.getElementById('btn-stand');
            let btnDouble = document.getElementById('btn-double');
            let btnSplit = document.getElementById('btn-split');
            let msgEl = document.getElementById('controls-msg');

            btnLeave.style.display = isSeatedNoBet ? 'block' : 'none';
            inputBet.style.display = isSeatedNoBet ? 'block' : 'none';
            btnBet.style.display = isSeatedNoBet ? 'block' : 'none';
            btnRebet.style.display = (isSeatedNoBet && lastBetAmount > 0) ? 'block' : 'none';
            
            btnHit.style.display = isMyTurn ? 'block' : 'none';
            btnStand.style.display = isMyTurn ? 'block' : 'none';
            btnDouble.style.display = (isMyTurn && activeHandObj.cards.length === 2) ? 'block' : 'none';
            
            let canSplit = isMyTurn && activeHandObj.cards.length === 2 && s.hands.length === 1 && (activeHandObj.cards[0].bjVal === activeHandObj.cards[1].bjVal);
            btnSplit.style.display = canSplit ? 'block' : 'none';

            let isRackEmpty = (!isSeatedNoBet && !isMyTurn);
            
            if (isRackEmpty) {
                msgEl.style.display = 'block';
                if (state.status === 'BETTING') msgEl.innerText = "TAKE A SEAT TO PLAY";
                else msgEl.innerText = "WAITING FOR ROUND TO FINISH...";
            } else {
                msgEl.style.display = 'none';
            }
        });

    </script>
</body>
</html>
