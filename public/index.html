<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000814">
    <title>VIP Blackjack | Premium</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #00050d; 
            --panel-bg: rgba(10, 15, 25, 0.9); 
            --border-color: rgba(255, 255, 255, 0.1); 
            
            /* Game Colors */
            --felt-center: #0e5b32;
            --felt-edge: #042412;
            --wood-trim: #3e2723;
            
            /* State Colors */
            --win-color: #00e676; 
            --loss-color: #e53935; 
            --push-color: #888888;
            --bj-color: #00a2ff;
            
            /* PS Button Colors */
            --ps-triangle: #41e6a6; /* Green - Split */
            --ps-circle: #f37370;   /* Red - Stand / Leave */
            --ps-cross: #8dafe5;    /* Blue - Hit / Rebet */
            --ps-square: #f591cc;   /* Pink - Double */
            --ps-gold: #ffb400;     /* Gold - Bet */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-color); 
            color: white; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Custom Scrollbar for Chat */
        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent; padding-right: 5px;}
        .custom-scroll::-webkit-scrollbar { width: 6px; display: block; } 
        .custom-scroll::-webkit-scrollbar-track { background: transparent; } 
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* --- LOGIN SCREEN --- */
        #login-screen { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--panel-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(10px); top: 50%; left: 50%; transform: translate(-50%, -50%);}
        #login-screen h2 { margin-top:0; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        #login-screen input { padding: 12px; font-size: 1.2rem; text-align: center; margin-bottom: 20px; width: 100%; border-radius: 8px; border: none; font-weight: bold; background: rgba(0,0,0,0.5); color: white; }
        #login-screen button { padding: 12px 20px; font-size: 1.2rem; cursor: pointer; background: linear-gradient(to bottom, #00a2ff, #0077cc); color: white; font-weight: bold; border: none; border-radius: 8px; width: 100%; box-shadow: 0 4px 15px rgba(0,162,255,0.4); transition: 0.2s; }
        #login-screen button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,162,255,0.6); }

        /* --- MAIN LAYOUT --- */
        #main-layout { display: none; gap: 20px; width: 100%; max-width: 1450px; height: 750px; justify-content: center; align-items: stretch; padding: 20px; }
        
        .game-column { display: flex; flex-direction: column; gap: 20px; width: 1100px; max-width: 1100px; flex-shrink: 0; height: 100%;}

        /* --- GAME BOARD --- */
        #game-screen { 
            flex: 1; 
            width: 100%; 
            background: radial-gradient(circle at center, var(--felt-center) 0%, var(--felt-edge) 100%); 
            border-radius: 16px; 
            border: 14px solid var(--wood-trim); /* Premium Wood Border */
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 15px 35px rgba(0,0,0,0.5); 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Table Watermark */
        .table-logo { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.15; pointer-events: none; z-index: 1; width: 100%; }
        .table-logo h1 { font-family: 'Rajdhani', sans-serif; font-size: 5rem; letter-spacing: 15px; margin: 0 0 10px 0; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .table-logo p { font-weight: bold; font-size: 1.2rem; letter-spacing: 3px; color: #fff; margin: 5px 0; }

        /* Top Right Timer */
        #timer-display { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 50px; font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: bold; border: 1px solid var(--border-color); transition: opacity 0.3s; z-index: 20; color: white; display: flex; gap: 8px; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}

        /* Dealer Area */
        .dealer-area { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        
        /* Card Animations & Styling */
        @keyframes dealFly { 0% { transform: translate(100px, -200px) scale(0.5); opacity: 0; } 100% { transform: translate(0, 0) scale(1); opacity: 1; } }
        
        .hand { display: flex; justify-content: flex-start; min-height: 105px; position: relative;}
        .card { width: 70px; height: 105px; background: white; color: black; border-radius: 6px; display: flex; flex-direction: column; align-items: center; padding: 5px 0; font-weight: bold; font-size: 1.2rem; border: 1px solid #ccc; box-shadow: -2px 2px 8px rgba(0,0,0,0.6); position: absolute; top: 0;}
        .anim-card { animation: dealFly 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .card-red { color: var(--loss-color); }
        .card-hidden { background: repeating-linear-gradient(45deg, #001f4d, #001f4d 10px, #000a1f 10px, #000a1f 20px); border: 2px solid rgba(255,255,255,0.8); color: transparent; }
        
        /* Seating Area */
        .seats-container { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; align-items: flex-end; gap: 40px; padding: 0 10px; transition: all 0.5s ease; z-index: 10; }
        .seat { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; transition: all 0.5s ease; min-width: 100px; }
        
        .hands-wrapper { display: flex; flex-direction: row; gap: 20px; align-items: flex-end; margin-bottom: 5px; height: 140px;}
        .single-hand-container { display: flex; flex-direction: column; align-items: center; position: relative; justify-content: flex-end; height: 100%; }

        /* VALUE BADGE (Centered Above Cards - No Outline) */
        .seat-score { 
            position: absolute; 
            top: -15px; /* Sits just above the cards */
            left: 50%; 
            transform: translateX(-50%);
            background: #111; 
            width: 30px; 
            height: 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 50%; 
            font-family: 'Rajdhani', sans-serif;
            font-weight: 900; 
            z-index: 30; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.8); 
            font-size: 0.95rem; 
            color: white; 
            border: none; 
            transition: 0.3s;
        }
        /* Active hand highlight */
        .score-active { background: linear-gradient(135deg, #FFDF00, #D4AF37); color: black; box-shadow: 0 0 15px rgba(255,223,0,0.6); }

        /* BET PILL (Above Name, Below Cards) */
        .seat-bet { 
            padding: 3px 12px; 
            border-radius: 50px; 
            font-weight: 900; 
            font-size: 0.85rem; 
            margin-bottom: 4px; 
            z-index: 25; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.8); 
            transition: all 0.4s ease; 
            background: rgba(0,0,0,0.8); 
            color: var(--credits); 
            font-family: 'Rajdhani', sans-serif; 
            text-align: center; 
            min-width: 50px;
        }
        
        /* Bet Pill Result Colors */
        .bet-win { background: var(--win-color); color: black; }
        .bet-loss { background: var(--loss-color); color: white; }
        .bet-bj { background: var(--bj-color); color: white; }
        .bet-push { background: var(--push-color); color: white; }

        /* EMPTY SEAT CIRCLE (Only visible when empty) */
        .seat-circle { width: 60px; height: 60px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; background: rgba(0,0,0,0.2); margin-bottom: 5px;}
        .seat-circle:hover { background: rgba(255,255,255,0.2); border-color: white; }
        
        /* PLAYER INFO (Name & Timer) */
        .seat-name { font-weight: bold; font-size: 0.85rem; text-transform: uppercase; text-shadow: 0 2px 4px black; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; text-align: center; letter-spacing: 1px;}
        
        .player-timer-track { width: 100%; height: 5px; background: rgba(0,0,0,0.8); border-radius: 50px; margin-top: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 2px 5px rgba(0,0,0,0.9); }
        .player-timer-fill { height: 100%; width: 100%; transition: width 1s linear, background 0.3s ease; border-radius: 50px; }
        .timer-green { background: linear-gradient(90deg, var(--win-color), #00b359); box-shadow: 0 0 10px var(--win-color); }
        .timer-red { background: linear-gradient(90deg, var(--loss-color), #cc0033); box-shadow: 0 0 10px var(--loss-color); }


        /* --- CONTROLS RACK --- */
        #controls { display: flex; gap: 20px; height: 110px; justify-content: center; align-items: center; width: 100%; background: var(--panel-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color); flex-shrink: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        #controls-msg { font-weight: 900; font-size: 1.2rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; }
        
        /* CIRCULAR BUTTONS (PlayStation Theme) */
        .btn-circle { 
            width: 70px; /* Fixed dimensions for perfect circle */
            height: 70px; 
            border-radius: 50%; 
            border: none; 
            color: white; 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-size: 0.8rem; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            transition: all 0.2s ease; 
            letter-spacing: 1px; 
            line-height: 1.2; 
            text-align: center; 
            font-family: 'Outfit', sans-serif;
        }
        .btn-circle:hover { transform: scale(1.05); filter: brightness(1.15); }
        .btn-circle:active { transform: scale(0.95); }
        
        /* Betting Input Field - Same height as buttons (70px) */
        #bet-input { 
            padding: 0 20px; 
            font-size: 1.5rem; 
            text-align: center; 
            width: 140px; 
            display: none; 
            height: 70px; /* Matched to .btn-circle height */
            border-radius: 50px; 
            border: 1px solid var(--border-color); 
            background: rgba(0,0,0,0.6); 
            color: var(--credits); 
            font-weight: 900; 
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8); 
            font-family: 'Rajdhani', sans-serif;
        }
        #bet-input::placeholder { color: rgba(255,180,0,0.3); font-size: 1.2rem; font-family: 'Outfit', sans-serif; font-weight: 600;}
        
        /* PS Solid Colors */
        #btn-rebet { background: var(--ps-cross); } 
        #btn-leave { background: var(--ps-circle); } 
        #btn-bet { background: var(--ps-gold); color: black;} 
        #btn-hit { background: var(--ps-cross); } 
        #btn-stand { background: var(--ps-circle); } 
        #btn-double { background: var(--ps-square); color: black; } 
        #btn-split { background: var(--ps-triangle); color: black;} 

        /* --- LIVE CHAT --- */
        .chat-panel { width: 320px; height: 100%; display: flex; flex-direction: column; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; flex-shrink: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .chat-header { padding: 15px; background: rgba(0,0,0,0.7); font-weight: bold; text-align: center; border-bottom: 1px solid var(--border-color); letter-spacing: 1px; color: white;}
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-line { font-size: 0.95rem; line-height: 1.4; text-align: left; }
        .chat-line .name { color: var(--ps-glow); font-weight: bold; margin-right: 5px; }
        .chat-input-area { display: flex; padding: 15px; border-top: 1px solid var(--border-color); gap: 10px; background: rgba(0,0,0,0.4);}
        .chat-input-area input { flex: 1; padding: 10px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.6); color: white; text-align: left; font-weight: bold;}
        .chat-input-area button { width: 44px; height: 44px; background: linear-gradient(to bottom, #00a2ff, #0077cc); border: none; border-radius: 50px; cursor: pointer; color: white; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
        .chat-input-area button:hover { transform: scale(1.05); filter: brightness(1.1);}
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Enter VIP Sandbox</h2>
        <input type="text" id="username" placeholder="Enter your name">
        <button onclick="joinSandbox()">ENTER CASINO</button>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%;">
        <div id="main-layout">
            
            <div class="game-column">
                <div id="game-screen">
                    <div class="table-logo">
                        <h1>BLACKJACK</h1>
                        <p>BLACKJACK PAYS 3 TO 2</p>
                        <p>DEALER MUST DRAW TO 16 AND STAND ON ALL 17s</p>
                    </div>

                    <div id="timer-display"><i class="fas fa-stopwatch"></i> <span id="timer-val">15</span></div>

                    <div class="dealer-area">
                        <div class="single-hand-container" style="width: 70px;">
                            <div id="dealer-score" class="seat-score" style="display:none;">0</div>
                            <div id="dealer-hand" class="hand"></div>
                        </div>
                    </div>

                    <div class="seats-container" id="seats-container">
                        </div>
                </div>

                <div id="controls">
                    <div id="controls-msg">TAKE A SEAT TO PLAY</div>
                    
                    <button class="btn-circle" id="btn-rebet" onclick="rebet()" style="display:none;">REBET</button>
                    <input type="text" id="bet-input" placeholder="Amount" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <button class="btn-circle" id="btn-bet" onclick="placeBet()" style="display:none;">PLACE<br>BET</button>
                    <button class="btn-circle" id="btn-leave" onclick="leaveSeat()" style="display:none;">LEAVE</button>
                    
                    <button class="btn-circle" id="btn-hit" onclick="sendAction('hit')">HIT</button>
                    <button class="btn-circle" id="btn-stand" onclick="sendAction('stand')">STAND</button>
                    <button class="btn-circle" id="btn-double" onclick="sendAction('double')">DOUBLE</button>
                    <button class="btn-circle" id="btn-split" onclick="sendAction('split')">SPLIT</button>
                </div>
            </div>

            <div class="chat-panel">
                <div class="chat-header">LIVE CHAT</div>
                <div class="chat-body custom-scroll" id="chat-box">
                    <div class="chat-line" style="color: var(--ps-glow); text-align: center; font-weight: bold;">Connected to table.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Chat here..." onkeypress="if(event.key==='Enter') sendChat();">
                    <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const socket = io();
        let myName = '';
        let mySeat = null;
        let lastBetAmount = 0; 
        
        let cardRenderMemory = { dealer: 0, seats: { 1:[], 2:[], 3:[], 4:[], 5:[] } };
        let animatedPills = new Set(); 

        function joinSandbox() {
            let name = document.getElementById('username').value.trim();
            if(!name) return alert("Enter a name");
            myName = name;
            socket.emit('join', myName);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-layout').style.display = 'flex';
        }

        function takeSeat(seatNum) { socket.emit('takeSeat', seatNum); }
        function leaveSeat() { socket.emit('leaveSeat'); }
        
        function placeBet() {
            let amt = parseInt(document.getElementById('bet-input').value);
            if(!amt || amt <= 0) return alert("Invalid bet");
            lastBetAmount = amt;
            socket.emit('placeBet', amt);
            document.getElementById('bet-input').value = '';
        }
        
        function rebet() {
            if (lastBetAmount > 0) socket.emit('placeBet', lastBetAmount);
        }
        
        function sendAction(action) { socket.emit('playerAction', action); }

        function sendChat() {
            let input = document.getElementById('chat-input');
            let msg = input.value.trim();
            if (msg) {
                socket.emit('sendChat', msg);
                input.value = '';
            }
        }
        socket.on('chatMessage', (data) => {
            let box = document.getElementById('chat-box');
            box.innerHTML += `<div class="chat-line"><span class="name">${data.name}:</span> <span style="color:white;">${data.msg}</span></div>`;
            box.scrollTop = box.scrollHeight;
        });

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }

        socket.on('timerTick', (timeData) => {
            let timerEl = document.getElementById('timer-display');
            let timerVal = document.getElementById('timer-val');
            
            if (timeData.status === 'BETTING') {
                timerVal.innerText = timeData.timer;
                timerEl.style.opacity = timeData.hasBets ? '1' : '0';
            } else {
                timerEl.style.opacity = '0'; 
            }

            if (timeData.status === 'PLAYER_TURN' && timeData.activeTurn && timeData.activeTurn.seat) {
                let bar = document.getElementById(`timer-bar-${timeData.activeTurn.seat}`);
                if (bar) {
                    let percent = (timeData.timer / 15) * 100;
                    bar.style.width = percent + '%';
                    
                    if (timeData.timer <= 5) {
                        bar.className = 'player-timer-fill timer-red';
                    } else {
                        bar.className = 'player-timer-fill timer-green';
                    }
                }
            }
        });

        socket.on('stateUpdate', (state) => {
            if (state.status === 'BETTING') {
                cardRenderMemory = { dealer: 0, seats: { 1:[], 2:[], 3:[], 4:[], 5:[] } };
                animatedPills.clear();
            }

            // 1. RENDER DEALER
            let dHand = document.getElementById('dealer-hand');
            dHand.innerHTML = '';
            state.dealer.cards.forEach((c, idx) => {
                let isNew = idx >= cardRenderMemory.dealer;
                let animClass = isNew ? 'anim-card' : '';
                let leftOffset = idx * 25; 
                
                if (c === 'hidden') {
                    dHand.innerHTML += `<div class="card card-hidden ${animClass}" style="position: absolute; left: ${leftOffset}px; z-index: 0;">?</div>`;
                } else {
                    dHand.innerHTML += `<div class="card ${animClass} ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}" style="position: absolute; left: ${leftOffset}px; z-index: ${idx};">
                        <div>${c.val}</div>
                        <div style="font-size:1.8rem; text-align:center; margin-top:5px;">${c.suit}</div>
                    </div>`;
                }
            });
            dHand.style.width = state.dealer.cards.length > 0 ? `${70 + ((state.dealer.cards.length - 1) * 25)}px` : '70px';
            cardRenderMemory.dealer = state.dealer.cards.length;

            let dScoreEl = document.getElementById('dealer-score');
            if (state.dealer.score > 0) { dScoreEl.style.display = 'flex'; dScoreEl.innerText = state.dealer.score; } else { dScoreEl.style.display = 'none'; }

            // 2. RENDER SEATS
            let seatsHtml = '';
            mySeat = null;
            let activeHandObj = null; 
            
            for(let i=1; i<=5; i++) {
                let seat = state.seats[i];
                let isMySeatTurn = state.activeTurn.seat === i;
                
                if (seat) {
                    if (seat.name === myName) mySeat = i;
                    
                    let isIdle = seat.hands.length === 0 || seat.hands[0].bet === 0;
                    if (state.status !== 'BETTING' && isIdle) continue; 

                    if (!cardRenderMemory.seats[i]) cardRenderMemory.seats[i] = [];

                    let handsHtml = '';
                    let totalSeatBet = 0; 
                    
                    seat.hands.forEach((hand, hIdx) => {
                        totalSeatBet += hand.bet;
                        let isHandActive = isMySeatTurn && state.activeTurn.handIdx === hIdx;
                        if (isHandActive && seat.name === myName) activeHandObj = hand; 

                        let prevCardCount = cardRenderMemory.seats[i][hIdx] || 0;
                        let cardsHtml = '';
                        hand.cards.forEach((c, cIdx) => {
                            let isNew = cIdx >= prevCardCount;
                            let animClass = isNew ? 'anim-card' : '';
                            let leftOffset = cIdx * 25;

                            cardsHtml += `<div class="card ${animClass} ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}" style="position: absolute; left: ${leftOffset}px; z-index: ${cIdx};">
                                <div>${c.val}</div>
                                <div style="font-size:1.8rem; text-align:center; margin-top:5px;">${c.suit}</div>
                            </div>`;
                        });
                        cardRenderMemory.seats[i][hIdx] = hand.cards.length;
                        let handWidth = hand.cards.length > 0 ? 70 + ((hand.cards.length - 1) * 25) : 70;

                        // Value Badge (Top Center)
                        let badgeClass = isHandActive ? 'score-active' : '';
                        let badgeText = hand.score;
                        if (hand.status === 'BUST') badgeText = 'BUST';

                        handsHtml += `
                        <div class="single-hand-container" style="width: ${handWidth}px; height: 105px;">
                            <div class="seat-score ${badgeClass}" style="display:${hand.score > 0 ? 'flex' : 'none'};">${badgeText}</div>
                            <div class="hand" style="margin-top: 0; width: 100%; height: 100%;">
                                ${cardsHtml}
                            </div>
                        </div>`;
                    });

                    // MORPHING BET PILL LOGIC (Applies to the total bet above the name)
                    let betClass = '';
                    let displayValue = totalSeatBet;
                    let targetValue = null;

                    if (seat.hands[0] && seat.hands[0].result) {
                        let r = seat.hands[0].result;
                        if (r === 'WIN') { betClass = 'bet-win'; targetValue = totalSeatBet * 2; }
                        else if (r === 'BLACKJACK') { betClass = 'bet-bj'; targetValue = totalSeatBet * 2.5; }
                        else if (r === 'LOSS' || seat.hands[0].status === 'BUST') { betClass = 'bet-loss'; targetValue = 0; }
                        else if (r === 'PUSH') { betClass = 'bet-push'; targetValue = totalSeatBet; }

                        if (targetValue !== null && !animatedPills.has(`${i}-total`)) displayValue = totalSeatBet;
                        else if (targetValue !== null) displayValue = targetValue;
                    }

                    seatsHtml += `
                    <div class="seat occupied">
                        <div class="hands-wrapper">${handsHtml}</div>
                        
                        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 5px;">
                            ${totalSeatBet > 0 ? `<div class="seat-bet ${betClass}" id="bet-pill-${i}-total" data-end="${targetValue !== null ? targetValue : totalSeatBet}">${displayValue}</div>` : ''}
                            
                            <div class="seat-name" style="color:${seat.name === myName ? '#00a2ff' : 'white'};">${seat.name}</div>
                            
                            ${state.status !== 'BETTING' && !isIdle ? `
                                <div class="player-timer-track" style="opacity: ${isMySeatTurn ? 1 : 0.2};">
                                    <div class="player-timer-fill timer-green" id="timer-bar-${i}"></div>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
                } else {
                    if (state.status === 'BETTING') {
                        seatsHtml += `
                        <div class="seat">
                            <div class="seat-circle" onclick="takeSeat(${i})">
                                <i class="fas fa-plus" style="color:white; opacity:0.3; font-size: 1.5rem;"></i>
                            </div>
                        </div>`;
                    }
                }
            }
            document.getElementById('seats-container').innerHTML = seatsHtml;

            for(let i=1; i<=5; i++) {
                let seat = state.seats[i];
                if(seat && seat.hands[0] && seat.hands[0].result && !animatedPills.has(`${i}-total`)) {
                    animatedPills.add(`${i}-total`);
                    let el = document.getElementById(`bet-pill-${i}-total`);
                    let target = parseInt(el.getAttribute('data-end'));
                    if (el && target !== null) {
                        setTimeout(() => { animateValue(el, seat.hands[0].bet, target, 1000); }, 500);
                    }
                }
            }

            let s = mySeat ? state.seats[mySeat] : null;
            let isSeatedNoBet = mySeat !== null && state.status === 'BETTING' && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0);
            let isMyTurn = activeHandObj !== null;

            let btnLeave = document.getElementById('btn-leave');
            let inputBet = document.getElementById('bet-input');
            let btnBet = document.getElementById('btn-bet');
            let btnRebet = document.getElementById('btn-rebet');
            
            let btnHit = document.getElementById('btn-hit');
            let btnStand = document.getElementById('btn-stand');
            let btnDouble = document.getElementById('btn-double');
            let btnSplit = document.getElementById('btn-split');
            let msgEl = document.getElementById('controls-msg');

            // Alignment: REBET - INPUT - PLACE BET - LEAVE
            btnRebet.style.display = (isSeatedNoBet && lastBetAmount > 0) ? 'flex' : 'none';
            inputBet.style.display = isSeatedNoBet ? 'block' : 'none';
            btnBet.style.display = isSeatedNoBet ? 'flex' : 'none';
            btnLeave.style.display = isSeatedNoBet ? 'flex' : 'none';
            
            // Action Buttons
            btnHit.style.display = isMyTurn ? 'flex' : 'none';
            btnStand.style.display = isMyTurn ? 'flex' : 'none';
            btnDouble.style.display = (isMyTurn && activeHandObj.cards.length === 2) ? 'flex' : 'none';
            
            let canSplit = isMyTurn && activeHandObj.cards.length === 2 && s.hands.length === 1 && (activeHandObj.cards[0].bjVal === activeHandObj.cards[1].bjVal);
            btnSplit.style.display = canSplit ? 'flex' : 'none';

            let isRackEmpty = (!isSeatedNoBet && !isMyTurn);
            if (isRackEmpty) {
                msgEl.style.display = 'block';
                if (state.status === 'BETTING') msgEl.innerText = "TAKE A SEAT TO PLAY";
                else if (mySeat && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0)) msgEl.innerText = "WAITING FOR NEXT ROUND...";
                else msgEl.innerText = "WAITING FOR ROUND TO FINISH...";
            } else {
                msgEl.style.display = 'none';
            }
        });

    </script>
</body>
</html>
