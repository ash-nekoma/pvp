<script>
    const socket = io(); 

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let sfxGainVal = 0.5;
    let lastSfxTime = 0;

    document.body.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let radio = document.getElementById('global-radio');
        if (radio && radio.src && radio.paused) radio.play().catch(e => {});
    }, { once: true });

    function canPlayGameSfx(gameId) {
        let viewCasino = document.getElementById('view-casino');
        if (!viewCasino || !viewCasino.classList.contains('hidden')) return false;
        let viewGame = document.getElementById('view-game-' + gameId);
        if (viewGame && !viewGame.classList.contains('hidden')) return true;
        if (window.activeSharedGame === gameId) return true;
        return false;
    }

    function playTone(f, t, d, v = 0.1) { 
        if (audioCtx.state === 'suspended') return; 
        let now = Date.now();
        if (now - lastSfxTime < 50) return; 
        lastSfxTime = now;
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain(); 
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime); 
        g.gain.setValueAtTime(v * sfxGainVal, audioCtx.currentTime); 
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); 
        o.connect(g); g.connect(audioCtx.destination); 
        o.start(); o.stop(audioCtx.currentTime + d); 
    }

    const sfx = { 
        click: () => playTone(600, 'triangle', 0.03, 0.15),
        tick: (gid) => { if(!gid || canPlayGameSfx(gid)) playTone(1200, 'square', 0.02, 0.05); },
        deal: (gid) => { if(!gid || canPlayGameSfx(gid)) playTone(300, 'triangle', 0.1, 0.1); }, 
        coin: (gid) => { if(!gid || canPlayGameSfx(gid)) { for(let i=0; i<10; i++) setTimeout(() => playTone(1500 + i * 100, 'square', 0.02, 0.05), i * 30); } }, 
        win: (gid) => { if(!gid || canPlayGameSfx(gid)) { playTone(440, 'sine', 0.1, 0.1); setTimeout(() => playTone(660, 'sine', 0.15, 0.1), 100); setTimeout(() => playTone(880, 'sine', 0.3, 0.1), 250); } }, 
        lose: (gid) => { if(!gid || canPlayGameSfx(gid)) { playTone(200, 'sawtooth', 0.4, 0.1); setTimeout(() => playTone(150, 'sawtooth', 0.6, 0.1), 200); } }, 
        lock: (gid) => { if(!gid || canPlayGameSfx(gid)) { playTone(400, 'square', 0.1, 0.1); setTimeout(() => playTone(300, 'square', 0.1, 0.1), 100); } }
    };

    document.addEventListener('mousedown', (e) => {
       if(e.target.closest('button, .nav-link, .mode-card, .game-card, .bank-tab, .action-btn, .top-icon-btn, .brand, .wallet-pill')) sfx.click();
       let menu = document.getElementById('desktop-nav-actions');
       let toggleBtn = document.querySelector('.mobile-menu-btn');
       if (menu.classList.contains('show') && !menu.contains(e.target) && !toggleBtn.contains(e.target)) {
           menu.classList.remove('show');
       }
    });

    socket.on('connect', () => {
        const savedUser = localStorage.getItem('snt_user');
        const savedPass = localStorage.getItem('snt_pass');
        if(savedUser && savedPass) {
            let authErrLog = document.getElementById('auth-error-login');
            if(authErrLog) authErrLog.innerHTML = '<span style="color:var(--ps-glow)">Reconnecting session...</span>';
            socket.emit('login', { username: savedUser, password: savedPass });
        }
    });

    function updateVolume(val) {
        let vol = val / 100; sfxGainVal = vol;
        const audio = document.getElementById('global-radio');
        if(audio) audio.volume = vol;
        document.getElementById('vol-display').innerText = val + '%';
        let icon = document.querySelector('#volume-icon');
        if (val == 0) icon.className = 'fas fa-volume-mute';
        else if (val <= 25) icon.className = 'fas fa-volume-down';
        else icon.className = 'fas fa-volume-up';
    }

    socket.on('radioSync', (data) => { syncRadio(data); });
    socket.on('radioPlay', (data) => { syncRadio(data); });
    socket.on('radioStop', () => {
        const audio = document.getElementById('global-radio');
        audio.pause(); audio.src = '';
        document.getElementById('radio-hud').classList.remove('show');
    });

    function syncRadio(data) {
        const audio = document.getElementById('global-radio');
        const hud = document.getElementById('radio-hud');
        const djText = document.getElementById('radio-dj');
        if (!data.url) { audio.pause(); audio.src = ''; hud.classList.remove('show'); return; }
        djText.innerText = data.requestedBy;
        hud.classList.add('show');
        audio.src = data.url;
        audio.volume = document.getElementById('master-volume').value / 100;
        audio.onloadedmetadata = () => {
            let offset = (Date.now() - data.startTime) / 1000;
            if (offset > 0) { try { audio.currentTime = offset; } catch(e) {} }
            audio.play().catch(e => {});
        };
        audio.play().catch(e => {});
    }

    let myUsername = ''; let myCredits = 0; let myPlayable = 0;
    let myGameHistory = { d20: [], coinflip: [], baccarat: [], blackjack: [], perya: [], dt: [], sicbo: [] };
    let globalFallback = { baccarat: [], perya: [], dt: [], sicbo: [] };
    let mySoloRounds = { d20: 0, coinflip: 0, blackjack: 0 };
    let myNotifications = [];
    window.activeSharedGame = null;
    let sState = { time: 15, status: 'BETTING' };
    let mySBets = {}; let mySBetsStack = []; let dailyTimerInterval = null; let currentHistoryGame = null;

    const delay = ms => new Promise(res => setTimeout(res, ms));
    const formatTC = (amount) => { let num = parseFloat(amount); if(isNaN(num)) return 0; return Math.round(num * 10) / 10; };
    const fmtTC = (amount) => { let num = formatTC(amount); return num % 1 === 0 ? num.toLocaleString() : num.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1}); };

    function getBJScore(hand) {
        let score = 0, aces = 0;
        for (let card of hand) { score += card.bjVal; if (card.raw === 'A') aces += 1; }
        while (score > 21 && aces > 0) { score -= 10; aces -= 1; }
        return score;
    }

    function getBetColor(betWord) {
        if(!betWord) return 'white';
        let word = betWord.toString().trim().toUpperCase();
        const map = { 'PLAYER': 'var(--ps-glow)', 'BANKER': 'var(--danger)', 'TIE': 'var(--success)', 'DRAGON': 'var(--danger)', 'TIGER': 'var(--credits)', 'SMALL': 'var(--ps-glow)', 'BIG': 'var(--danger)', 'TRIPLE': 'white', 'YELLOW': '#ffcc00', 'WHITE': '#fff', 'PINK': '#ff66b2', 'BLUE': '#00a2ff', 'RED': '#ff3366', 'GREEN': '#00e676', 'BUST!': 'var(--danger)', 'PUSH': 'white', 'DEALER': 'var(--danger)', 'YOU': 'var(--success)', 'HEADS': '#ffb400', 'TAILS': '#e2e8f0', 'EVEN': 'var(--credits)', 'ODD': 'var(--playable)' };
        return map[word] || 'white';
    }

    function colorsToDice(str) {
        if(str === '-') return '-';
        return str.split(',').map(c => {
            let color = c.trim().toLowerCase();
            if(!color) return '';
            return `<div class="color-die c-${color}" style="width:14px; height:14px; border-radius:3px; display:inline-block; border:1px solid rgba(255,255,255,0.2); margin:0 1px;"></div>`;
        }).join('');
    }

    function formatBetHistory(id, betStr) {
        if (!betStr || betStr === '-') return '-';
        return betStr.split(',').map(b => {
            let baseChoice = b.trim(); 
            if (id === 'baccarat') {
                if (baseChoice === 'Player') return `<span style="color:var(--ps-glow); font-weight:900;">P</span>`;
                if (baseChoice === 'Banker') return `<span style="color:var(--danger); font-weight:900;">B</span>`;
                if (baseChoice === 'Tie') return `<span style="color:var(--success); font-weight:900;">T</span>`;
                return baseChoice;
            }
            if (id === 'dt') {
                if (baseChoice === 'Dragon') return `<div style="width:14px; height:14px; border-radius:50%; background:var(--danger); display:inline-block; box-shadow: 0 0 5px var(--danger);"></div>`;
                if (baseChoice === 'Tiger') return `<div style="width:14px; height:14px; border-radius:50%; background:var(--credits); display:inline-block; box-shadow: 0 0 5px var(--credits);"></div>`;
                if (baseChoice === 'Tie') return `<div style="width:14px; height:14px; border-radius:50%; background:var(--success); display:inline-block; box-shadow: 0 0 5px var(--success);"></div>`;
                return baseChoice;
            }
            if (id === 'sicbo') {
                if (baseChoice === 'Small') return `<span style="color:var(--ps-glow); font-weight:900;">S</span>`;
                if (baseChoice === 'Big') return `<span style="color:var(--danger); font-weight:900;">B</span>`;
                return baseChoice;
            }
            if (id === 'perya') { return `<div style="display:flex; justify-content:center; align-items:center; gap:2px; flex-wrap:nowrap;">${colorsToDice(baseChoice)}</div>`; }
            return `<span style="font-weight:800; color:${getBetColor(baseChoice)}">${baseChoice}</span>`;
        }).join(' ');
    }

    function openModal(id) { let el = document.getElementById(id); el.classList.remove('hidden'); el.style.display = 'flex'; }
    function closeModal(id) { let el = document.getElementById(id); el.classList.add('hidden'); el.style.display = 'none'; }
    function addAmount(inputId, val) { let i = document.getElementById(inputId); let newVal = (parseInt(i.value) || 0) + val; if (newVal > 100000) newVal = 100000; i.value = newVal; }

    let flashTimeout;
    function showLocalFlash(game, msg, type='error') {
        let f = document.getElementById('flash-' + game);
        if(!f) { f = document.getElementById('flash-shared'); }
        if(!f) return;
        f.classList.remove('show', 'error', 'success'); void f.offsetWidth; 
        f.innerText = msg; f.classList.add('show');
        if(type === 'error') { f.classList.add('error'); sfx.lose(game); } else { f.classList.add('success'); sfx.win(game); }
        clearTimeout(flashTimeout); flashTimeout = setTimeout(() => f.classList.remove('show'), 2500);
    }

    function toggleCustomDropdown(id, e) {
        if(e) e.stopPropagation(); sfx.click();
        document.querySelectorAll('.custom-dropdown').forEach(d => { if(d.id !== id) d.classList.add('hidden'); });
        let target = document.getElementById(id);
        target.classList.toggle('hidden');
        if(id === 'notif-dropdown' && !target.classList.contains('hidden')) renderNotifs();
        if(id === 'gift-dropdown') document.getElementById('promo-response').innerText = '';
    }

    function toggleCurrentBets(e) { toggleCustomDropdown('current-bets-popover', e); }

    function updateCurrentBetsPopover() {
        const list = document.getElementById('cb-list'); if(!list) return;
        list.innerHTML = ''; let total = 0; const entries = Object.entries(mySBets);
        if(entries.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:10px;">No active bets for this round.</div>`;
        } else {
            entries.forEach(([choice, amount]) => {
                total += amount; let cColor = getBetColor(choice);
                list.insertAdjacentHTML('beforeend', `<div style="background:rgba(0,0,0,0.4); padding:10px 15px; border-radius:6px; border-left:4px solid ${cColor}; display:flex; justify-content:space-between; align-items:center; font-weight:800; margin-bottom:5px;"><span style="text-transform:uppercase; color:${cColor};">${choice}</span><span style="color:var(--credits); font-size: 1rem; white-space: nowrap;">${fmtTC(amount)} TC</span></div>`);
            });
            list.insertAdjacentHTML('beforeend', `<div style="border-top:1px solid var(--glass-border); padding-top:10px; margin-top:5px; display:flex; justify-content:space-between; font-weight:900; font-size:1.1rem; color:white;"><span>TOTAL</span><span style="color:var(--credits); white-space: nowrap;">${fmtTC(total)} TC</span></div>`);
        }
    }

    function toggleHistory(id, e) {
        if(e) e.stopPropagation(); sfx.click();
        document.querySelectorAll('.custom-dropdown').forEach(d => { if(d.id !== 'history-popover') d.classList.add('hidden'); });
        let popover = document.getElementById('history-popover');
        if (e.currentTarget && e.currentTarget.parentElement) e.currentTarget.parentElement.appendChild(popover);
        popover.classList.toggle('hidden');
        if(!popover.classList.contains('hidden')) { currentHistoryGame = id; updateHistoryUI(id); socket.emit('getGlobalResults', id); }
    }

    function toggleRules(id, e) {
        if(e) e.stopPropagation(); sfx.click();
        document.querySelectorAll('.custom-dropdown').forEach(d => { if(d.id !== 'rules-popover') d.classList.add('hidden'); });
        let popover = document.getElementById('rules-popover');
        if (e.currentTarget && e.currentTarget.parentElement) e.currentTarget.parentElement.appendChild(popover);
        popover.classList.toggle('hidden');
        if(!popover.classList.contains('hidden')) { document.getElementById('rules-title').innerText = gameInfoMap[id].title + " Rules"; document.getElementById('rules-body').innerHTML = gameInfoMap[id].body; }
    }

    function updateHistoryUI(id) {
        const list = document.getElementById('history-items'); list.innerHTML = '';
        let localH = myGameHistory[id] || []; let merged = [...localH]; let gRes = globalFallback[id];
        if (gRes && merged.length < 5) {
            for(let i=0; i < gRes.length; i++) {
                if(merged.length >= 5) break;
                let cleanRes = gRes[i].result.replace(' WINS!', '').replace(' WINS', '');
                merged.push({ result: cleanRes, bet: '-', wonProfit: 0, lostBet: 0, didBet: false });
            }
        }
        if (id === 'd20' || id === 'coinflip' || id === 'blackjack') { document.getElementById('stat-total-rounds').innerText = mySoloRounds[id] || 0; }
        if(merged.length === 0) { list.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding: 20px;">No history available yet.</div>`; return; } 
        merged.slice(0,5).forEach(h => {
            let net = formatTC(h.wonProfit - h.lostBet);
            let winVal = '-'; let lossVal = '-';
            if (h.didBet) {
                if (net > 0) { winVal = `<span style="color:var(--success)">+${fmtTC(net)}</span>`; } 
                else if (net < 0) { lossVal = `<span style="color:var(--danger)">-${fmtTC(Math.abs(net))}</span>`; } 
                else { winVal = '<span style="color:white; font-weight: 900;">PUSH</span>'; }
            }
            let bHtml = formatBetHistory(id, h.bet); let rHtml = h.result;
            if (id === 'perya') { rHtml = `<div style="display:flex; justify-content:center; align-items:center; gap:2px; flex-wrap:nowrap;">${colorsToDice(h.result)}</div>`; } 
            else { let safeR = h.result ? h.result.toString() : '-'; rHtml = `<span style="font-weight:900; color:${getBetColor(safeR.split(' ')[0])}">${safeR}</span>`; }
            list.insertAdjacentHTML('beforeend', `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:6px; display:grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap:10px; align-items:center; font-size:0.95rem; text-transform:uppercase; text-align:center; white-space:nowrap;"><div>${rHtml}</div><div>${bHtml}</div><div>${winVal}</div><div>${lossVal}</div></div>`);
        });
    }

    function renderNotifs() {
        const list = document.getElementById('notif-list-popover'); const badge = document.getElementById('notif-badge-display'); const clearBtn = document.getElementById('btn-clear-notifs');
        list.innerHTML = '';
        let unreadCount = myNotifications.filter(n => !n.read).length;
        if(unreadCount > 0) { badge.style.display = 'flex'; badge.innerText = unreadCount; badge.classList.add('pulse'); } else { badge.style.display = 'none'; badge.classList.remove('pulse'); }
        clearBtn.disabled = unreadCount > 0 || myNotifications.length === 0;
        if(myNotifications.length === 0) { list.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px;" id="no-notif-msg">No new notifications.</div>`; return; }
        myNotifications.forEach(n => {
            let cl = n.read ? '' : 'unread';
            list.insertAdjacentHTML('beforeend', `<div class="notif-item ${cl}" id="notif-${n.id}" onclick="markSingleRead(${n.id}, event)">
                <div class="notif-item-header"><span class="notif-item-title">${n.title}</span><span class="notif-item-time">${new Date(n.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></div>
                <div class="notif-item-body">${n.msg}</div>
                <button class="notif-item-del" onclick="deleteNotif(${n.id}, event)" ${n.read ? '' : 'style="display:none;"'}><i class="fas fa-times"></i></button>
            </div>`);
        });
    }

    function markSingleRead(id, e) { let n = myNotifications.find(x => x.id === id); if(n && !n.read) { n.read = true; renderNotifs(); } }
    function deleteNotif(id, e) { e.stopPropagation(); myNotifications = myNotifications.filter(x => x.id !== id); renderNotifs(); }
    function markAllNotifsRead() { myNotifications.forEach(n => n.read = true); renderNotifs(); }
    function clearNotifs() { myNotifications = []; renderNotifs(); }

    socket.on('silentNotification', (data) => {
        myNotifications.unshift({ id: data.id || Date.now(), title: data.title, msg: data.msg, read: false, date: data.date || new Date() });
        if(myNotifications.length > 50) myNotifications.pop(); renderNotifs(); 
    });

    function switchAuthTab(tab) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        if(tab === 'login') {
            document.querySelectorAll('.auth-tab')[0].classList.add('active');
            document.getElementById('auth-form-login').style.display = 'block'; document.getElementById('auth-form-register').style.display = 'none';
        } else {
            document.querySelectorAll('.auth-tab')[1].classList.add('active');
            document.getElementById('auth-form-login').style.display = 'none'; document.getElementById('auth-form-register').style.display = 'block';
        }
        document.getElementById('auth-error-login').innerText = ''; document.getElementById('auth-error-register').innerText = '';
    }

    function toggleInputPwd(inputId, icon) { const input = document.getElementById(inputId); if (input.type === "password") { input.type = "text"; icon.className = "fas fa-eye-slash"; } else { input.type = "password"; icon.className = "fas fa-eye"; } }
    document.getElementById('login-pass').addEventListener('keypress', function(e) { if (e.key === 'Enter') submitAuth('login'); });

    function submitAuth(mode) {
        const uId = mode === 'login' ? 'login-user' : 'reg-user'; const pId = mode === 'login' ? 'login-pass' : 'reg-pass';
        const user = document.getElementById(uId).value.trim(); const pass = document.getElementById(pId).value;
        const ref = mode === 'register' ? document.getElementById('reg-ref').value.trim() : null;
        if(!user || !pass) return document.getElementById(mode === 'login' ? 'auth-error-login' : 'auth-error-register').innerText = "Please fill all fields.";
        if (mode === 'login') { window.tempLoginUser = user; window.tempLoginPass = pass; }
        socket.emit(mode, { username: user, password: pass, referral: ref });
    }

    socket.on('authError', (msg) => { document.getElementById('auth-error-login').innerText = msg; document.getElementById('auth-error-register').innerText = msg; });
    socket.on('registerSuccess', (msg) => { document.getElementById('auth-error-register').className = 'auth-msg auth-success'; document.getElementById('auth-error-register').innerText = msg; setTimeout(() => { switchAuthTab('login'); }, 1000); });

    socket.on('loginSuccess', (data) => {
        if (window.tempLoginUser && window.tempLoginPass) { localStorage.setItem('snt_user', window.tempLoginUser); localStorage.setItem('snt_pass', window.tempLoginPass); }
        myUsername = data.username; myCredits = formatTC(data.credits); myPlayable = formatTC(data.playable || 0);
        let nameHTML = data.role === 'VIP' ? `<span style="color:var(--playable); text-shadow:0 0 10px var(--playable);"><i class="fas fa-crown" style="margin-right:5px;"></i>${myUsername}</span>` : myUsername;
        document.getElementById('player-name-display').innerHTML = nameHTML;
        updateMyBalance({credits: myCredits, playable: myPlayable});
        if(data.role === 'Admin' || data.role === 'Moderator') { document.querySelector('.admin-btn').classList.remove('hidden'); }
        setupDailyRewardUI(data.daily);
        document.getElementById('auth-container').style.display = 'none'; document.getElementById('app-container').style.display = 'block';
        if (audioCtx.state === 'suspended') audioCtx.resume();
        switchView('casino');
    });

    function confirmLogout() { if(confirm("Are you sure you want to log out?")) { localStorage.removeItem('snt_user'); localStorage.removeItem('snt_pass'); location.reload(); } }
    function copyDiscord(el) { navigator.clipboard.writeText('@sr.ashley'); let orig = el.innerHTML; el.innerHTML = 'Copied! <i class="fas fa-check" style="margin-left:5px; color:var(--success);"></i>'; setTimeout(() => { el.innerHTML = orig; }, 2000); }
    function triggerWinAnim() { let p1 = document.getElementById('pill-credits'); if (p1) { p1.classList.remove('anim-pop'); void p1.offsetWidth; p1.classList.add('anim-pop'); } }
    function triggerBetAnim() { let p1 = document.getElementById('pill-credits'); let p2 = document.getElementById('pill-playable'); if(p1 && p1.style.display !== 'none') { p1.classList.remove('anim-pop-bet'); void p1.offsetWidth; p1.classList.add('anim-pop-bet'); } if(p2 && p2.style.display !== 'none') { p2.classList.remove('anim-pop-bet'); void p2.offsetWidth; p2.classList.add('anim-pop-bet'); } }

    function updateMyBalance(data, didWin = false) {
        let tc = formatTC(data.credits); let ptc = formatTC(data.playable || 0);
        if(didWin && tc > myCredits) { triggerWinAnim(); }
        myCredits = tc; myPlayable = ptc;
        document.getElementById('nav-credits').innerText = fmtTC(tc); 
        const pillPlayable = document.getElementById('pill-playable'); const navPlayable = document.getElementById('nav-playable');
        if (myPlayable > 0) { pillPlayable.style.display = 'flex'; navPlayable.innerText = fmtTC(ptc); } else { pillPlayable.style.display = 'none'; }
        document.querySelectorAll('.cashier-balance-display').forEach(el => el.innerText = fmtTC(tc) + ' TC');
    }

    socket.on('balanceUpdateData', (newBalance) => { updateMyBalance(newBalance, true); });

    function setupDailyRewardUI(dailyData) {
        const container = document.getElementById('dr-days-container'); container.innerHTML = '';
        const rewards = [100, 250, 500, 750, 1000, 1500, 2000];
        for(let i=1; i<=7; i++) {
            let statClass = ''; let boxTitle = `Day ${i}`;
            if (!dailyData.canClaim && dailyData.day === 1) { statClass = 'claimed'; boxTitle = "CLAIMED"; }
            else if (i < dailyData.day) { statClass = 'claimed'; boxTitle = "CLAIMED"; } 
            else if (i === dailyData.day && dailyData.canClaim) { statClass = 'active'; }
            container.insertAdjacentHTML('beforeend', `<div class="dr-day ${statClass}" id="dr-day-${i}"><div class="dr-title">${boxTitle}</div><div class="dr-coin">${rewards[i-1]}<br>Credits</div></div>`);
        }
        let sc = document.getElementById('dr-status-container');
        if(dailyData.canClaim) { sc.innerHTML = `<button class="btn-play dr-claim-btn" id="btn-claim-reward" onclick="claimDaily()">CLAIM REWARD</button>`; } else { startDailyTimer(dailyData.nextClaim); }
    }

    function claimDaily() { socket.emit('claimDaily'); }
    socket.on('dailyClaimed', (data) => {
        let activeEl = document.querySelector('.dr-day.active');
        if (activeEl) { activeEl.classList.add('active-claimed'); activeEl.querySelector('.dr-title').innerText = "CLAIMED"; }
        updateMyBalance(data.newBalance, true); startDailyTimer(data.nextClaim);
        showLocalFlash('shared', `+${fmtTC(data.amt)} PLAYABLE`, 'success');
        setTimeout(() => { closeModal('daily-reward-modal'); }, 1500);
    });

    function startDailyTimer(nextClaimDate) {
        let sc = document.getElementById('dr-status-container');
        sc.innerHTML = `<div class="dr-status-text" style="margin-top:10px;">COME BACK TOMORROW</div><div class="dr-timer" id="dr-timer-display" style="margin-top:5px;">--:--:--</div>`;
        let dest = new Date(nextClaimDate).getTime();
        if(dailyTimerInterval) clearInterval(dailyTimerInterval);
        dailyTimerInterval = setInterval(() => {
            let now = new Date().getTime(); let d = dest - now;

    function logHistory(gid, betStr, resultStr, wonProfit, lostBet, didBet = true) {
        if(!myGameHistory[gid]) myGameHistory[gid] = [];
        let cleanRes = resultStr.replace(' WINS!', '').replace(' WINS', '');
        myGameHistory[gid].unshift({ bet: betStr, result: cleanRes, wonProfit: wonProfit, lostBet: lostBet, didBet: didBet });
        if(myGameHistory[gid].length > 5) myGameHistory[gid].pop();
        if(currentHistoryGame === gid && !document.getElementById('history-popover').classList.contains('hidden')) { updateHistoryUI(gid); }
    }

        if(data.game !== currentHistoryGame) return;
        let statsHtml = ``;
        if (data.stats.total > 0) {
            if (data.game === 'd20' || data.game === 'blackjack') {
                let winP = ((data.stats.Win / data.stats.total) * 100).toFixed(1); let loseP = ((data.stats.Lose / data.stats.total) * 100).toFixed(1);
                statsHtml = `<span><span style="color:var(--success); font-weight:800;">WIN: ${winP}%</span></span><span><span style="color:var(--danger); font-weight:800;">LOSE: ${loseP}%</span></span>`;
            } else if(data.game === 'coinflip') {
                let headsP = ((data.stats.Heads / data.stats.total) * 100).toFixed(1); let tailsP = ((data.stats.Tails / data.stats.total) * 100).toFixed(1);

            } else {
                Object.keys(data.stats).forEach(key => {
                    if (key !== 'total') {
                        let perc = ((data.stats[key] / data.stats.total) * 100).toFixed(1);
                        if (data.game === 'perya') { statsHtml += `<div style="display:flex; align-items:center; gap:2px; flex-wrap:nowrap; margin-right:5px;"><div class="color-die c-${key.toLowerCase()}" style="width:12px; height:12px; border-radius:2px; border:1px solid rgba(255,255,255,0.2);"></div><span style="color:white; font-weight:800; font-size:0.8rem;">${perc}%</span></div>`; }

    function generateCardHTML(c, isHidden = false, animateIn = true, animateReveal = false, extraClass = '') {
        let animClass = '';
        if(animateIn) animClass = 'anim-deal'; if(animateReveal) animClass = 'anim-flip'; 
        if(isHidden) return `<div class="play-card card-back ${animClass} ${extraClass}">?</div>`;
        let cleanSuit = c.suitHtml.replace(/<[^>]*>?/gm, ''); 
        let colorClass = (cleanSuit === '♥' || cleanSuit === '♦') ? 'card-red' : '';
        return `<div class="play-card ${colorClass} ${animClass} ${extraClass}"><div class="val">${c.raw}</div><div class="suit">${c.suitHtml}</div></div>`;
    }

    async function renderBJHands(data) {
        let pHand = document.getElementById('bj-p-hand'); let dHand = document.getElementById('bj-d-hand');
        if (data.event === 'deal') {
            sfx.deal('blackjack');
            pHand.innerHTML = generateCardHTML(data.pHand[0], false, true); await delay(300); sfx.deal('blackjack');
            dHand.innerHTML = generateCardHTML(data.dHand[0], false, true); await delay(300); sfx.deal('blackjack');
            pHand.insertAdjacentHTML('beforeend', generateCardHTML(data.pHand[1], false, true)); await delay(300); sfx.deal('blackjack');
            dHand.insertAdjacentHTML('beforeend', generateCardHTML(data.dHand[1], true, true)); await delay(400);

            document.getElementById('bj-p-score').innerText = getBJScore(data.pHand);
            document.getElementById('bj-d-score').innerText = data.dHand[0].bjVal;
            
            if (!data.naturalBJ) {
                document.getElementById('bj-start-controls').classList.add('hidden'); document.getElementById('bj-action-controls').classList.remove('hidden');
                if (data.pHand.length === 2) { document.getElementById('btn-bj-double').classList.remove('hidden'); }
            } else { finalizeBJ(data); }
        } 
        else if (data.event === 'hit') {
            document.getElementById('btn-bj-double').classList.add('hidden'); sfx.deal('blackjack');
            let c = data.pHand[data.pHand.length - 1]; pHand.insertAdjacentHTML('beforeend', generateCardHTML(c, false, true));
            document.getElementById('bj-p-score').innerText = getBJScore(data.pHand);
        }
        else if (data.event === 'resolved') {
            document.getElementById('bj-action-controls').classList.add('hidden');
            dHand.innerHTML = generateCardHTML(data.dHand[0], false, false) + generateCardHTML(data.dHand[1], false, false, true);
            document.getElementById('bj-d-score').innerText = getBJScore(data.dHand.slice(0, 2));
            
            if (data.pHand.length > pHand.children.length) {
                sfx.deal('blackjack'); let c = data.pHand[data.pHand.length - 1]; pHand.insertAdjacentHTML('beforeend', generateCardHTML(c, false, true));
                document.getElementById('bj-p-score').innerText = getBJScore(data.pHand);
            }
            await delay(600);
            for (let i = 2; i < data.dHand.length; i++) {
                sfx.deal('blackjack'); dHand.insertAdjacentHTML('beforeend', generateCardHTML(data.dHand[i], false, true));
                document.getElementById('bj-d-score').innerText = getBJScore(data.dHand.slice(0, i+1));
                await delay(600);
            }
            finalizeBJ(data);
        }
    }

    const dIconMap = ['dice-one', 'dice-two', 'dice-three', 'dice-four', 'dice-five', 'dice-six'];

    socket.on('lockBets', () => {
        document.querySelectorAll('.sg-tile').forEach(btn => { btn.disabled = true; });

        } else if (window.activeSharedGame === 'perya') {

        }
    });

    let isBettingTimeout = false;
    function placeSharedBet(choice) {
        if (sState.status !== 'BETTING') return;
        if (isBettingTimeout) return;
        
        let amt = formatTC(document.getElementById('sg-bet').value);
        if(isNaN(amt) || amt < 10) { showLocalFlash('shared', 'MIN BET 10 TC', 'error'); return; }
        
        let currentTileBet = mySBets[choice] || 0;
        if (currentTileBet + amt > 50000) { showLocalFlash('shared', "Max 50K TC Per Tile", "error"); return; }
        if (amt > (myCredits + myPlayable)) { showLocalFlash('shared', "Insufficient TC", "error"); return; }
        
        isBettingTimeout = true; setTimeout(() => { isBettingTimeout = false; }, 250);
        triggerBetAnim(); sfx.click();
        
        if(myPlayable >= amt) { myPlayable -= amt; } else { let rem = amt - myPlayable; myPlayable = 0; myCredits -= rem; }
        updateMyBalance({credits: myCredits, playable: myPlayable});
        
        if(!mySBets[choice]) mySBets[choice] = 0;
        mySBets[choice] += amt; mySBetsStack.push({choice: choice, amount: amt});
        
        let btn = document.querySelector(`.sg-tile[data-choice="${choice}"]`);
        if(btn) { btn.classList.add('has-bet'); let badge = btn.querySelector('.tile-bet-badge'); badge.innerText = fmtTC(mySBets[choice]); badge.style.display = 'block'; }
        
        updateCurrentBetsPopover();
        socket.emit('placeSharedBet', { room: window.activeSharedGame, choice: choice, amount: amt });
    }

    function undoSharedBet(room) {
        if (sState.status !== 'BETTING') return;
        if (mySBetsStack.length === 0) { showLocalFlash('shared', 'NO BETS TO UNDO', 'error'); return; }
        sfx.click(); socket.emit('undoSharedBet', { room: window.activeSharedGame });
    }

    socket.on('undoSuccess', (data) => {
        mySBetsStack.pop();
        if(mySBets[data.choice]) {
            mySBets[data.choice] -= data.amount;
            let btn = document.querySelector(`.sg-tile[data-choice="${data.choice}"]`);
            if(btn) {
                let badge = btn.querySelector('.tile-bet-badge');
                if (mySBets[data.choice] > 0) { badge.innerText = fmtTC(mySBets[data.choice]); } 
                else { delete mySBets[data.choice]; badge.style.display = 'none'; btn.classList.remove('has-bet'); }
            }
        }
        updateCurrentBetsPopover(); updateMyBalance(data.newBalance);
        showLocalFlash('shared', 'BET UNDONE', 'success'); sfx.tick();
    });

    socket.on('sharedBetConfirmed', (data) => { updateMyBalance(data.newBalance); });

    socket.on('newRound', () => {
        sState.status = 'BETTING'; mySBets = {}; mySBetsStack = [];
        document.querySelectorAll('.sg-tile').forEach(btn => { btn.disabled = false; btn.classList.remove('has-bet'); let badge = btn.querySelector('.tile-bet-badge'); if(badge) badge.style.display = 'none'; });
        updateCurrentBetsPopover();
        
        let ov = document.getElementById('sg-overlay'); if(ov) ov.classList.remove('show');
        
        if (window.activeSharedGame === 'baccarat') {
            document.getElementById('sg-bac-p-hand').innerHTML = ``; document.getElementById('sg-bac-b-hand').innerHTML = ``;
            document.getElementById('sg-bac-p-score').innerText = '0'; document.getElementById('sg-bac-b-score').innerText = '0';
        } else if (window.activeSharedGame === 'perya') {
            document.getElementById('sg-perya-dice').innerHTML = `<div class="color-die c-grey"><i class="fas fa-question"></i></div><div class="color-die c-grey"><i class="fas fa-question"></i></div><div class="color-die c-grey"><i class="fas fa-question"></i></div>`;
        } else if (window.activeSharedGame === 'dt') {
            document.getElementById('sg-dt-dragon').innerHTML = `<div class="play-card card-back dt-card">?</div>`; document.getElementById('sg-dt-tiger').innerHTML = `<div class="play-card card-back dt-card">?</div>`;
        } else if (window.activeSharedGame === 'sicbo') {
            document.getElementById('sg-sicbo-dice').innerHTML = `<div class="color-die c-grey s-die" style="width:80px; height:80px; font-size:3rem;"><i class="fas fa-question"></i></div><div class="color-die c-grey s-die" style="width:80px; height:80px; font-size:3rem;"><i class="fas fa-question"></i></div><div class="color-die c-grey s-die" style="width:80px; height:80px; font-size:3rem;"><i class="fas fa-question"></i></div>`;
            document.getElementById('sg-sicbo-sum').style.opacity = '0';
        }
    });

    socket.on('sharedResults', async (data) => {
        if (data.room !== window.activeSharedGame) return;
        let ov = document.getElementById('sg-overlay'); let rT = document.getElementById('sg-res-title'); let rP = document.getElementById('sg-res-payout');
        ov.classList.remove('win', 'lose', 'push');
        
        let totalBet = Object.values(mySBets).reduce((a,b)=>a+b, 0);
        let myWin = 0; let net = 0; let statClass = ''; let displayStr = '';

        if (data.room === 'dt') {
            document.getElementById('sg-dt-dragon').innerHTML = generateCardHTML(data.dCard, false, false, true, 'dt-card'); sfx.deal('dt');
            await delay(800); 
            document.getElementById('sg-dt-tiger').innerHTML = generateCardHTML(data.tCard, false, false, true, 'dt-card'); sfx.deal('dt');
            if (data.winner === 'Tie') { if (mySBets['Tie']) myWin = mySBets['Tie'] * 9; else if(mySBets['Dragon'] || mySBets['Tiger']) myWin = (mySBets['Dragon']||0) + (mySBets['Tiger']||0); } 
            else { if (mySBets[data.winner]) myWin = mySBets[data.winner] * 2; }
        } 
        else if (data.room === 'sicbo') {
            let dc = document.getElementById('sg-sicbo-dice'); await delay(1000);  dc.innerHTML = '';
            for(let i=0; i<3; i++) { dc.innerHTML += `<i class="fas fa-${dIconMap[data.roll[i]-1]} s-die anim-pop" style="font-size: 6rem; color: white; text-shadow: 0 10px 20px rgba(0,0,0,0.8);"></i>`; }
            sfx.deal('sicbo'); await delay(500); 
            document.getElementById('sg-sicbo-sum').innerText = data.sum; document.getElementById('sg-sicbo-sum').style.opacity = '1';
            if (mySBets[data.winner]) myWin = mySBets[data.winner] * 2;
        } 
        else if (data.room === 'perya') {
            let dc = document.getElementById('sg-perya-dice'); let diceEls = dc.querySelectorAll('.color-die');
            const cols = ['Yellow', 'White', 'Pink', 'Blue', 'Red', 'Green']; sfx.tick('perya');
            let flashInt = setInterval(() => { diceEls.forEach(el => { el.className = `color-die c-${cols[Math.floor(Math.random() * cols.length)].toLowerCase()}`; }); }, 100);
            await delay(1500); clearInterval(flashInt);
            for(let i=0; i<3; i++) { diceEls[i].className = `color-die c-${data.roll[i].toLowerCase()} anim-pop`; sfx.coin('perya'); await delay(200); }
            Object.keys(mySBets).forEach(choice => { let matches = data.roll.filter(c => c === choice).length; if(matches > 0) myWin += mySBets[choice] + (mySBets[choice] * matches); });
        }
        else if (data.room === 'baccarat') {
            let pHand = document.getElementById('sg-bac-p-hand'); let bHand = document.getElementById('sg-bac-b-hand');
            pHand.insertAdjacentHTML('beforeend', generateCardHTML(data.pCards[0], false, false, true)); sfx.deal('baccarat'); await delay(500);
            bHand.insertAdjacentHTML('beforeend', generateCardHTML(data.bCards[0], false, false, true)); sfx.deal('baccarat'); await delay(500);
            pHand.insertAdjacentHTML('beforeend', generateCardHTML(data.pCards[1], false, false, true)); sfx.deal('baccarat'); await delay(500);
            bHand.insertAdjacentHTML('beforeend', generateCardHTML(data.bCards[1], false, false, true)); sfx.deal('baccarat'); await delay(800);

            let centerMsg = document.getElementById('bac-center-msg');
            if (data.p3Drawn) { centerMsg.innerText = 'DRAWING 3RD CARD FOR PLAYER...'; centerMsg.style.opacity = '1'; await delay(800); centerMsg.style.opacity = '0'; pHand.insertAdjacentHTML('beforeend', generateCardHTML(data.pCards[2], false, true)); sfx.deal('baccarat'); await delay(800); }
            if (data.b3Drawn) { centerMsg.innerText = 'DRAWING 3RD CARD FOR BANKER...'; centerMsg.style.opacity = '1'; await delay(800); centerMsg.style.opacity = '0'; bHand.insertAdjacentHTML('beforeend', generateCardHTML(data.bCards[2], false, true)); sfx.deal('baccarat'); await delay(800); }

            document.getElementById('sg-bac-p-score').innerText = data.pScore; document.getElementById('sg-bac-b-score').innerText = data.bScore;

            if (data.winner === 'Tie') { if (mySBets['Tie']) myWin = mySBets['Tie'] * 9; else if(mySBets['Player'] || mySBets['Banker']) myWin = (mySBets['Player']||0) + (mySBets['Banker']||0); } 
            else if (data.winner === 'Player') { if (mySBets['Player']) myWin = mySBets['Player'] * 2; } 
            else if (data.winner === 'Banker') { if (mySBets['Banker']) myWin = mySBets['Banker'] * 1.95; }
        }

        net = formatTC(myWin - totalBet);
        let myBetStrs = Object.keys(mySBets).length > 0 ? Object.keys(mySBets).join(', ') : '-';
        logHistory(data.room, myBetStrs, data.resStr, myWin, totalBet, totalBet > 0);

        if (totalBet > 0) {
            const payoutAnim = async () => {
                let losses = Object.keys(mySBets).filter(c => c !== data.winner && !(data.winner === 'Tie' && (c === 'Player' || c === 'Banker') && data.room === 'baccarat'));
                for(let choice of losses) {
                    let btn = document.querySelector(`.sg-tile[data-choice="${choice}"]`);
                    if(btn) {
                        let bRect = btn.getBoundingClientRect(); let coin = document.createElement('div'); coin.className = 'animated-chip';
                        coin.style.cssText = `background: var(--danger); color: white; width: auto; padding: 5px 10px; border-radius: 8px; font-weight: 900; position: absolute; left: ${bRect.left + (bRect.width/2)}px; top: ${bRect.top}px; transform: translateX(-50%); z-index: 9999;`;
                        coin.innerText = `-${fmtTC(mySBets[choice])}`; document.body.appendChild(coin);
                        setTimeout(() => { coin.style.top = '100px'; coin.style.opacity = '0'; }, 30); setTimeout(() => { if(coin.parentNode) coin.remove(); }, 500);
                        sfx.lose(data.room); await delay(300);
                    }
                }
                let wins = Object.keys(mySBets).filter(c => c === data.winner || (data.winner === 'Tie' && (c === 'Player' || c === 'Banker') && data.room === 'baccarat'));
                for(let choice of wins) {
                    let btn = document.querySelector(`.sg-tile[data-choice="${choice}"]`);
                    if(btn) {
                        let bRect = btn.getBoundingClientRect();
                        let wAmt = data.winner === 'Tie' && choice === 'Tie' ? mySBets[choice] * 9 : (data.winner === 'Tie' ? mySBets[choice] : mySBets[choice] * (data.room === 'baccarat' && choice === 'Banker' ? 1.95 : 2));
                        let coin = document.createElement('div'); coin.className = 'animated-chip';
                        coin.style.cssText = `background: var(--success); color: black; width: auto; padding: 5px 10px; border-radius: 8px; font-weight: 900; position: absolute; left: ${bRect.left + (bRect.width/2)}px; top: ${bRect.top}px; transform: translateX(-50%); z-index: 9999; box-shadow: 0 0 15px var(--success);`;
                        coin.innerText = `+${fmtTC(wAmt)}`; document.body.appendChild(coin);
                        setTimeout(() => { coin.style.top = '10px'; coin.style.opacity = '0'; }, 30); setTimeout(() => { if(coin.parentNode) coin.remove(); }, 500);
                        sfx.win(data.room); await delay(300);
                    }
                }
            };
            await payoutAnim();

            rP.style.display = 'block';
            if (net > 0) { statClass = 'win'; displayStr = `+${fmtTC(net)}`; sfx.win(data.room); } 
            else if (net < 0) { statClass = 'lose'; displayStr = `LOST`; sfx.lose(data.room); } 
            else { statClass = 'push'; displayStr = `PUSH`; sfx.win(data.room); }
            
            ov.classList.add(statClass); rT.innerText = data.resStr; rP.innerText = displayStr; ov.classList.add('show');
            setTimeout(() => { socket.emit('requestBalanceRefresh'); }, 1000);
        } else {
            showLocalFlash('shared', data.resStr, 'success');
        }
    });

    function sendChat(isMbj = false) {
        let inputId = isMbj ? 'mbj-chat-input' : 'chat-input';
        let boxId = isMbj ? 'mbj-chat' : 'sg-chat';
        let input = document.getElementById(inputId); let msg = input.value.trim();
        if(msg.length > 0) { 
            let box = document.getElementById(boxId);
            box.insertAdjacentHTML('beforeend', `<div class="chat-line"><span class="c-name" style="color:var(--ps-glow); font-weight:900;">You:</span> <span class="c-msg" style="color:white;">${msg}</span></div>`);
            box.scrollTop = box.scrollHeight;
            socket.emit('sendChat', { msg: msg }); 
            input.value = ''; 
        }
    }
    
    function sendMBJChat() { sendChat(true); }

    socket.on('chatMessage', (data) => {
        let boxId = window.activeSharedGame === 'mbj' ? 'mbj-chat' : 'sg-chat';
        let box = document.getElementById(boxId);
        if (box && window.activeSharedGame) {
            let sysClass = data.sys ? 'chat-sys' : '';
            if (data.sys) { box.insertAdjacentHTML('beforeend', `<div class="chat-line ${sysClass}">${data.text}</div>`); } 
            else { box.insertAdjacentHTML('beforeend', `<div class="chat-line"><span class="c-name" style="color:var(--text-muted); font-weight:900;">${data.user}:</span> <span class="c-msg" style="color:white;">${data.text}</span></div>`); }
            box.scrollTop = box.scrollHeight;
        }
    });
    
    function backToSharedLobby() { 
        if (window.activeSharedGame === 'mbj') {
            if (localSeatId && currentMBJSeats[localSeatId] && currentMBJSeats[localSeatId].hands.length > 0 && currentMBJSeats[localSeatId].hands[0].bet > 0 && mbjGameState === 'BETTING') {
                showLocalFlash('mbj', "Wait for round to finish.", "error"); return;
            }
            sitUp(); document.getElementById('view-game-mbj').classList.add('hidden');
            socket.emit('leaveRoom', 'mbj'); window.activeSharedGame = null; switchView('casino'); openLobbyMode('shared'); return;
        }
        if (window.activeSharedGame && mySBets && Object.values(mySBets).reduce((a,b)=>a+b,0) > 0 && sState.status === 'BETTING') { showLocalFlash('shared', "Wait for round to finish.", "error"); return; }
        document.getElementById('view-shared-game').classList.add('hidden'); 
        socket.emit('leaveRoom', window.activeSharedGame); window.activeSharedGame = null; 
        switchView('casino'); openLobbyMode('shared'); 
    }
    
    // =======================================================
    // VIP BLACKJACK LOGIC & UI INTEGRATION
    // =======================================================
    let mbjGameState = 'BETTING'; let localPendingBet = 0; let localSeatId = null;
    let renderedCardCount = { 1:[], 2:[], 3:[], 4:[], 5:[] };
    let currentMBJSeats = { 1:null, 2:null, 3:null, 4:null, 5:null };

    function openMBJ() {
        window.activeSharedGame = 'mbj'; socket.emit('joinRoom', 'mbj');
        renderedCardCount = { 1:[], 2:[], 3:[], 4:[], 5:[] }; renderMBJSeats({ 1:null, 2:null, 3:null, 4:null, 5:null });
        document.getElementById('mbj-chat').innerHTML = '<div class="chat-line chat-sys">Welcome to VIP Premium.</div>';
        switchView('game-mbj');
    }

    function getMBJDisplayScore(handCards) {
        let score = 0, aces = 0;
        for (let c of handCards) { score += c.bjVal; if (c.raw === 'A') aces++; }
        while (score > 21 && aces > 0) { score -= 10; aces--; }
        if (aces > 0 && score < 21) { return `<span style="font-size:0.75rem; letter-spacing:-0.5px;">${score - 10}/${score}</span>`; }
        return `<span style="font-size:1.05rem;">${score}</span>`;
    }

    function generateMBJCardHTML(c, isHidden = false, animateIn = true, animateReveal = false, leftOffset = 0, isDoubled = false) {
        let animClass = '';
        if(animateIn) { animClass = isDoubled ? 'anim-fly-in-doubled' : 'anim-fly-in'; }
        if(animateReveal) animClass = 'anim-reveal'; 
        let doubleClass = isDoubled ? 'card-doubled' : ''; let styleStr = `left: ${leftOffset}px;`;
        if(isHidden) return `<div class="mbj-card card-back ${animClass} ${doubleClass}" style="${styleStr}"></div>`;
        let cleanSuit = c.suitHtml.replace(/<[^>]*>?/gm, ''); 
        let colorClass = (cleanSuit === '♥' || cleanSuit === '♦') ? 'card-red' : 'card-black';
        return `<div class="mbj-card ${colorClass} ${animClass} ${doubleClass}" style="${styleStr}"><div class="card-tl"><div>${c.raw}</div><div style="font-size:1.1rem; margin-top:-2px;">${cleanSuit}</div></div><div class="card-br"><div>${c.raw}</div><div style="font-size:1.1rem; margin-top:-2px;">${cleanSuit}</div></div></div>`;
    }

    function getMBJChipStackHTML(amount, isGhost = false) {
        let html = ''; let remaining = amount;
        let chips = [{val: 50000, col: '#ffcc00', text: 'black'}, {val: 10000, col: '#00e676', text: 'black'}, {val: 1000, col: '#ff3366', text: 'white'}, {val: 100, col: '#00a2ff', text: 'white'}, {val: 10, col: '#444', text: 'white'}];
        let offset = 0; let visualCount = 0;
        for(let c of chips) {
            while(remaining >= c.val && visualCount < 6) { 
                let label = c.val >= 1000 ? (c.val/1000)+'K' : c.val;
                html += `<div class="mbj-chip-3d ${isGhost ? 'ghost' : ''}" style="--c-bg:${c.col}; color:${c.text}; bottom:${offset}px; z-index:${visualCount};">${label}</div>`;
                remaining -= c.val; offset += 4; visualCount++;
            }
        }
        return `<div class="chip-stack-wrapper" style="height: ${45 + offset}px;">${html}</div>`;
    }

    function animateMBJChipSequence(fromId, toId, color) {
        let fromEl = document.getElementById(fromId); let toEl = document.getElementById(toId);
        if(!fromEl || !toEl) return;
        let fRect = fromEl.getBoundingClientRect(); let tRect = toEl.getBoundingClientRect();
        let chip = document.createElement('div'); chip.className = `animated-chip`;
        chip.style.cssText = `--c-bg: ${color}; left: ${fRect.left + (fRect.width/2)}px; top: ${fRect.top + (fRect.height/2)}px; margin-left: -22.5px; margin-top: -22.5px; position:absolute; z-index:9999; border-radius:50%; width:40px; height:40px; box-shadow:0 0 10px rgba(0,0,0,0.5); border:2px solid var(--c-bg); background:radial-gradient(circle at center, #fff 0%, #fff 40%, transparent 41%), repeating-conic-gradient(var(--c-bg) 0% 10%, #fff 10% 20%); transition: all 0.5s ease-in-out;`;
        document.body.appendChild(chip); void chip.offsetWidth;
        setTimeout(() => { chip.style.left = `${tRect.left + (tRect.width/2)}px`; chip.style.top = `${tRect.top + (tRect.height/2)}px`; chip.style.opacity = '0'; }, 30);
        setTimeout(() => { if(chip.parentNode) chip.remove(); }, 500);
    }

    let isMbjActionTimeout = false;
    function sendMBJAction(type) {
        if(isMbjActionTimeout) return; isMbjActionTimeout = true; sfx.click();
        socket.emit('mbjAction', { type: type }); setTimeout(() => { isMbjActionTimeout = false; }, 500);
    }

    function sitDown(seatNum) { sfx.click(); socket.emit('mbjTakeSeat', seatNum); currentMBJSeats[seatNum] = { username: myUsername, hands: [] }; renderMBJSeats(); }
    function sitUp() { sfx.click(); socket.emit('mbjLeaveSeat'); if(localSeatId) currentMBJSeats[localSeatId] = null; localSeatId = null; renderMBJSeats(); }

    function renderMBJSeats(seats, activeTurnObj = null) {
        currentMBJSeats = seats || currentMBJSeats; 
        let cont = document.getElementById('mbj-seats-row'); if(!cont) return; 
        let htmlBuffer = ''; let activeSeatNum = activeTurnObj ? activeTurnObj.seat : null; let activeHandIdx = activeTurnObj ? activeTurnObj.handIdx : 0; localSeatId = null;

        for(let i=1; i<=5; i++) {
            let s = currentMBJSeats[i]; let isMe = s && s.username === myUsername; if (isMe) localSeatId = i;
            if (mbjGameState !== 'BETTING' && (!s || !s.hands || s.hands.length === 0 || s.hands[0].bet === 0)) { continue; }

            let isMySeatTurn = activeSeatNum == i; let dimClass = (mbjGameState === 'PLAYER_TURN' && !isMySeatTurn && s) ? 'dimmed' : '';
            let activeClass = isMySeatTurn ? 'active-turn' : ''; let boxClass = `mbj-seat-circle ${s ? 'occupied' : ''}`;
            let canSit = !s && mbjGameState === 'BETTING' && !Object.values(currentMBJSeats).some(st => st && st.username === myUsername);
            let clickAction = canSit ? `sitDown(${i})` : ``; 

            let html = `<div class="mbj-seat-wrapper ${activeClass} ${dimClass}" id="mbj-seat-${i}">`;
            let displayBet = s && s.hands && s.hands.length > 0 ? s.hands[0].bet : 0;
            if (isMe && mbjGameState === 'BETTING' && localPendingBet > 0 && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0)) displayBet = localPendingBet;

            if (s && s.hands && s.hands.length > 0) {
                if (!renderedCardCount[i]) renderedCardCount[i] = [];
                html += `<div class="mbj-hands-wrapper">`;
                s.hands.forEach((hand, hIdx) => {
                    let isThisHandActive = isMySeatTurn && activeHandIdx === hIdx; let cardCount = hand.cards.length;
                    let splitClass = s.hands.length > 1 ? (hIdx === 0 ? 'mbj-hand-split-0' : 'mbj-hand-split-1') : '';
                    html += `<div class="mbj-hand-column ${splitClass}">`;
                    if (isThisHandActive && mbjGameState === 'PLAYER_TURN' && isMe) {
                        document.getElementById('mbj-actions-ui').style.display = 'flex';
                        document.getElementById('mbj-btn-double').style.display = hand.cards.length === 2 ? 'flex' : 'none';
                        document.getElementById('mbj-btn-split').style.display = (hand.cards.length === 2 && (hand.cards[0].bjVal === hand.cards[1].bjVal) && s.hands.length === 1) ? 'flex' : 'none';
                    }
                    let containerWidth = cardCount > 0 ? ((cardCount - 1) * 20) + 70 : 70; 
                    html += `<div class="mbj-hand-container" style="width: ${containerWidth}px;">`;
                    
                    let previouslyRendered = renderedCardCount[i][hIdx] || 0; let isNewCard = cardCount > previouslyRendered;
                    let delayClassBadge = isNewCard ? 'mbj-delay-badge' : ''; let delayClassPill = isNewCard ? 'mbj-delay-pill' : '';

                    if(hand.cards.length > 0 && hand.status !== 'BUST') { 
                        if(hand.status === 'BLACKJACK') { html += `<div class="mbj-status-pill mbj-pill-bj ${delayClassPill}">BLACKJACK</div>`; } 
                        else { let badgeClass = isThisHandActive ? 'mbj-score-active' : 'mbj-score-inactive'; html += `<div class="mbj-score-badge ${badgeClass} ${delayClassBadge}">${getMBJDisplayScore(hand.cards)}</div>`; }
                    } else if (hand.status === 'BUST') { html += `<div class="mbj-status-pill mbj-pill-bust ${delayClassPill}">${hand.score} BUST</div>`; }

                    hand.cards.forEach((c, cIdx) => { 
                        let animateThisCard = cIdx >= previouslyRendered; let isDoubledCard = (hand.doubledAmount > 0 && cIdx === hand.cards.length - 1);
                        html += generateMBJCardHTML(c, false, animateThisCard, false, cIdx * 20, isDoubledCard);
                    });
                    html += `</div></div>`; 
                });
                html += `</div>`; renderedCardCount[i] = s.hands.map(h => h.cards.length);
            } else { 
                renderedCardCount[i] = []; 
                html += `<div class="mbj-hands-wrapper"><div class="mbj-hand-column" style="position: relative;"><div class="mbj-hand-container" style="width: 70px;"></div></div></div>`; 
            }
            
            html += `<div class="mbj-circle-container" id="mbj-circle-${i}-0"><div class="${boxClass}" ${clickAction ? `onclick="${clickAction}"` : ''} style="${canSit ? 'cursor:pointer;' : 'cursor:default;'}">`;
            if (displayBet > 0) { html += `<div id="mbj-chip-stack-${i}-0" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;">${getMBJChipStackHTML(displayBet, (s && s.hands && s.hands.length > 0 && s.hands[0].bet > 0) ? false : true)}</div>`; } 
            else { html += `<i class="fas fa-plus" style="font-size:1.5rem; opacity:${mbjGameState==='BETTING' ? 0.7 : 0.1}; color: white;"></i>`; }
            html += `</div></div>`; 

            if (displayBet > 0) html += `<div class="bet-pill">${fmtTC(displayBet)} TC</div>`;
            let nameHTML = s ? s.username : 'EMPTY';
            html += `<div class="mbj-seat-name" style="color: ${isMe ? 'var(--ps-glow)' : (s ? 'white' : 'var(--text-muted)')}; opacity:${s || mbjGameState==='BETTING' ? 1 : 0.3};" id="mbj-seat-name-${i}">${nameHTML}</div>`;
            html += `<div class="player-timer-track"><div class="player-timer-fill" id="mbj-timer-fill-${i}"></div></div>`;

            if(isMe && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0) && mbjGameState === 'BETTING') { html += `<div style="margin-top:5px;"><button class="btn-play" onclick="sitUp();" style="padding:4px 10px; font-size:0.7rem; background:rgba(255,51,102,0.2); border-color:var(--danger);">LEAVE</button></div>`; }
            html += `</div>`; htmlBuffer += html;
        }
        
        cont.innerHTML = htmlBuffer;
        let bettingUi = document.getElementById('mbj-betting-ui'); let actionsUi = document.getElementById('mbj-actions-ui');
        
        if (mbjGameState === 'BETTING') {
            actionsUi.style.display = 'none';
            if (localSeatId && currentMBJSeats[localSeatId] && (!currentMBJSeats[localSeatId].hands || currentMBJSeats[localSeatId].hands.length === 0 || currentMBJSeats[localSeatId].hands[0].bet === 0)) { bettingUi.style.display = 'flex'; } 
            else { bettingUi.style.display = 'none'; }
        } else {
            bettingUi.style.display = 'none';
            if (mbjGameState !== 'PLAYER_TURN' || !activeSeatNum || currentMBJSeats[activeSeatNum].username !== myUsername) { actionsUi.style.display = 'none'; }
            localPendingBet = 0;
        }
    }

    let isMBJBettingTimeout = false;
    function mbjConfirmLocalBet() {
        if (isMBJBettingTimeout) return; sfx.click();
        let customInput = document.getElementById('mbj-custom-bet').value; let v = parseInt(customInput);
        if (!isNaN(v) && v > 0) { 
            if (v > 50000) { showLocalFlash('mbj', 'Max Bet 50K TC', 'error'); return; }
            if (v > (myCredits + myPlayable)) { showLocalFlash('mbj', 'Insufficient TC', 'error'); return; }
            localPendingBet = v; document.getElementById('mbj-custom-bet').value = ''; 
        }
        if(localPendingBet < 10) return showLocalFlash('mbj', 'Min Bet 10 TC');

        isMBJBettingTimeout = true; setTimeout(() => { isMBJBettingTimeout = false; }, 250);

        if(myPlayable >= localPendingBet) { myPlayable -= localPendingBet; } else { let rem = localPendingBet - myPlayable; myPlayable = 0; myCredits -= rem; }
        updateMyBalance({credits: myCredits, playable: myPlayable});

        if (localSeatId && currentMBJSeats[localSeatId]) {
            let s = currentMBJSeats[localSeatId]; if (!s.hands) s.hands = [];
            if (s.hands.length === 0) { s.hands.push({ bet: 0, originalBet: 0, doubledAmount: 0, cards: [], score: 0, status: 'WAITING', isSplitHand: false }); }
            s.hands[0].bet += localPendingBet;
        }
        socket.emit('mbjPlaceBet', localPendingBet); localPendingBet = 0; renderMBJSeats(); 
    }

    socket.on('mbjUpdate', async (data) => {
        if(window.activeSharedGame !== 'mbj') return;
        let dTimerText = document.getElementById('mbj-dealer-timer-text');

        if(data.event === 'timer') {
            mbjGameState = 'BETTING'; 
            if(data.active) { dTimerText.style.display = 'block'; dTimerText.innerText = data.time; sfx.tick('mbj'); } else { dTimerText.style.display = 'none'; }
        } 
        else if (data.event === 'sync_seats') { renderMBJSeats(data.seats, data.activeTurn); } 
        else if (data.event === 'lock_bets') { mbjGameState = 'DEALING'; dTimerText.style.display = 'none'; renderMBJSeats(data.seats, null); } 
        else if (data.event === 'deal') {
            mbjGameState = 'DEALING'; let targetSeats = JSON.parse(JSON.stringify(data.seats));
            for (let i = 1; i <= 5; i++) { if (currentMBJSeats[i] && currentMBJSeats[i].hands && currentMBJSeats[i].hands.length > 0) { currentMBJSeats[i].hands[0].cards = []; currentMBJSeats[i].hands[0].score = 0; currentMBJSeats[i].hands[0].status = 'WAITING'; } }
            renderedCardCount = { 1:[], 2:[], 3:[], 4:[], 5:[] }; renderMBJSeats(currentMBJSeats, null); 
            
            let dHand = document.getElementById('mbj-fs-dealer-hand');
            if(dHand) { 
                dHand.innerHTML = ''; dHand.style.width = '70px'; 
                const dealSequence = async () => {
                    let activeKeys = Object.keys(targetSeats).filter(k => targetSeats[k] !== null);
                    for (let k of activeKeys) {
                        currentMBJSeats[k].hands[0].cards.push(targetSeats[k].hands[0].cards[0]);
                        currentMBJSeats[k].hands[0].score = getBJScore(currentMBJSeats[k].hands[0].cards);
                        renderMBJSeats(currentMBJSeats, null); sfx.deal('mbj'); await delay(400);
                    }
                    
                    let html = `<div class="mbj-score-badge mbj-score-inactive mbj-delay-badge" id="mbj-d-score-badge"><span>${data.dealerHand[0].bjVal}</span></div>`;
                    html += generateMBJCardHTML(data.dealerHand[0], false, true, false, 0); 
                    document.getElementById('mbj-d-score-badge-container').innerHTML = `<div class="mbj-score-badge mbj-score-inactive mbj-delay-badge" id="mbj-d-score-badge"><span>${data.dealerHand[0].bjVal}</span></div>`;
                    dHand.innerHTML = generateMBJCardHTML(data.dealerHand[0], false, true, false, 0); sfx.deal('mbj'); await delay(400);
                    
                    for (let k of activeKeys) {
                        currentMBJSeats[k].hands[0].cards.push(targetSeats[k].hands[0].cards[1]);
                        currentMBJSeats[k].hands[0].score = targetSeats[k].hands[0].score; currentMBJSeats[k].hands[0].status = targetSeats[k].hands[0].status;
                        renderMBJSeats(currentMBJSeats, null); sfx.deal('mbj'); await delay(400);
                    }
                    dHand.insertAdjacentHTML('beforeend', generateMBJCardHTML(data.dealerHand[1], true, true, false, 20)); dHand.style.width = '90px'; sfx.deal('mbj');
                }; dealSequence();
            } 
        } 
        else if (data.event === 'turn') {
            mbjGameState = 'PLAYER_TURN'; renderMBJSeats(data.seats, data.activeTurn);
            setTimeout(() => { if (data.activeTurn && data.activeTurn.seat) { let bar = document.getElementById(`mbj-timer-fill-${data.activeTurn.seat}`); if (bar) bar.style.width = ((data.time / 15) * 100) + '%'; } }, 10);
        } 
        else if (data.event === 'turn_timer') { 
            if (data.activeTurn && data.activeTurn.seat) { let bar = document.getElementById(`mbj-timer-fill-${data.activeTurn.seat}`); if (bar) { bar.style.transition = 'width 1s linear'; bar.style.width = ((data.time / 15) * 100) + '%'; } }
        }
        else if (data.event === 'dealer_resolved') {
            mbjGameState = 'RESOLVING'; renderMBJSeats(data.seats); 
            let dHand = document.getElementById('mbj-fs-dealer-hand'); let badgeCont = document.getElementById('mbj-d-score-badge-container');
            if(dHand && badgeCont) {
                let initialDScore = getBJScore(data.dealerHand.slice(0,2)); let isBlackjack = (initialDScore === 21 && data.dealerHand.length === 2);
                if (isBlackjack) badgeCont.innerHTML = `<div class="mbj-status-pill mbj-pill-bj mbj-delay-pill" id="mbj-d-score-badge">BLACKJACK</div>`;
                else badgeCont.innerHTML = `<div class="mbj-score-badge mbj-score-inactive mbj-delay-badge" id="mbj-d-score-badge"><span>${initialDScore}</span></div>`;

                dHand.innerHTML = generateMBJCardHTML(data.dealerHand[0], false, false, false, 0) + generateMBJCardHTML(data.dealerHand[1], false, false, true, 20); 
                
                const drawRemaining = async () => {
                    await delay(800); 
                    for(let i=2; i<data.dealerHand.length; i++) { 
                        dHand.style.width = `${(i * 20) + 70}px`; let currentScore = getBJScore(data.dealerHand.slice(0, i+1)); let badge = document.getElementById('mbj-d-score-badge');
                        if (currentScore > 21) { if(badge) badge.outerHTML = `<div class="mbj-status-pill mbj-pill-bust mbj-delay-pill" id="mbj-d-score-badge">${currentScore} BUST</div>`; } 
                        else { if(badge) badge.innerHTML = `<span>${currentScore}</span>`; }
                        dHand.insertAdjacentHTML('beforeend', generateMBJCardHTML(data.dealerHand[i], false, true, false, i * 20)); sfx.deal('mbj'); await delay(800); 
                    }
                    await delay(600);
                    for(let i = 1; i <= 5; i++) {
                        let seat = data.seats[i]; let res = data.results && data.results[i];
                        if (seat && res) {
                            let chipCont = document.getElementById(`mbj-chip-stack-${i}-0`);
                            if (res.status === 'LOSS') { animateMBJChipSequence(`mbj-circle-${i}-0`, 'mbj-dealer-area', '#444'); if (chipCont) chipCont.style.opacity = '0'; sfx.lose('mbj'); } 
                            else if (res.status === 'WIN') {
                                animateMBJChipSequence('mbj-dealer-area', `mbj-circle-${i}-0`, '#00e676');
                                setTimeout(() => { document.getElementById(`mbj-seat-name-${i}`).insertAdjacentHTML('beforeend', `<div class="payout-flare" style="color:var(--success); font-weight:900; animation: popIn 0.3s ease-out;">+ ${fmtTC(res.win)}</div>`); }, 400); sfx.win('mbj');
                            } else if (res.status === 'PUSH') {
                                setTimeout(() => { document.getElementById(`mbj-seat-name-${i}`).insertAdjacentHTML('beforeend', `<div class="payout-flare" style="color:#ffcc00; font-weight:900; animation: popIn 0.3s ease-out;">PUSH</div>`); }, 400); sfx.win('mbj');
                            }
                            await delay(300); 
                        }
                    }
                    setTimeout(() => { socket.emit('requestBalanceRefresh'); }, 1000);
                }; drawRemaining();
            }
        } 
        else if (data.event === 'new_round') {
            mbjGameState = 'BETTING'; document.getElementById('mbj-fs-dealer-hand').innerHTML = ''; document.getElementById('mbj-d-score-badge-container').innerHTML = '';
            renderedCardCount = { 1:[], 2:[], 3:[], 4:[], 5:[] }; renderMBJSeats(data.seats); 
        }
    });

    // =======================================================
    // CASHIER & MODAL NAVIGATION LOGIC
    // =======================================================
    function openCashier() { sfx.click(); openModal('support-center-modal'); switchSupportCenterTab('deposit', document.querySelectorAll('#cashier-tabs-nav .bank-tab')[0]); }
    function switchSupportCenterTab(tab, btn) {
        if(btn) sfx.click();
        document.querySelectorAll('.bank-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.bank-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.bank-section').forEach(s => s.classList.remove('active'));
        if(btn) btn.classList.add('active');
        let targetSection = document.getElementById('sc-tab-' + tab);
        if(targetSection) { targetSection.classList.remove('hidden'); targetSection.classList.add('active'); }
        if(tab === 'ledger') socket.emit('getWalletLogs');
    }

    function submitDeposit() {
        sfx.click(); let amt = document.getElementById('dep-amount').value; let snt = document.getElementById('dep-snt').value; let disc = document.getElementById('dep-discord').value; let ref = snt + ' / ' + disc;
        if(!amt || amt < 1000) return alert('Minimum deposit is 1,000 TC');

        document.getElementById('dep-amount').value = ''; document.getElementById('deposit-msg').style.color = 'var(--success)'; document.getElementById('deposit-msg').innerText = 'Deposit Request Submitted!';
        setTimeout(() => { document.getElementById('deposit-msg').innerText = ''; }, 3000);
    }

    function submitWithdrawal() {
        sfx.click(); let amt = document.getElementById('wit-amount').value; let snt = document.getElementById('wit-snt').value; let disc = document.getElementById('wit-discord').value; let ref = snt + ' / ' + disc;

    }

    function submitPromo() { sfx.click(); let code = document.getElementById('promo-code').value.trim(); if(code) socket.emit('redeemPromo', code); }
    socket.on('promoResult', (data) => {
        let res = document.getElementById('promo-response');
        if(data.success) { res.style.color = 'var(--success)'; res.innerText = `SUCCESS! +${fmtTC(data.amt)} ${data.type === 'playable' ? 'P' : 'TC'}`; sfx.win(); } 
        else { res.style.color = 'var(--danger)'; res.innerText = data.msg.toUpperCase(); sfx.lose(); }
    });

    socket.on('transactionsData', (txs) => {
        let c = document.getElementById('bank-logs-container'); if(!c) return;
        c.innerHTML = '';
        if(txs.length === 0) { c.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:20px;">No transaction history.</div>'; return; }
        txs.forEach(t => {
            let color = t.status === 'Approved' ? 'var(--success)' : (t.status === 'Rejected' ? 'var(--danger)' : 'var(--credits)');
            c.insertAdjacentHTML('beforeend', `<div class="ticket-log-item"><div class="ticket-log-header"><span class="ticket-log-id">${t.type.toUpperCase()}</span><span class="ticket-log-status" style="color:${color}; border-color:${color}">${t.status.toUpperCase()}</span></div><div style="color:white; font-weight:900; font-size:1.2rem; font-family:'Rajdhani', sans-serif;">${fmtTC(t.amount)} TC</div><div style="color:var(--text-muted); font-size:0.75rem;">${new Date(t.date).toLocaleString()}</div></div>`);
        });
    });

    socket.on('walletLogsData', (data) => {
        let dProf = document.getElementById('ledger-daily-profit');
        if(dProf) { dProf.innerText = fmtTC(data.dailyProfit) + ' TC'; dProf.style.color = data.dailyProfit >= 0 ? 'var(--success)' : 'var(--danger)'; }
        let c = document.getElementById('ledger-logs-container'); if(!c) return;
        c.innerHTML = '';
        if(data.logs.length === 0) { c.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:20px; grid-column: span 4;">No ledger history.</div>'; return; }
        data.logs.forEach(l => {
            let color = l.amount > 0 ? 'var(--success)' : (l.amount < 0 ? 'var(--danger)' : 'white');
            let amtStr = l.amount > 0 ? `+${fmtTC(l.amount)}` : fmtTC(l.amount);
            c.insertAdjacentHTML('beforeend', `<div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.85rem; font-weight:800; color:white; text-align:center; white-space:nowrap; align-items:center;"><div>${l.action}</div><div style="color:${color}; font-family:'Rajdhani', sans-serif; font-size:1rem;">${amtStr}</div><div style="white-space:normal; font-size:0.75rem; color:var(--text-muted);">${l.details}</div><div style="color:var(--text-muted)">${new Date(l.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>`);
        });
    });

    function clearLedger() { if(confirm("Clear your entire local ledger history?")) { sfx.click(); socket.emit('clearWalletLogs'); } }

    // =======================================================
    // PUSH-TO-TALK (VOICE CHAT ENGINE)
    // =======================================================
    let mediaRecorder; let audioChunks = []; let isRecording = false;

    async function initAudio() {
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader(); reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => { socket.emit('voiceStream', { audio: reader.result, user: myUsername }); };
                        audioChunks = [];
                    }
                };
            } catch (err) {}
        }
    }
    
    document.getElementById('auth-container').addEventListener('click', initAudio, { once: true });

    function startPTT(btnId) {
        if (!mediaRecorder || mediaRecorder.state === 'recording') return;
        isRecording = true; audioChunks = [];
        try { mediaRecorder.start(); let btn = document.getElementById(btnId); if(btn) { btn.classList.add('recording'); sfx.click(); } } catch(e) {}
    }

    function stopPTT(btnId) {
        if (!isRecording || !mediaRecorder || mediaRecorder.state !== 'recording') return;
        isRecording = false;
        try { mediaRecorder.stop(); let btn = document.getElementById(btnId); if(btn) btn.classList.remove('recording'); } catch(e) {}
    }

    socket.on('voiceStream', (data) => {
        if(document.getElementById('master-volume').value == 0) return;
        fetch(data.audio).then(res => res.blob()).then(blob => {
            const audioUrl = URL.createObjectURL(blob); const audio = new Audio(audioUrl);
            audio.volume = document.getElementById('master-volume').value / 100;
            audio.play().catch(e => {});
        }).catch(err => {});
    });
  </script>
