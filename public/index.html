<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASINO DUEL ARENA - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121216; --bg-panel: #1e1e24;
            --p1-color: #ff4757; --p2-color: #2e86de;
            --accent: #feca57; --text: #ffffff;
            --grid-line: rgba(255, 255, 255, 0.05);
            --sidebar-width: 340px; --betting-height: 265px; --players-height: 320px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 20px 20px; color: var(--text);
            font-family: 'Press Start 2P', cursive; margin: 0; padding: 0;
            height: 100vh; width: 100vw; overflow: hidden; display: flex;
        }

        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: transparent transparent; transition: scrollbar-color 0.3s; }
        .custom-scroll:hover { scrollbar-color: #555 transparent; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: transparent; border-radius: 3px; }
        .custom-scroll:hover::-webkit-scrollbar-thumb { background-color: #555; }

        .main-wrapper { display: flex; width: 100%; height: 100%; padding: 20px; gap: 20px; overflow: hidden; height: 100vh; min-height: 0; }
        .game-section { flex-grow: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; min-width: 0; flex: 1 1 auto; min-height: 0; }
        .social-sidebar { width: var(--sidebar-width); min-width: var(--sidebar-width); display: flex; flex-direction: column; gap: 15px; height: 100%; overflow: hidden; flex: 0 0 var(--sidebar-width); min-height: 0; }
        
        .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 4px solid #333; padding-bottom: 15px; flex-shrink: 0; }
        h1 { color: var(--accent); font-size: 20px; text-shadow: 3px 3px 0 #000; margin: 0; }
        
        .settings-group { display: flex; gap: 10px; align-items: center; }
        select { background: #000; color: #fff; border: 2px solid #555; padding: 10px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; text-transform: uppercase; }
        select:hover { border-color: var(--accent); }
        .reset-btn { background: #ff4757; color: #fff; border: 2px solid #000; padding: 10px 15px; font-size: 10px; font-family: 'Press Start 2P'; cursor: pointer; box-shadow: 3px 3px 0 #000; }
        .reset-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
        .target-display { background: #333; color: #aaa; padding: 10px; font-size: 10px; border: 2px solid #555; }

        .game-selector { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; background: #000; padding: 10px; border: 2px solid #333; border-radius: 8px; flex-shrink: 0; }
        .game-tab { background: #333; border: 2px solid #555; color: #aaa; padding: 10px 15px; font-size: 10px; font-family: 'Press Start 2P'; cursor: pointer; transition: all 0.2s; position: relative; top: 0; }
        .game-tab:hover { background: #444; color: #fff; top: -2px; }
        .game-tab.active { background: var(--accent); color: #000; border-color: #fff; box-shadow: 0 0 10px var(--accent); z-index: 2; }

        .arena-container { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 25px; align-items: stretch; flex-grow: 1; min-height: 0; padding: 10px; overflow: hidden; }
        .player-hud { background: var(--bg-panel); border: 4px solid #000; display: flex; flex-direction: column; position: relative; box-shadow: 4px 4px 0 #000; transition: all 0.3s ease; height: 100%; z-index: 1; }
        .player-header { padding: 10px; text-align: center; border-bottom: 4px solid #000; position: relative; transition: background 0.3s; font-size: 12px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;}
        
        .p1-hud { border-color: #555; } .p1-hud .player-header { background: #333; color: #fff; }
        .p1-hud.active-turn { border-color: var(--p1-color); box-shadow: 0 0 20px var(--p1-color); z-index: 10; transform: scale(1.02); }
        .p1-hud.active-turn .player-header { background: var(--p1-color); }
        .p2-hud { border-color: #555; } .p2-hud .player-header { background: #333; color: #fff; }
        .p2-hud.active-turn { border-color: var(--p2-color); box-shadow: 0 0 20px var(--p2-color); z-index: 10; transform: scale(1.02); }
        .p2-hud.active-turn .player-header { background: var(--p2-color); }

        .score-area { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; min-height: 0; }
        .score-display { font-size: 60px; font-family: 'Rajdhani', sans-serif; font-weight: 700; }
        .controls-area { padding: 15px; flex-grow: 0; display: flex; flex-direction: column; gap: 10px; justify-content: center; min-height: 120px; background: rgba(0,0,0,0.2); flex-shrink: 0; }
        .arcade-btn { position: relative; display: block; width: 100%; padding: 12px 5px; font-family: 'Press Start 2P'; font-size: 10px; text-transform: uppercase; border: none; cursor: pointer; background: none; margin-bottom: 5px; color: #fff; }
        .arcade-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #444; border: 3px solid #000; box-shadow: inset 2px 2px 0 rgba(255,255,255,0.2), 4px 4px 0 #000; z-index: -1; transition: all 0.1s; }
        .p1-btn::before { background: var(--p1-color); } .p2-btn::before { background: var(--p2-color); }
        .arcade-btn:active::before { transform: translate(3px, 3px); box-shadow: inset 2px 2px 0 rgba(0,0,0,0.2), 1px 1px 0 #000; }
        .seat-btn { width: 100%; padding: 20px; background: #333; color: #aaa; border: 2px dashed #666; font-family: 'Press Start 2P'; cursor: pointer; font-size: 10px; text-transform: uppercase; margin-top: auto; margin-bottom: auto; transition: all 0.2s; }
        .seat-btn:hover { color: #fff; border-color: #fff; background: #444; transform: scale(1.05); }

        .center-stage { background: #000; border: 4px solid #333; display: flex; flex-direction: column; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); height: 100%; }
        .round-tracker { background: #222; color: #fff; text-align: center; padding: 8px; font-size: 12px; border-bottom: 2px solid #444; letter-spacing: 2px; text-shadow: 2px 2px 0 #000; flex-shrink: 0;}
        .marquee-status { background: #111; border-bottom: 2px solid #444; color: #888; text-align: center; padding: 10px; font-size: 10px; letter-spacing: 1px; min-height: 35px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;}
        .game-board { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; perspective: 1000px; min-height: 0;}
        .vs-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: 900; color: rgba(255, 255, 255, 0.03); font-family: 'Rajdhani', sans-serif; pointer-events: none; z-index: 0; }

        .sidebar-panel { background: var(--bg-panel); border: 4px solid #000; display: flex; flex-direction: column; min-height: 0; overflow: hidden; box-shadow: 4px 4px 0 #000; flex-shrink: 0; }
        .panel-header { background: #2f3640; color: #fff; padding: 8px; text-align: left; padding-left: 15px; font-size: 10px; border-bottom: 4px solid #000; text-transform: uppercase; font-weight: bold; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        .betting-panel { padding: 15px; border-bottom: 4px solid #000; background: #191919; }
        .betting-wrapper { position: relative; height: var(--betting-height); flex: 0 0 var(--betting-height); }
        .wallet { text-align: center; color: var(--accent); margin-bottom: 10px; font-size: 10px; }
        
        .player-list-container { height: var(--players-height); flex: 0 0 var(--players-height); min-height: 0; display: flex; flex-direction: column; }
        .player-list { flex-grow: 1; padding: 0; background: #2f3640; overflow-y: auto; min-height: 0; }
        .player-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #222; font-size: 16px; color: #fff; background: #2f3640; font-family: 'Rajdhani', sans-serif; font-weight: 700; }
        
        .chat-container-box { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; margin-bottom: 0; }
        .chat-inner { flex-grow: 1; display: flex; flex-direction: column; background: #1e1e24; min-height: 0; overflow: hidden; }
        .chat-log { flex-grow: 1; padding: 15px; font-size: 14px; line-height: 1.5; color: #ccc; font-family: 'Rajdhani', sans-serif; font-weight: 600; overflow-y: auto; }
        .chat-msg { margin-bottom: 8px; word-wrap: break-word; }
        .chat-user { font-weight: 800; margin-right: 5px; }
        .chat-text { color: #eee; }
        .chat-input-area { display: flex; border-top: 4px solid #000; flex-shrink: 0; }
        .chat-input { flex-grow: 1; background: #000; border: none; color: #fff; padding: 15px; font-family: 'Press Start 2P'; font-size: 12px; outline: none; height: 50px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="game-section">
        <div class="top-bar">
            <h1>CASINO</h1>
            <div class="settings-group">
                <div class="target-display" id="targetDisplay">TARGET: 1</div>
                <select id="roundMode">
                    <option value="1">1 Round (Sudden Death)</option>
                    <option value="3">Best of 3</option>
                </select>
                <button class="reset-btn">RESET</button>
            </div>
        </div>

        <div class="game-selector">
            <button class="game-tab active" id="tab-dice">DICE</button>
            <button class="game-tab" id="tab-coin">COIN</button>
        </div>

        <div class="arena-container">
            <div class="player-hud p1-hud" id="p1Panel">
                <div class="player-header"><div id="p1Name">EMPTY</div></div>
                <div class="score-area"><div class="score-display" id="p1Score">0</div></div>
                <div class="controls-area" id="p1Controls">
                    <button class="seat-btn" onclick="socket.emit('take-seat', 1)">TAKE SEAT</button>
                </div>
            </div>

            <div class="center-stage">
                <div class="round-tracker" id="roundTracker">ARENA</div>
                <div class="marquee-status" id="status">CONNECTING TO SERVER...</div>
                <div class="game-board" id="gameVisuals"><div class="vs-badge">VS</div></div>
            </div>

            <div class="player-hud p2-hud" id="p2Panel">
                <div class="player-header"><div id="p2Name">EMPTY</div></div>
                <div class="score-area"><div class="score-display" id="p2Score">0</div></div>
                <div class="controls-area" id="p2Controls">
                    <button class="seat-btn" onclick="socket.emit('take-seat', 2)">TAKE SEAT</button>
                </div>
            </div>
        </div>
    </div>

    <div class="social-sidebar">
        <div class="sidebar-panel betting-wrapper">
            <div class="panel-header">BANK / WALLET</div>
            <div class="betting-panel">
                <div class="wallet" id="walletDisplay" style="font-size: 14px;">WALLET: 0 TC</div>
                <div style="font-size: 8px; color: #888; text-align: center; margin-top: 20px;">Use Admin Panel to add funds.</div>
            </div>
        </div>

        <div class="sidebar-panel player-list-container">
            <div class="panel-header">PLAYERS ONLINE</div>
            <div class="player-list custom-scroll" id="playerList">
                <div class="player-item"><div class="player-name">System Linked</div></div>
            </div>
        </div>

        <div class="sidebar-panel chat-container-box">
            <div class="panel-header">LIVE CHAT</div>
            <div class="chat-inner">
                <div class="chat-log custom-scroll" id="chatLog"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Type here..." onkeypress="handleChat(event)">
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // Anti-Cheat protections
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) { 
        if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) return false; 
    };

    const socket = io();
    
    // Quick Auth for testing the layout connection
    let myName = prompt("Enter Username to connect to Arena:") || "Guest_" + Math.floor(Math.random() * 100);
    socket.emit('auth', myName);

    // DOM Elements
    const DOM = {
        p1Name: document.getElementById('p1Name'), p2Name: document.getElementById('p2Name'),
        p1Score: document.getElementById('p1Score'), p2Score: document.getElementById('p2Score'),
        p1Panel: document.getElementById('p1Panel'), p2Panel: document.getElementById('p2Panel'),
        status: document.getElementById('status'), wallet: document.getElementById('walletDisplay'),
        chatLog: document.getElementById('chatLog'), visuals: document.getElementById('gameVisuals'),
        p1Ctrls: document.getElementById('p1Controls'), p2Ctrls: document.getElementById('p2Controls')
    };

    // Socket Events
    socket.on('auth-success', (data) => {
        DOM.wallet.innerText = `WALLET: ${data.wallet} TC`;
    });

    socket.on('room-update', (room) => {
        DOM.p1Name.innerText = room.p1 || "EMPTY";
        DOM.p2Name.innerText = room.p2 || "EMPTY";
        DOM.p1Score.innerText = room.p1Score;
        DOM.p2Score.innerText = room.p2Score;

        // Visual Turn Indication
        if(room.status === 'playing') {
            if(room.turn === 1) { DOM.p1Panel.classList.add('active-turn'); DOM.p2Panel.classList.remove('active-turn'); }
            else { DOM.p2Panel.classList.add('active-turn'); DOM.p1Panel.classList.remove('active-turn'); }
        } else {
            DOM.p1Panel.classList.remove('active-turn'); DOM.p2Panel.classList.remove('active-turn');
        }

        // Seat & Control Logic mapping
        if(!room.p1) DOM.p1Ctrls.innerHTML = `<button class="seat-btn" onclick="socket.emit('take-seat', 1)">TAKE SEAT</button>`;
        else if(room.status === 'playing' && room.turn === 1 && myName === room.p1) DOM.p1Ctrls.innerHTML = `<button class="arcade-btn p1-btn" onclick="socket.emit('play-turn', 'roll')">ROLL DICE</button>`;
        else DOM.p1Ctrls.innerHTML = `<div style="font-size:10px; color:#666; text-align:center;">WAITING...</div>`;

        if(!room.p2) DOM.p2Ctrls.innerHTML = `<button class="seat-btn" onclick="socket.emit('take-seat', 2)">TAKE SEAT</button>`;
        else if(room.status === 'playing' && room.turn === 2 && myName === room.p2) DOM.p2Ctrls.innerHTML = `<button class="arcade-btn p2-btn" onclick="socket.emit('play-turn', 'roll')">ROLL DICE</button>`;
        else DOM.p2Ctrls.innerHTML = `<div style="font-size:10px; color:#666; text-align:center;">WAITING...</div>`;
    });

    socket.on('system-msg', (msg) => { DOM.status.innerText = msg; });

    // Chat handling
    function handleChat(e) {
        if(e.key === 'Enter' && e.target.value.trim() !== "") {
            socket.emit('send-chat', e.target.value);
            e.target.value = '';
        }
    }

    socket.on('chat-message', (data) => {
        const div = document.createElement('div');
        div.className = 'chat-msg';
        div.innerHTML = `<span class="chat-user" style="color:#feca57">${data.sender}:</span> <span class="chat-text">${data.text}</span>`;
        DOM.chatLog.appendChild(div);
        DOM.chatLog.scrollTop = DOM.chatLog.scrollHeight;
    });

    // Game Visualization Updates
    socket.on('game-event', (data) => {
        if(data.type === 'dice-roll') {
            DOM.visuals.innerHTML = `<div style="font-size: 60px; text-align: center; font-family: 'Rajdhani', sans-serif; color: ${data.p === 1 ? 'var(--p1-color)' : 'var(--p2-color)'};">ROLLED:<br><span style="font-size: 100px; font-weight: bold;">${data.val}</span></div>`;
        }
    });

    socket.on('match-over', (data) => {
        DOM.visuals.innerHTML = `<div style="color:var(--accent); font-size: 40px; text-align: center;">${data.winner}<br>WINS MATCH!</div>`;
    });
</script>
</body>
</html>
