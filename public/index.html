<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIP Blackjack</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Rajdhani:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #00050d;
            --panel-bg: rgba(0, 10, 25, 0.85);
            --border-color: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #8c9eb5;
            --accent-blue: #00a2ff;
            --accent-green: #00e676;
            --accent-red: #ff3366;
            --accent-yellow: #ffb400;
            --ps-pink: #f591cc; /* PlayStation Square */
            --ps-red: #f37370;   /* PlayStation Circle */
            --ps-green: #41e6a6; /* PlayStation Triangle */
            --ps-blue: #8dafe5;  /* PlayStation Cross */
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* Login Screen */
        #login-screen { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--panel-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--accent-blue); box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        #login-screen h2 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        #login-screen input { padding: 12px; font-size: 1.2rem; text-align: center; margin-bottom: 20px; width: 100%; border-radius: 8px; border: none; font-weight: bold; background: rgba(0,0,0,0.5); color: white; }
        #login-screen button { padding: 12px 20px; font-size: 1.2rem; cursor: pointer; background: linear-gradient(to bottom, #00a2ff, #0077cc); color: white; font-weight: bold; border: none; border-radius: 8px; width: 100%; box-shadow: 0 4px 15px rgba(0,162,255,0.4); transition: 0.2s; }
        #login-screen button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,162,255,0.6); }

        /* Main Layout */
        #main-layout { display: none; gap: 20px; width: 100%; max-width: 1450px; height: 750px; justify-content: center; align-items: stretch; padding: 20px; }
        
        .game-column { display: flex; flex-direction: column; gap: 20px; width: 1100px; max-width: 1100px; flex-shrink: 0; }

        /* Game Board */
        #game-screen { flex: 1; width: 100%; background: radial-gradient(circle at center, #0e5b32 0%, #042412 100%); border-radius: 20px; border: 16px solid #3e2723; box-shadow: inset 0 0 40px rgba(0,0,0,0.9), 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Table Markings */
        .table-logo { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.2; pointer-events: none; z-index: 1; width: 100%; }
        .table-logo h1 { font-size: 4.5rem; letter-spacing: 15px; margin: 0 0 10px 0; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); font-family: 'Rajdhani', sans-serif;}
        .table-logo p { font-weight: bold; font-size: 1.2rem; letter-spacing: 3px; color: #fff; margin: 5px 0; }

        /* Timer */
        #timer-display { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); transition: opacity 0.3s; z-index: 20; color: white; display: flex; gap: 8px; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-family: 'Rajdhani', sans-serif;}

        /* Dealer Area */
        .dealer-area { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        
        /* Animations */
        @keyframes dealFly {
            0% { transform: translate(100px, -200px) scale(0.5); opacity: 0; }
            100% { transform: translate(0, 0) scale(1); opacity: 1; }
        }

        /* Cards */
        .hand { display: flex; justify-content: center; min-height: 105px; position: relative;}
        .card { width: 70px; height: 105px; background: white; color: black; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; font-size: 1.1rem; border: 1px solid #ccc; box-shadow: -4px 4px 10px rgba(0,0,0,0.6); position: absolute; top: 0;}
        .anim-card { animation: dealFly 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .card-red { color: var(--accent-red); }
        .card-hidden { background: repeating-linear-gradient(45deg, #001f4d, #001f4d 10px, #000a1f 10px, #000a1f 20px); border: 2px solid rgba(255,255,255,0.8); color: transparent; }
        
        /* Seats */
        .seats-container { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; align-items: flex-end; gap: 20px; padding: 0 10px; transition: all 0.5s ease; z-index: 10; }
        .seat { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; transition: all 0.5s ease; min-width: 120px; }
        
        .hands-wrapper { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 5px; height: 120px;}
        .single-hand-container { display: flex; flex-direction: column; align-items: center; position: relative; justify-content: flex-end; height: 100%; width: 70px;}

        /* Bet Pill (Above Name) */
        .seat-bet { padding: 4px 15px; border-radius: 50px; font-weight: 900; font-size: 1rem; margin-bottom: 5px; z-index: 25; box-shadow: 0 4px 10px rgba(0,0,0,0.6); transition: all 0.4s ease; border: 1px solid rgba(255, 180, 0, 0.4); background: rgba(0,0,0,0.8); color: var(--credits); font-family: 'Rajdhani', sans-serif; text-align: center; white-space: nowrap;}
        
        /* Result Colors for Bet Pill */
        .bet-win { background: linear-gradient(to bottom, #00e676, #00b359); color: black; border: none; box-shadow: 0 0 20px rgba(0,230,118,0.6); }
        .bet-loss { background: linear-gradient(to bottom, #ff3366, #cc0033); color: white; border: none; box-shadow: 0 0 20px rgba(255,51,102,0.4);}
        .bet-bj { background: linear-gradient(to bottom, #00a2ff, #0077cc); color: white; border: none; box-shadow: 0 0 20px rgba(0,162,255,0.6); }
        .bet-push { background: linear-gradient(to bottom, #777, #444); color: white; border: none; }

        /* Empty Seat Circle */
        .seat-circle { width: 60px; height: 60px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; background: rgba(0,0,0,0.2); margin-bottom: 5px;}
        .seat-circle:hover { background: rgba(255,255,255,0.2); border-color: white; }
        
        .seat-name { margin-top: 5px; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; text-shadow: 0 2px 4px black; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; text-align: center; letter-spacing: 1px;}
        
        /* Player Timer Bar */
        .player-timer-track { width: 100%; height: 6px; background: rgba(0,0,0,0.8); border-radius: 50px; margin-top: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); box-shadow: inset 0 2px 5px rgba(0,0,0,0.9); }
        .player-timer-fill { height: 100%; background: linear-gradient(90deg, #00e676, #00b359); width: 0%; transition: width 1s linear; box-shadow: 0 0 10px #00e676; border-radius: 50px; }

        /* Score Badges (Top Left) */
        .seat-score { position: absolute; top: -15px; left: -15px; background: #222; width: 34px; height: 34px; display: flex; justify-content: center; align-items: center; border-radius: 50%; font-weight: 900; z-index: 30; box-shadow: 0 4px 10px rgba(0,0,0,0.8); font-size: 1rem; color: white; border: none; font-family: 'Rajdhani', sans-serif;}
        .score-active { background: linear-gradient(135deg, #FFDF00, #D4AF37); color: black; box-shadow: 0 0 15px rgba(255,223,0,0.6); }
        .score-bust { background: linear-gradient(to bottom, #cc0033, #9b0022); color: white; width: auto; height: 28px; padding: 0 10px; border-radius: 50px; font-size: 0.8rem; }
        .score-bj { background: linear-gradient(to bottom, #00b359, #008040); color: white; width: auto; height: 28px; padding: 0 10px; border-radius: 50px; font-size: 0.8rem; letter-spacing: 1px; }

        /* CONTROLS BAR */
        #controls { display: flex; gap: 20px; height: 110px; justify-content: center; align-items: center; width: 100%; background: var(--panel-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color); flex-shrink: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        #controls-msg { font-weight: 900; font-size: 1.2rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; }
        
        /* Circular Action Buttons (PlayStation Theme) */
        .btn-circle { width: 75px; height: 75px; border-radius: 50%; border: 2px solid transparent; background: #1a1a24; color: white; display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.5); transition: all 0.2s ease; letter-spacing: 1px; }
        .btn-circle:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-circle:active { transform: scale(0.95); }
        
        /* PlayStation Colors */
        #btn-hit { border-color: var(--ps-blue); color: var(--ps-blue); }    /* Cross */
        #btn-hit:hover { box-shadow: 0 0 15px var(--ps-blue), inset 0 0 10px var(--ps-blue); }
        
        #btn-stand { border-color: var(--ps-red); color: var(--ps-red); }    /* Circle */
        #btn-stand:hover { box-shadow: 0 0 15px var(--ps-red), inset 0 0 10px var(--ps-red); }
        
        #btn-double { border-color: var(--ps-pink); color: var(--ps-pink); } /* Square */
        #btn-double:hover { box-shadow: 0 0 15px var(--ps-pink), inset 0 0 10px var(--ps-pink); }
        
        #btn-split { border-color: var(--ps-green); color: var(--ps-green); } /* Triangle */
        #btn-split:hover { box-shadow: 0 0 15px var(--ps-green), inset 0 0 10px var(--ps-green); }

        /* Betting Controls */
        #bet-input { padding: 0 20px; font-size: 1.4rem; text-align: center; width: 160px; display: none; height: 60px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.8); color: var(--credits); font-weight: 900; box-shadow: inset 0 2px 10px rgba(0,0,0,0.9); font-family: 'Rajdhani', sans-serif;}
        #bet-input::placeholder { color: rgba(255,180,0,0.3); font-size: 1rem; font-family: 'Outfit', sans-serif;}
        
        .btn-pill { padding: 0 25px; font-size: 1.05rem; font-weight: 900; cursor: pointer; border-radius: 50px; border: none; text-transform: uppercase; display: none; height: 60px; transition: all 0.2s ease; letter-spacing: 1px; text-shadow: 0 1px 3px rgba(0,0,0,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.4); align-items: center; justify-content: center; color: white;}
        .btn-pill:hover { transform: translateY(-2px); filter: brightness(1.15); box-shadow: 0 6px 20px rgba(0,0,0,0.6); }
        .btn-pill:active { transform: translateY(1px); }

        #btn-leave { background: linear-gradient(to bottom, #ff3366, #cc0033); }
        #btn-bet { background: linear-gradient(to bottom, #00e676, #00b359); color: black; text-shadow: none;}
        #btn-rebet { background: linear-gradient(to bottom, #00a2ff, #0077cc); }

        /* LIVE CHAT */
        .chat-panel { width: 320px; height: 100%; display: flex; flex-direction: column; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; flex-shrink: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .chat-header { padding: 15px; background: rgba(0,0,0,0.7); font-weight: bold; text-align: center; border-bottom: 1px solid var(--border-color); letter-spacing: 1px; color: white;}
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-line { font-size: 0.95rem; line-height: 1.4; text-align: left; }
        .chat-line .name { color: var(--accent-blue); font-weight: bold; margin-right: 5px; }
        .chat-input-area { display: flex; padding: 15px; border-top: 1px solid var(--border-color); gap: 10px; background: rgba(0,0,0,0.4);}
        .chat-input-area input { flex: 1; padding: 10px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.6); color: white; text-align: left; font-weight: bold;}
        .chat-input-area button { width: 44px; height: 44px; background: linear-gradient(to bottom, #00a2ff, #0077cc); border: none; border-radius: 50px; cursor: pointer; color: white; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
        .chat-input-area button:hover { transform: scale(1.05); filter: brightness(1.1);}
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="margin-top:0; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;">Enter VIP Sandbox</h2>
        <input type="text" id="username" placeholder="Enter your name">
        <button onclick="joinSandbox()">ENTER CASINO</button>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div id="main-layout">
            
            <div class="game-column">
                <div id="game-screen">
                    <div class="table-logo">
                        <h1>BLACKJACK</h1>
                        <p>BLACKJACK PAYS 3 TO 2</p>
                        <p>DEALER MUST DRAW TO 16 AND STAND ON ALL 17s</p>
                    </div>

                    <div id="timer-display"><i class="fas fa-stopwatch"></i> <span id="timer-val">15</span></div>

                    <div class="dealer-area">
                        <div class="single-hand-container" style="width: 70px;">
                            <div id="dealer-score" class="seat-score" style="display:none;">0</div>
                            <div id="dealer-hand" class="hand" style="margin-top:0;"></div>
                        </div>
                    </div>

                    <div class="seats-container" id="seats-container">
                        </div>
                </div>

                <div id="controls">
                    <div id="controls-msg">TAKE A SEAT TO PLAY</div>
                    
                    <button class="btn-pill" id="btn-rebet" onclick="rebet()" style="display:none;">REBET</button>
                    <input type="text" id="bet-input" placeholder="Amount" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <button class="btn-pill" id="btn-bet" onclick="placeBet()" style="display:none;">PLACE BET</button>
                    <button class="btn-pill" id="btn-leave" onclick="leaveSeat()" style="display:none;">LEAVE</button>
                    
                    <button class="btn-circle" id="btn-hit" onclick="sendAction('hit')">HIT</button>
                    <button class="btn-circle" id="btn-stand" onclick="sendAction('stand')">STAND</button>
                    <button class="btn-circle" id="btn-double" onclick="sendAction('double')">DOUBLE</button>
                    <button class="btn-circle" id="btn-split" onclick="sendAction('split')">SPLIT</button>
                </div>
            </div>

            <div class="chat-panel">
                <div class="chat-header">LIVE CHAT</div>
                <div class="chat-body custom-scroll" id="chat-box">
                    <div class="chat-line" style="color: var(--ps-glow); text-align: center; font-weight: bold;">Connected to table.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Chat here..." onkeypress="if(event.key==='Enter') sendChat();">
                    <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const socket = io();
        let myName = '';
        let mySeat = null;
        let lastBetAmount = 0; 
        
        // Tracks rendered cards to prevent re-animating existing cards
        let cardRenderMemory = { dealer: 0, seats: { 1:[], 2:[], 3:[], 4:[], 5:[] } };

        function joinSandbox() {
            let name = document.getElementById('username').value.trim();
            if(!name) return alert("Enter a name");
            myName = name;
            socket.emit('join', myName);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-layout').style.display = 'flex';
        }

        function takeSeat(seatNum) { socket.emit('takeSeat', seatNum); }
        function leaveSeat() { socket.emit('leaveSeat'); }
        
        function placeBet() {
            let amt = parseInt(document.getElementById('bet-input').value);
            if(!amt || amt <= 0) return alert("Invalid bet");
            lastBetAmount = amt;
            socket.emit('placeBet', amt);
            document.getElementById('bet-input').value = '';
        }
        
        function rebet() {
            if (lastBetAmount > 0) {
                socket.emit('placeBet', lastBetAmount);
            }
        }
        
        function sendAction(action) { socket.emit('playerAction', action); }

        function sendChat() {
            let input = document.getElementById('chat-input');
            let msg = input.value.trim();
            if (msg) {
                socket.emit('sendChat', msg);
                input.value = '';
            }
        }
        
        socket.on('chatMessage', (data) => {
            let box = document.getElementById('chat-box');
            box.innerHTML += `<div class="chat-line"><span class="name">${data.name}:</span> <span style="color:white;">${data.msg}</span></div>`;
            box.scrollTop = box.scrollHeight;
        });

        // Timer Updates
        socket.on('timerTick', (timeData) => {
            let timerEl = document.getElementById('timer-display');
            let timerVal = document.getElementById('timer-val');
            
            if (timeData.status === 'BETTING') {
                timerVal.innerText = timeData.timer;
                timerEl.style.opacity = timeData.hasBets ? '1' : '0';
            } else {
                timerEl.style.opacity = '0'; 
            }

            // Sync the active player's shrinking timer bar
            if (timeData.status === 'PLAYER_TURN' && timeData.activeTurn && timeData.activeTurn.seat) {
                let bar = document.getElementById(`timer-bar-${timeData.activeTurn.seat}`);
                if (bar) {
                    // Smooth 1 second transition configured in CSS
                    bar.style.width = (timeData.timer / 15) * 100 + '%';
                }
            }
        });

        // Main State Update
        socket.on('stateUpdate', (state) => {
            if (state.status === 'BETTING') {
                // Reset animation memory for new round
                cardRenderMemory = { dealer: 0, seats: { 1:[], 2:[], 3:[], 4:[], 5:[] } };
            }

            // 1. RENDER DEALER
            let dHand = document.getElementById('dealer-hand');
            dHand.innerHTML = '';
            state.dealer.cards.forEach((c, idx) => {
                let isNew = idx >= cardRenderMemory.dealer;
                let animClass = isNew ? 'anim-card' : '';
                // 30px offset for subsequent cards
                let leftOffset = idx * 30; 
                
                if (c === 'hidden') {
                    dHand.innerHTML += `<div class="card card-hidden ${animClass}" style="position: absolute; left: ${leftOffset}px; z-index: 0;">?</div>`;
                } else {
                    dHand.innerHTML += `<div class="card ${animClass} ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}" style="position: absolute; left: ${leftOffset}px; z-index: ${idx};">
                        <div>${c.val}</div>
                        <div style="font-size:1.8rem; text-align:center; margin-top:5px;">${c.suit}</div>
                    </div>`;
                }
            });
            // Update container width to fit absolutely positioned cards
            dHand.style.width = state.dealer.cards.length > 0 ? `${70 + ((state.dealer.cards.length - 1) * 30)}px` : '70px';
            cardRenderMemory.dealer = state.dealer.cards.length;

            let dScoreEl = document.getElementById('dealer-score');
            if (state.dealer.score > 0) { dScoreEl.style.display = 'flex'; dScoreEl.innerText = state.dealer.score; } else { dScoreEl.style.display = 'none'; }

            // 2. RENDER SEATS
            let seatsHtml = '';
            mySeat = null;
            let activeHandObj = null; 
            
            for(let i=1; i<=5; i++) {
                let seat = state.seats[i];
                let isMySeatTurn = state.activeTurn.seat === i;
                
                if (seat) {
                    if (seat.name === myName) mySeat = i;
                    
                    // Hide idle players during an active round
                    let isIdle = seat.hands.length === 0 || seat.hands[0].bet === 0;
                    if (state.status !== 'BETTING' && isIdle) continue; 

                    if (!cardRenderMemory.seats[i]) cardRenderMemory.seats[i] = [];

                    let handsHtml = '';
                    let totalSeatBet = 0; 
                    
                    seat.hands.forEach((hand, hIdx) => {
                        totalSeatBet += hand.bet;
                        let isHandActive = isMySeatTurn && state.activeTurn.handIdx === hIdx;
                        if (isHandActive && seat.name === myName) activeHandObj = hand; 

                        let prevCardCount = cardRenderMemory.seats[i][hIdx] || 0;
                        let cardsHtml = '';
                        
                        hand.cards.forEach((c, cIdx) => {
                            let isNew = cIdx >= prevCardCount;
                            let animClass = isNew ? 'anim-card' : '';
                            // 30px offset for player cards too
                            let leftOffset = cIdx * 30;

                            cardsHtml += `<div class="card ${animClass} ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}" style="position: absolute; left: ${leftOffset}px; z-index: ${cIdx};">
                                <div>${c.val}</div>
                                <div style="font-size:1.8rem; text-align:center; margin-top:5px;">${c.suit}</div>
                            </div>`;
                        });
                        cardRenderMemory.seats[i][hIdx] = hand.cards.length;
                        
                        // Container width calculation for absolutely positioned cards
                        let handWidth = hand.cards.length > 0 ? 70 + ((hand.cards.length - 1) * 30) : 70;

                        let badgeClass = isHandActive ? 'score-active' : '';
                        let badgeText = hand.score;
                        if (hand.status === 'BUST') { badgeClass = 'score-bust'; badgeText = 'BUST'; }
                        else if (hand.status === 'BLACKJACK') { badgeClass = 'score-bj'; badgeText = 'BLACKJACK'; }

                        // Morphing Bet Pill Logic
                        let betClass = '';
                        let displayValue = hand.bet;

                        if (hand.result) {
                            if (hand.result === 'WIN') { betClass = 'bet-win'; displayValue = hand.bet * 2; }
                            else if (hand.result === 'BLACKJACK') { betClass = 'bet-bj'; displayValue = hand.bet * 2.5; }
                            else if (hand.result === 'LOSS' || hand.status === 'BUST') { betClass = 'bet-loss'; displayValue = 0; }
                            else if (hand.result === 'PUSH') { betClass = 'bet-push'; displayValue = hand.bet; }
                        }

                        handsHtml += `
                        <div class="single-hand-container" style="width: ${handWidth}px; height: 105px;">
                            ${hand.bet > 0 ? `<div class="seat-bet ${betClass}" style="position: absolute; top: -40px; left: 50%; transform: translateX(-50%);">${displayValue}</div>` : ''}
                            <div class="seat-score ${badgeClass}" style="display:${hand.score > 0 ? 'flex' : 'none'};">${badgeText}</div>
                            <div class="hand" style="margin-top: 0; width: 100%; height: 100%;">
                                ${cardsHtml}
                            </div>
                        </div>`;
                    });

                    seatsHtml += `
                    <div class="seat occupied">
                        <div class="hands-wrapper">${handsHtml}</div>
                        ${state.status === 'BETTING' && isIdle ? `
                            <div class="seat-circle">
                                <i class="fas fa-user" style="color: white; opacity:0.3;"></i>
                            </div>
                        ` : ''}
                        
                        <div class="seat-name" style="color:${seat.name === myName ? '#00a2ff' : 'white'};">${seat.name}</div>
                        
                        ${state.status !== 'BETTING' && !isIdle ? `
                            <div class="player-timer-track" style="opacity: ${isMySeatTurn ? 1 : 0.2};">
                                <div class="player-timer-fill" id="timer-bar-${i}" style="width: 100%;"></div>
                            </div>
                        ` : ''}
                    </div>`;
                } else {
                    if (state.status === 'BETTING') {
                        seatsHtml += `
                        <div class="seat">
                            <div class="seat-circle" onclick="takeSeat(${i})">
                                <i class="fas fa-plus" style="color:white; opacity:0.3; font-size: 1.5rem;"></i>
                            </div>
                        </div>`;
                    }
                }
            }
            document.getElementById('seats-container').innerHTML = seatsHtml;

            // 3. Update Controls Visibility
            let s = mySeat ? state.seats[mySeat] : null;
            let isSeatedNoBet = mySeat !== null && state.status === 'BETTING' && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0);
            let isMyTurn = activeHandObj !== null;

            let btnLeave = document.getElementById('btn-leave');
            let inputBet = document.getElementById('bet-input');
            let btnBet = document.getElementById('btn-bet');
            let btnRebet = document.getElementById('btn-rebet');
            
            let btnHit = document.getElementById('btn-hit');
            let btnStand = document.getElementById('btn-stand');
            let btnDouble = document.getElementById('btn-double');
            let btnSplit = document.getElementById('btn-split');
            let msgEl = document.getElementById('controls-msg');

            // Alignment: REBET - INPUT - PLACE BET - LEAVE
            btnRebet.style.display = (isSeatedNoBet && lastBetAmount > 0) ? 'flex' : 'none';
            inputBet.style.display = isSeatedNoBet ? 'block' : 'none';
            btnBet.style.display = isSeatedNoBet ? 'flex' : 'none';
            btnLeave.style.display = isSeatedNoBet ? 'flex' : 'none';
            
            // Action Buttons
            btnHit.style.display = isMyTurn ? 'flex' : 'none';
            btnStand.style.display = isMyTurn ? 'flex' : 'none';
            btnDouble.style.display = (isMyTurn && activeHandObj.cards.length === 2) ? 'flex' : 'none';
            
            let canSplit = isMyTurn && activeHandObj.cards.length === 2 && s.hands.length === 1 && (activeHandObj.cards[0].val === activeHandObj.cards[1].val);
            btnSplit.style.display = canSplit ? 'flex' : 'none';

            let isRackEmpty = (!isSeatedNoBet && !isMyTurn);
            if (isRackEmpty) {
                msgEl.style.display = 'block';
                if (state.status === 'BETTING') msgEl.innerText = "TAKE A SEAT TO PLAY";
                else if (mySeat && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0)) msgEl.innerText = "WAITING FOR NEXT ROUND...";
                else msgEl.innerText = "WAITING FOR ROUND TO FINISH...";
            } else { msgEl.style.display = 'none'; }
        });

    </script>
</body>
</html>
