<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick N' Trade | VIP Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Rajdhani:wght@600;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* ================= BASE STYLES & LAYOUT ================= */
        :root { 
            --ps-bg: #000814; 
            --ps-glow: #00a2ff; 
            --glass-bg: rgba(0, 10, 25, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.15); 
            --danger: #ff3366; 
            --success: #00e676; 
            --credits: #ffb400; 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Outfit', sans-serif; 
            outline: none; 
            user-select: none;
        }
        
        /* Strict flex column prevents the blank screen zero-height collapse */
        body { 
            background: linear-gradient(135deg, #000a1f 0%, #001f4d 50%, #000000 100%); 
            color: white; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            margin: 0;
            padding: 0;
        }
        
        input, textarea { user-select: auto; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { display: none; }

        .topbar { 
            flex: 0 0 75px; 
            background: rgba(0, 5, 15, 0.95); 
            border-bottom: 1px solid rgba(255,255,255,0.15); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 25px; 
            z-index: 1000; 
        }
        
        .brand-title { 
            font-weight: 900; 
            letter-spacing: 2px; 
            font-size: 1.5rem; 
            text-shadow: 0 0 10px rgba(0, 162, 255, 0.5); 
            cursor: pointer;
        }
        
        /* Fills remaining screen space */
        .main-wrapper { 
            flex: 1; 
            position: relative; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        
        /* Keeps games perfectly in the middle */
        .view-container { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            width: 100%; 
            height: 100%; 
        }

        .btn-play { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.15); 
            padding: 12px 15px; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s; 
            text-transform: uppercase; 
        }
        
        .btn-play:hover:not(:disabled) { 
            background: white; 
            color: black; 
            transform: translateY(-2px); 
        }
        
        .btn-play:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        
        .input-control { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.15); 
            color: white; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 600; 
            text-align: center; 
        }

        .btn-back-fixed { 
            position: absolute; 
            top: 20px; 
            left: 25px; 
            z-index: 1000; 
            background: rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.15); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        
        .btn-back-fixed:hover { 
            background: white; 
            color: black; 
        }
        
        .lobby-modes-container { 
            display: flex; 
            gap: 40px; 
        }
        
        .game-card { 
            width: 320px; 
            height: 380px; 
            background: #020813; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 30px 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }
        
        .game-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--ps-glow); 
            box-shadow: 0 15px 40px rgba(0,162,255,0.2); 
        }
        
        .local-flash { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            z-index: 9999; 
            color: var(--danger); 
            font-size: 1.2rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            opacity: 0; 
            display: none; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.9); 
            background: rgba(0,0,0,0.8); 
            padding: 10px 20px; 
            border-radius: 8px; 
            border: 1px solid var(--danger); 
        }
        
        .local-flash.show { 
            display: block; 
            animation: flashAnim 2.5s forwards; 
        }
        
        .local-flash.success { 
            color: var(--success); 
            border-color: var(--success); 
        }
        
        @keyframes flashAnim { 
            0% { opacity: 0; transform: translateY(20px); } 
            15% { opacity: 1; transform: translateY(0); } 
            85% { opacity: 1; transform: translateY(0); } 
            100% { opacity: 0; transform: translateY(-10px); } 
        }

        /* ================= VIP BLACKJACK UI ================= */
        
        .mbj-board { 
            width: 1100px; 
            height: 520px; 
            background: radial-gradient(ellipse at center, #0a5a2a 0%, #032b11 100%); 
            border-radius: 20px; 
            position: relative; 
            box-shadow: 0 25px 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.8); 
            border: 15px solid #2e1a10; 
            overflow: hidden; 
        }
        
        .mbj-table-line { 
            position: absolute; 
            inset: 15px; 
            border: 2px solid rgba(255,255,255,0.15); 
            border-radius: 10px; 
            pointer-events: none; 
            z-index: 1;
        }
        
        .mbj-logo { 
            position: absolute; 
            top: 45%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            opacity: 0.15; 
            pointer-events: none; 
            width: 100%;
            z-index: 2;
        }
        
        .mbj-logo h1 {
            font-size: 3.5rem; 
            letter-spacing: 8px; 
            margin-bottom: 5px;
        }
        
        .mbj-logo p {
            font-weight: 800; 
            font-size: 0.85rem; 
            letter-spacing: 2px;
        }

        /* Top Left Balance */
        .mbj-balance-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 12px;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Top Center Timer */
        .mbj-timer-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--ps-glow);
            padding: 5px 30px;
            border-radius: 50px;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,162,255,0.3);
            display: none;
            flex-direction: column;
            align-items: center;
        }

        /* Top Right Shoe & Dealer */
        .mbj-shoe { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            width: 60px; 
            height: 90px; 
            background: repeating-linear-gradient(45deg, #111, #111 10px, #222 10px, #222 20px); 
            border: 4px solid #555; 
            border-radius: 8px; 
            box-shadow: -10px 15px 25px rgba(0,0,0,0.8); 
            z-index: 5; 
        }

        .mbj-dealer-area { 
            position: absolute; 
            top: 80px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 20; 
        }

        /* HORIZONTAL FLEXBOX ROW FOR SEATS */
        #mbj-seats-row { 
            position: absolute; 
            bottom: 20px; 
            left: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-evenly; 
            align-items: flex-end; 
            padding: 0 20px; 
            z-index: 10; 
        }
        
        /* VERTICAL FLEXBOX FOR SEAT */
        .mbj-seat-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            width: 130px; 
            position: relative; 
        }

        /* Centered Cards Container */
        .mbj-hand-container { 
            display: flex; 
            justify-content: center; 
            position: relative; 
            margin-bottom: 10px; 
            min-height: 85px; 
            width: 100%; 
            pointer-events: none;
        }
        
        /* Action buttons below cards, above circle */
        .mbj-action-row { 
            display: flex; 
            gap: 6px; 
            margin-bottom: 10px; 
            height: 35px; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s; 
        }
        
        .mbj-action-row.show { 
            opacity: 1; 
            pointer-events: auto; 
        }
        
        .mbj-action-btn { 
            width: 35px; 
            height: 35px; 
            border-radius: 50%; 
            background: #111; 
            border: 2px solid rgba(255,255,255,0.3); 
            color: white; 
            font-size: 0.9rem; 
            font-weight: 900; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.9); 
        }
        
        .mbj-action-btn:hover:not(:disabled) { 
            transform: scale(1.15); 
            border-color: white; 
        }
        
        .mbj-action-btn.hit { background: #008040; } 
        .mbj-action-btn.stand { background: #9b0022; } 
        .mbj-action-btn.double { background: #997a00; font-size: 0.7rem; }
        .mbj-action-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(100%); }

        /* The Betting Circle */
        .mbj-circle-container { 
            position: relative; 
            width: 65px; 
            height: 65px; 
            margin-bottom: 8px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .mbj-seat-circle { 
            width: 100%; 
            height: 100%; 
            border: 3px solid rgba(255,255,255,0.3); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.3s; 
            background: rgba(0,0,0,0.4); 
            z-index: 5; 
        }
        
        .mbj-seat-circle:hover { 
            border-color: rgba(255,255,255,0.8); 
            background: rgba(255,255,255,0.2); 
        }
        
        .mbj-seat-circle.occupied { 
            border: 3px solid var(--credits); 
            background: transparent; 
            cursor: default; 
        }
        
        /* PREMIUM CHIP - Placed exactly in the middle of the circle */
        .mbj-chip { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 0.7rem; 
            font-weight: 900; 
            color: white; 
            box-shadow: inset 0 0 0 4px rgba(0,0,0,0.3), 0 5px 10px rgba(0,0,0,0.9); 
            z-index: 10;
            background: var(--c-bg);
            border: 2px solid white;
            outline: 2px dashed white;
            outline-offset: -6px;
            text-shadow: 1px 1px 2px black;
        }
        
        .mbj-chip.ghost { 
            opacity: 0.6; 
            border-color: #00a2ff; 
        }

        .mbj-seat-name { 
            font-weight: 900; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.9); 
            color: white; 
            text-align: center; 
            position: relative;
        }

        /* Card Styles */
        .mbj-card { 
            width: 55px; 
            height: 80px; 
            background: white; 
            border-radius: 6px; 
            box-shadow: -3px 3px 10px rgba(0,0,0,0.6); 
            position: relative; 
            color: black; 
            border: 1px solid #ccc; 
            margin-left: -35px; 
            transform: translateZ(0); 
            font-weight: 900;
        }
        
        .mbj-card:first-child { 
            margin-left: 0; 
        } 
        
        .card-tl { 
            position: absolute; 
            top: 4px; 
            left: 4px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            line-height: 0.9; 
            font-size: 0.9rem; 
        }
        
        .card-br { 
            position: absolute; 
            bottom: 4px; 
            right: 4px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            line-height: 0.9; 
            font-size: 0.9rem; 
            transform: rotate(180deg); 
        }
        
        .card-center { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 2rem; 
        }
        
        .card-red { color: #e60000; } 
        .card-black { color: #000; }
        .card-back { 
            background: repeating-linear-gradient(45deg, #001f4d, #001f4d 10px, #000a1f 10px, #000a1f 20px); 
            border: 2px solid rgba(255,255,255,0.8); 
        }

        .mbj-hand-score { 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%);
            background: #222; 
            border: 2px solid white; 
            border-radius: 50%; 
            font-weight: 900; 
            font-size: 0.85rem; 
            color: white; 
            z-index: 20; 
            padding: 4px 8px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        
        .dealer-score-badge { 
            position: absolute; 
            top: -10px; 
            left: -35px; 
            width: 28px; 
            height: 28px; 
            background: #222; 
            border: 2px solid white; 
            border-radius: 50%; 
            font-weight: 900; 
            font-size: 1rem; 
            color: white; 
            z-index: 20; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* Animations */
        .anim-fly-in { 
            animation: flyIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1) forwards; 
            opacity: 0; 
        }
        
        @keyframes flyIn { 
            0% { opacity: 0; transform: translate(500px, -200px) scale(0.3) rotate(90deg); } 
            100% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); } 
        }
        
        .anim-flip { 
            animation: flipCard 0.4s ease-in-out forwards; 
        }
        
        @keyframes flipCard { 
            0% { transform: rotateY(180deg); } 
            100% { transform: rotateY(0deg); } 
        }
        
        .payout-flare { 
            position: absolute; 
            bottom: 100%; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #00e676; 
            font-size: 1.2rem; 
            font-weight: 900; 
            text-shadow: 0 2px 5px black; 
            animation: floatUp 2s forwards; 
            z-index: 500; 
            pointer-events: none; 
            white-space: nowrap;
        }
        
        @keyframes floatUp { 
            0% { opacity: 0; transform: translate(-50%, 0); } 
            20% { opacity: 1; transform: translate(-50%, -20px); } 
            80% { opacity: 1; transform: translate(-50%, -40px); } 
            100% { opacity: 0; transform: translate(-50%, -60px); } 
        }

        .dimmed { opacity: 0.3; filter: grayscale(80%); }
        
        .seat-glow { 
            position: absolute; 
            top: -40px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 145px; 
            height: 145px; 
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); 
            border-radius: 50%; 
            pointer-events: none; 
            z-index: 1; 
            display: none; 
        }
        
        .active-turn { opacity: 1 !important; z-index: 100; filter: grayscale(0) !important; }
        .active-turn .seat-glow { display: block; animation: pulseGlow 2s infinite; }
        
        @keyframes pulseGlow { 
            0% { transform: translateX(-50%) scale(0.9); opacity: 0.5;} 
            50% { transform: translateX(-50%) scale(1.1); opacity: 1;} 
            100% { transform: translateX(-50%) scale(0.9); opacity: 0.5;} 
        }
        
        .turn-badge {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ps-glow);
            color: black;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 10px;
            z-index: 30;
            animation: floatBadge 1s infinite;
        }
        
        @keyframes floatBadge {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        /* THE CHIP RACK UI (Locks when dealing) */
        .chip-rack-container { 
            width: 1100px;
            margin-top: 15px;
            display: flex; 
            background: rgba(0,0,0,0.85); 
            padding: 15px 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.15); 
            justify-content: center;
            gap: 15px; 
            align-items: center; 
            z-index: 9999; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); 
            transition: 0.3s;
        }
        
        .chip-rack-locked {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .rack-chip { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 0.8rem; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s; 
            border: 3px solid white; 
            color: white;
            text-shadow: 1px 1px 2px black;
            background: var(--c-bg);
            box-shadow: inset 0 0 0 4px rgba(0,0,0,0.3), 0 5px 10px rgba(0,0,0,0.9); 
            outline: 2px dashed white;
            outline-offset: -6px;
        }
        
        .rack-chip:hover { 
            transform: translateY(-5px) scale(1.1); 
            box-shadow: 0 0 15px white; 
        }
        
        .rack-btn { 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            font-size: 0.9rem;
            transition: 0.2s;
            text-transform: uppercase;
        }
        
        .rack-btn-clear { background: rgba(255,255,255,0.1); color: white; }
        .rack-btn-clear:hover { background: rgba(255,51,102, 0.8); }
        .rack-btn-confirm { background: var(--success); color: black; box-shadow: 0 0 15px rgba(0,230,118,0.4); }
        .rack-btn-confirm:hover { background: white; }
        
        .custom-input {
            width: 100px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            background: #111;
            color: white;
            font-weight: 900;
            text-align: center;
        }

        /* ================= RETRO HORSE DERBY ================= */
        .hr-board { 
            width: 900px; 
            height: 600px; 
            background: #0a0a0a; 
            border: 4px solid #333; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); 
        }
        
        .hr-top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
        }
        
        .hr-ticker { 
            flex: 1; 
            text-align: center; 
            color: var(--credits); 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 1.5rem; 
            font-weight: 900; 
            text-shadow: 0 0 10px var(--credits); 
            padding: 10px; 
            background: #111; 
            border: 2px solid #333; 
            border-radius: 8px; 
            margin: 0 20px; 
            text-transform: uppercase;
        }
        
        .hr-timer-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
        }
        
        #hr-timer { 
            font-variant-numeric: tabular-nums; 
            display: inline-block; 
            width: 30px; 
            text-align: center;
        }

        .hr-track-window { 
            flex: 1; 
            border: 4px solid #222; 
            position: relative; 
            overflow: hidden; 
            border-radius: 8px; 
            background: #87CEEB; 
            display: flex; 
            flex-direction: column;
        }
        
        .hr-bg-grass { 
            height: 20%; 
            width: 100%; 
            background: #2a8f3d; 
            border-bottom: 4px solid white; 
            z-index: 1; 
            position: relative;
        }
        
        .hr-bg-dirt { 
            height: 80%; 
            width: 200%; 
            background: repeating-linear-gradient(90deg, #4a3026 0px, #4a3026 40px, #3d251d 40px, #3d251d 80px); 
            z-index: 2; 
            position: relative;
        }
        
        .track-moving .hr-bg-dirt { animation: scrollTrack 0.3s linear infinite; }
        
        @keyframes scrollTrack { 
            from { transform: translateX(0); } 
            to { transform: translateX(-80px); } 
        }

        /* The Starting Gate Bar */
        .hr-starting-gate { 
            position: absolute; 
            left: 5%; 
            top: 20%; 
            bottom: 0; 
            width: 20px; 
            background: repeating-linear-gradient(to bottom, #777 0px, #777 15px, #444 15px, #444 30px); 
            border-right: 5px solid #222; 
            border-left: 2px solid #aaa;
            z-index: 20; 
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 10px 0 20px rgba(0,0,0,0.8);
        }
        
        .gate-open { transform: translateY(-100%); }

        .hr-finish-line { 
            position: absolute; 
            right: -100px; 
            top: 20%; 
            bottom: 0; 
            width: 40px; 
            background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000); 
            background-size: 20px 20px; 
            background-position: 0 0, 10px 10px; 
            background-color: #fff; 
            z-index: 5; 
            border-left: 6px solid #ffcc00; 
        }
        
        /* Grid Architecture */
        .hr-lanes-grid { 
            position: absolute; 
            top: 20%; 
            bottom: 0; 
            width: 100%; 
            display: grid; 
            grid-template-rows: repeat(6, 1fr); 
            z-index: 10; 
        }
        
        .hr-lane { 
            width: 100%; 
            height: 100%; 
            border-bottom: 2px dashed rgba(255,255,255,0.15); 
            display: flex; 
            align-items: center; 
            position: relative; 
        }
        
        .hr-horse-group { 
            position: absolute; 
            left: 0%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 15; 
            transform: scaleX(-1); 
        }
        
        .hr-gif { 
            height: 50px; 
            pointer-events: none;
        }
        
        /* Exact Filter Adjustments to get Vivid Colors */
        .horse-Red .hr-gif { filter: drop-shadow(5px 5px 2px rgba(0,0,0,0.5)); }
        .horse-Blue .hr-gif { filter: hue-rotate(210deg) saturate(2) drop-shadow(5px 5px 2px rgba(0,0,0,0.5)); }
        .horse-Green .hr-gif { filter: hue-rotate(100deg) saturate(1.5) drop-shadow(5px 5px 2px rgba(0,0,0,0.5)); }
        .horse-Yellow .hr-gif { filter: hue-rotate(60deg) saturate(3) drop-shadow(5px 5px 2px rgba(0,0,0,0.5)); }
        .horse-Purple .hr-gif { filter: hue-rotate(270deg) saturate(2) drop-shadow(5px 5px 2px rgba(0,0,0,0.5)); }
        .horse-Orange .hr-gif { filter: hue-rotate(30deg) saturate(2) drop-shadow(5px 5px 2px rgba(0,0,0,0.5)); }

        .winner-glow { 
            filter: drop-shadow(0 0 15px white); 
            transform: scaleX(-1) scale(1.1) !important; 
            z-index: 50 !important; 
        }
        
        .loser-fade { opacity: 0.3; }

        .hr-controls-area { 
            margin-top: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .hr-bet-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 10px; 
        }
        
        .hr-bet-btn { 
            background: var(--h-bg); 
            border: 2px solid white; 
            color: white; 
            padding: 10px 5px; 
            font-family: 'Rajdhani', sans-serif; 
            font-weight: 900; 
            font-size: 1.1rem; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.1s; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            position: relative; 
            text-shadow: 1px 1px 2px black;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        .hr-bet-btn:hover:not(:disabled) { 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(255,255,255,0.3); 
        }
        
        .hr-bet-btn:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }
        
        .flash-bet { animation: flashBet 0.2s; }
        @keyframes flashBet { 
            0% { background: white; color: black; } 
            100% { background: var(--h-bg); color: white; } 
        }
        
        .bet-badge {
            font-size: 0.8rem;
            color: white;
            margin-top: 5px;
            display: block;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

  <header class="topbar">
      <div class="brand-title" onclick="switchView('casino')">STICK N' TRADE</div>
      <div style="font-weight: 800; font-size: 1.1rem;">
          <i class="fas fa-user-circle" style="color:var(--ps-glow)"></i> 
          <span id="player-name-display">Loading...</span>
      </div>
  </header>

  <div class="main-wrapper">
      
      <button class="btn-back-fixed hidden" id="global-back-btn" onclick="backToHub()">
          <i class="fas fa-arrow-left"></i> LEAVE TABLE
      </button>
      
      <div id="view-casino" class="view-container">
        <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px;">SELECT TABLE</h1>
        <div class="lobby-modes-container">
            <div class="game-card" onclick="openGame('mbj')">
                <i class="fas fa-cards" style="font-size:4rem;"></i>
                <div>
                    <div style="font-size: 1.5rem; font-weight:900;">VIP BLACKJACK</div>
                    <div style="color:var(--text-muted); font-size:0.9rem; font-weight:600;">Premium Layout</div>
                </div>
            </div>
            <div class="game-card" onclick="openGame('horserace')">
                <i class="fas fa-horse-head" style="font-size:4rem; color: var(--danger);"></i>
                <div>
                    <div style="font-size: 1.5rem; font-weight:900;">RETRO DERBY</div>
                    <div style="color:var(--text-muted); font-size:0.9rem; font-weight:600;">Smooth Physics Engine</div>
                </div>
            </div>
        </div>
      </div>

      <div id="view-mbj" class="view-container hidden">
          
          <div class="mbj-board">
              <div class="mbj-table-line"></div>
              
              <div class="mbj-logo">
                  <h1>BLACKJACK</h1>
                  <p>PAYS 3 TO 2</p>
              </div>

              <div class="mbj-balance-hud">
                  <div style="font-size:0.7rem; color:gray; font-weight:900;">BALANCE</div>
                  <div id="bj-bal" style="font-size:1.3rem; font-weight:900; color:var(--credits);">0 TC</div>
              </div>

              <div class="mbj-timer-hud" id="bj-timer-box">
                  <div style="color:var(--ps-glow); font-size:0.7rem; font-weight:900; letter-spacing:1px;">PLACE BETS</div>
                  <div id="bj-timer" style="font-family:'Rajdhani', monospace; font-size:1.8rem; font-weight:900; color:white; line-height:1;">15</div>
              </div>

              <div class="mbj-shoe"></div>

              <div class="mbj-dealer-area">
                  <div class="dealer-score-badge" id="mbj-d-score-val" style="display:none;">0</div>
                  <div id="mbj-fs-dealer-hand" style="display:flex; justify-content:center; position:relative; min-width:100px;"></div>
              </div>
              
              <div id="mbj-seats-row"></div>
          </div>

          <div class="chip-rack-container" id="mbj-chip-rack">
              <button class="rack-btn rack-btn-clear" onclick="clearLocalBet()"><i class="fas fa-times"></i></button>
              <div class="rack-chip chip-10" style="--c-bg:#444;" onclick="addLocalBet(10)">10</div>
              <div class="rack-chip chip-100" style="--c-bg:#00a2ff;" onclick="addLocalBet(100)">100</div>
              <div class="rack-chip chip-1k" style="--c-bg:#ff3366;" onclick="addLocalBet(1000)">1K</div>
              <div class="rack-chip chip-10k" style="--c-bg:#00e676; color:black;" onclick="addLocalBet(10000)">10K</div>
              <div class="rack-chip chip-50k" style="--c-bg:#ffcc00; color:black;" onclick="addLocalBet(50000)">50K</div>
              
              <input type="number" id="custom-bet" class="custom-input" placeholder="Amount">
              <button class="rack-btn" style="background:#00a2ff; color:white;" onclick="addCustomBet()"><i class="fas fa-plus"></i></button>
              
              <button class="rack-btn rack-btn-confirm" onclick="confirmLocalBet()">BET <i class="fas fa-check"></i></button>
          </div>
      </div>

      <div id="view-horserace" class="view-container hidden">
          <div class="hr-board">
              <div class="hr-top-bar">
                  <div class="hr-timer-box">
                      <i class="fas fa-clock"></i>
                      <span id="hr-timer">15</span>
                  </div>
                  <div class="hr-ticker" id="hr-ticker">WAITING FOR NEXT RACE...</div>
                  <div style="background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15); padding: 5px 15px; border-radius: 8px; text-align: right;">
                      <div style="font-family:'Outfit'; font-size:0.7rem; color:gray; font-weight:800;">BALANCE</div>
                      <div id="hr-my-bal" style="font-family:'Rajdhani', sans-serif; font-size:1.2rem; font-weight:900; color:var(--credits);">0 TC</div>
                  </div>
              </div>
              
              <div class="hr-track-window" id="hr-environment">
                  <div class="hr-bg-grass"></div>
                  <div class="hr-bg-dirt"></div>
                  
                  <div class="hr-finish-line" id="hr-finish-line"></div>
                  <div class="hr-starting-gate" id="hr-gate"></div>
                  
                  <div class="hr-lanes-grid" id="hr-lanes-container"></div>
              </div>

              <div class="hr-controls-area">
                  <div style="display:flex; gap:15px; justify-content:center;">
                      <input type="number" id="hr-bet-input" class="input-control" placeholder="BET AMOUNT (TC)" style="max-width:300px; font-size:1.2rem; height:50px; font-family:'Outfit';" value="100">
                  </div>
                  <div class="hr-bet-grid" id="hr-bet-grid"></div>
              </div>
          </div>
      </div>

  </div>
  
  <div id="flash-msg" class="local-flash"></div> 

  <script>
    // Include Frontend BJ Math to prevent Blank Screen Crashes
    function getBJScore(hand) {
        let score = 0, aces = 0;
        for (let card of hand) { 
            score += card.bjVal; 
            if (card.raw === 'A') aces += 1; 
        }
        while (score > 21 && aces > 0) { 
            score -= 10; 
            aces -= 1; 
        }
        return score;
    }

    const socket = io(); 
    let myUsername = '', myCredits = 0;
    let activeGame = null;
    let mbjGameState = 'BETTING';
    let hrState = { time: 15, status: 'BETTING', currentOdds: {} };
    let localPendingBet = 0;
    let localSeatId = null;
    let renderedCardCount = {}; 
    let myHRBets = {};

    window.onload = () => { 
        socket.emit('login', { username: 'VIP_Tester', password: '123' }); 
    };
    
    socket.on('loginSuccess', (data) => { 
        myUsername = data.username; 
        updateBalance(data.credits);
        document.getElementById('player-name-display').innerText = myUsername;
        switchView('casino'); 
    });
    
    socket.on('balanceUpdateData', (data) => {
        updateBalance(data.credits);
    });

    function updateBalance(amt) {
        myCredits = amt;
        document.getElementById('bj-bal').innerText = amt.toLocaleString() + ' TC';
        document.getElementById('hr-my-bal').innerText = amt.toLocaleString() + ' TC';
    }

    function showLocalFlash(msg, type='error') {
        let f = document.getElementById('flash-msg');
        f.innerText = msg;
        f.classList.remove('show', 'success');
        void f.offsetWidth;
        f.classList.add('show');
        if(type === 'success') f.classList.add('success');
        setTimeout(() => f.classList.remove('show'), 2500);
    }

    function switchView(viewId) { 
        document.querySelectorAll('.view-container').forEach(d => d.classList.add('hidden')); 
        let v = document.getElementById('view-' + viewId); 
        if (v) v.classList.remove('hidden'); 
        document.getElementById('global-back-btn').classList.toggle('hidden', viewId === 'casino');
    }

    function backToHub() {
        if(activeGame === 'mbj') { 
            socket.emit('mbjLeaveSeat'); 
        }
        if(activeGame === 'horserace' && document.getElementById('hr-ticker').innerText === "AND THEY'RE OFF!") { 
            showLocalFlash("Wait for race to finish!", "error"); 
            return; 
        }
        if(activeGame) socket.emit('leaveRoom', activeGame);
        activeGame = null;
        switchView('casino');
    }

    function openGame(id) {
        activeGame = id;
        socket.emit('joinRoom', id);
        if (id === 'mbj') {
            renderedCardCount = {};
            renderMBJSeats({ 1:null, 2:null, 3:null, 4:null, 5:null });
            switchView('mbj');
        } else if (id === 'horserace') {
            setupDerbyUI();
            switchView('horserace');
        }
    }

    const delay = ms => new Promise(res => setTimeout(res, ms));

    // =========================================================================
    // VIP BLACKJACK RENDERING
    // =========================================================================
    let currentMBJSeats = { 1:null, 2:null, 3:null, 4:null, 5:null };

    function generateCardHTML(c, isHidden = false, animateIn = true, animateFlip = false) {
        let animClass = '';
        if(animateIn) animClass = 'anim-fly-in';
        if(animateFlip) animClass = 'anim-flip';
        
        if(isHidden) return `<div class="mbj-card card-back ${animClass}"></div>`;
        let cleanSuit = c.suitHtml.replace(/<[^>]*>?/gm, ''); 
        let colorClass = (cleanSuit === '♥' || cleanSuit === '♦') ? 'card-red' : 'card-black';
        return `<div class="mbj-card ${colorClass} ${animClass}">
                    <div class="card-tl"><div>${c.raw}</div><div style="font-size:1.1rem; margin-top:-2px;">${cleanSuit}</div></div>
                    <div class="card-center">${cleanSuit}</div>
                    <div class="card-br"><div>${c.raw}</div><div style="font-size:1.1rem; margin-top:-2px;">${cleanSuit}</div></div>
                </div>`;
    }
    
    function renderMBJSeats(seats, activeTurnObj = null) {
        currentMBJSeats = seats || currentMBJSeats; 
        let cont = document.getElementById('mbj-seats-row'); 
        if(!cont) return; 
        cont.innerHTML = '';
        
        let activeSeatNum = activeTurnObj ? activeTurnObj.seat : null;
        localSeatId = null;

        for(let i=1; i<=5; i++) {
            let s = currentMBJSeats[i]; 
            let isMe = s && s.username === myUsername; 
            if (isMe) localSeatId = i;

            let isMySeatTurn = activeSeatNum == i;
            let dimClass = (mbjGameState === 'PLAYER_TURN' && !isMySeatTurn && s) ? 'dimmed' : '';
            let activeClass = isMySeatTurn ? 'active-turn' : '';
            let boxClass = `mbj-seat-circle ${s ? 'occupied' : ''}`;
            
            let canSit = !s && mbjGameState === 'BETTING' && !Object.values(currentMBJSeats).some(st => st && st.username === myUsername);
            let clickAction = canSit ? `socket.emit('mbjTakeSeat', ${i})` : ``; 

            let html = `<div class="mbj-seat-wrapper ${activeClass} ${dimClass}" id="mbj-seat-${i}">`;
            
            // 1. CARDS (Top)
            html += `<div class="mbj-hand-container">`;
            if (s && s.hands && s.hands.length > 0) {
                let currentHandCount = s.hands[0].cards.length;
                let previouslyRendered = renderedCardCount[i] || 0;
                
                // Score Badge above hand
                if(s.hands[0].cards.length > 0 && s.hands[0].status !== 'BUST') { 
                    html += `<div class="mbj-hand-score">${s.hands[0].score}</div>`; 
                }
                
                // Turn Badge
                if(isMySeatTurn && mbjGameState === 'PLAYER_TURN') {
                    html += `<div class="turn-badge">YOUR TURN</div>`;
                }

                s.hands.forEach((hand, hIdx) => {
                    hand.cards.forEach((c, cIdx) => { 
                        let animateThisCard = cIdx >= previouslyRendered;
                        html += generateCardHTML(c, false, animateThisCard, false);
                    });
                });
                renderedCardCount[i] = currentHandCount; 
            } else { renderedCardCount[i] = 0; }
            html += `</div>`;

            // 2. ACTION BUTTONS (Middle)
            let btnClass = (isMySeatTurn && mbjGameState === 'PLAYER_TURN' && isMe) ? 'show' : '';
            let canDouble = s && s.hands && s.hands.length > 0 && s.hands[0].cards.length === 2;
            html += `<div class="mbj-action-row ${btnClass}">
                        <button class="mbj-action-btn hit" onclick="socket.emit('mbjAction', {type:'hit'})"><i class="fas fa-plus"></i></button>
                        <button class="mbj-action-btn stand" onclick="socket.emit('mbjAction', {type:'stand'})"><i class="fas fa-hand-paper"></i></button>
                        <button class="mbj-action-btn double" onclick="socket.emit('mbjAction', {type:'double'})" ${canDouble ? '' : 'disabled'}>x2</button>
                     </div>`;

            // 3. CIRCLE & CHIPS (Bottom)
            html += `<div class="mbj-circle-container">`;
            html += `<div class="${boxClass}" ${clickAction ? `onclick="${clickAction}"` : ''} style="${canSit ? 'cursor:pointer;' : 'cursor:default;'}">`;
            if (s) {
                let totalSeatBet = s.hands && s.hands.length > 0 ? s.hands.reduce((sum, h)=>sum+h.bet, 0) : s.bet || 0;
                let displayBet = totalSeatBet;
                if (isMe && mbjGameState === 'BETTING' && localPendingBet > 0 && totalSeatBet === 0) displayBet = localPendingBet;
                
                // Premium Centered Chip
                if (displayBet > 0) { 
                    let cBg = displayBet >= 10000 ? '#00e676' : displayBet >= 1000 ? '#ff3366' : displayBet >= 100 ? '#00a2ff' : '#444';
                    html += `<div class="mbj-chip ${totalSeatBet===0?'ghost':''}" style="--c-bg:${cBg};">${displayBet}</div>`; 
                }
            } else {
                html += `<i class="fas fa-plus" style="font-size:1.5rem; opacity:${mbjGameState==='BETTING' ? 0.7 : 0.1}; color: white;"></i>`;
            }
            html += `</div></div>`; 

            // 4. NAME & PAYOUT
            let nameHTML = s ? s.username : 'EMPTY';
            html += `<div class="mbj-seat-name" style="color: ${isMe ? 'var(--ps-glow)' : (s ? 'white' : 'var(--text-muted)')}; opacity:${s || mbjGameState==='BETTING' ? 1 : 0.3};" id="seat-name-${i}">`;
            html += nameHTML;
            html += `</div>`;

            if(isMe && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0) && mbjGameState === 'BETTING') {
                html += `<div style="margin-top:5px;"><button class="btn-play" onclick="socket.emit('mbjLeaveSeat');" style="padding:4px 10px; font-size:0.7rem; background:rgba(255,51,102,0.2); border-color:var(--danger);">LEAVE</button></div>`;
            }
            
            html += `</div>`; 
            cont.innerHTML += html;
        }

        let rack = document.getElementById('mbj-chip-rack');
        if (mbjGameState === 'BETTING') {
            rack.classList.remove('chip-rack-locked');
            if (localSeatId && currentMBJSeats[localSeatId] && (!currentMBJSeats[localSeatId].hands || currentMBJSeats[localSeatId].hands.length === 0 || currentMBJSeats[localSeatId].hands[0].bet === 0)) {
                // Allows betting
            } else {
                rack.classList.add('chip-rack-locked');
            }
        } else {
            rack.classList.add('chip-rack-locked');
            localPendingBet = 0;
        }
    }

    function addLocalBet(amt) {
        if(myCredits >= localPendingBet + amt) { 
            localPendingBet += amt; 
            renderMBJSeats(); 
        } else { 
            showLocalFlash('Not enough credits', 'error'); 
        }
    }
    
    function addCustomBet() {
        let v = parseInt(document.getElementById('custom-bet').value);
        if(!isNaN(v) && v > 0) {
            addLocalBet(v);
        }
        document.getElementById('custom-bet').value = '';
    }

    function clearLocalBet() { 
        localPendingBet = 0; 
        renderMBJSeats(); 
    }
    
    function confirmLocalBet() {
        if(localPendingBet < 10) return showLocalFlash('Min Bet 10 TC', 'error');
        socket.emit('mbjPlaceBet', localPendingBet);
        localPendingBet = 0; 
    }

    socket.on('mbjUpdate', async (data) => {
        if(activeGame !== 'mbj') return;
        let dBadge = document.getElementById('mbj-d-score-val');
        let tVal = document.getElementById('bj-timer');
        let tBox = document.getElementById('bj-timer-box');

        if(data.event === 'timer') {
            mbjGameState = 'BETTING'; 
            dBadge.style.display = 'none';
            
            if(data.active) {
                tBox.style.display = 'flex';
                tVal.innerText = data.time; 
            } else {
                tBox.style.display = 'none';
            }
            renderMBJSeats(data.seats); 
        } 
        else if (data.event === 'sync_seats') { 
            renderMBJSeats(data.seats, data.activeTurn); 
        } 
        else if (data.event === 'lock_bets') { 
            mbjGameState = 'DEALING'; 
            tVal.innerText = '--'; 
            renderMBJSeats(data.seats, null);
        } 
        else if (data.event === 'deal') {
            renderMBJSeats(data.seats, null); 
            let dHand = document.getElementById('mbj-fs-dealer-hand');
            if(dHand) { 
                dHand.innerHTML = ''; 
                dHand.innerHTML += generateCardHTML(data.dealerHand[0], false, true, false); 
                dHand.innerHTML += generateCardHTML(data.dealerHand[1], true, true, false); 
                setTimeout(() => { 
                    dBadge.style.display = 'flex'; 
                    dBadge.innerText = data.dealerHand[0].bjVal; 
                }, 1000);
            } 
        } 
        else if (data.event === 'turn') {
            mbjGameState = 'PLAYER_TURN'; 
            tVal.innerText = data.time || '--'; 
            renderMBJSeats(data.seats, data.activeTurn);
        } 
        else if (data.event === 'turn_timer') { 
            tVal.innerText = data.time; 
        }
        else if (data.event === 'dealer_resolved') {
            mbjGameState = 'RESOLVING'; 
            tBox.style.display = 'none';
            renderMBJSeats(data.seats); 
            
            let dHand = document.getElementById('mbj-fs-dealer-hand'); 
            if(dHand) {
                dHand.innerHTML = generateCardHTML(data.dealerHand[0], false, false, false);
                dHand.innerHTML += generateCardHTML(data.dealerHand[1], false, false, true); 
                dBadge.innerText = getBJScore(data.dealerHand.slice(0,2));
                
                const drawRemaining = async () => {
                    await delay(800);
                    for(let i=2; i<data.dealerHand.length; i++) { 
                        dHand.innerHTML += generateCardHTML(data.dealerHand[i], false, true, false); 
                        dBadge.innerText = getBJScore(data.dealerHand.slice(0, i+1));
                        await delay(800); 
                    }
                    dBadge.innerText = data.dealerScore;
                    let myNet = 0;
                    for(let i=1; i<=5; i++) {
                        let seat = data.seats[i];
                        if (seat && data.results && data.results[i]) {
                            let tw = data.results[i].win;
                            if (tw > 0) { 
                                document.getElementById(`seat-name-${i}`).innerHTML += `<div class="payout-flare">+ ${tw}</div>`; 
                            }
                            if (seat.username === myUsername) {
                                let tb = seat.hands.reduce((sum, h)=>sum+h.bet, 0);
                                myNet = tw - (tb - data.results[i].push);
                            }
                        }
                    }
                    if (myNet > 0) showLocalFlash(`WON +${myNet} TC`, 'success');
                    else if (myNet < 0) showLocalFlash(`LOST ${Math.abs(myNet)} TC`, 'error');
                }; 
                drawRemaining();
            }
        } 
        else if (data.event === 'new_round') {
            mbjGameState = 'BETTING'; 
            document.getElementById('mbj-fs-dealer-hand').innerHTML = ''; 
            dBadge.style.display = 'none'; 
            renderedCardCount = {};
            renderMBJSeats(data.seats); 
        }
    });

    // =========================================================================
    // RETRO HORSE DERBY LOGIC
    // =========================================================================
    const btnColors = {'Red':'#ff3366', 'Blue':'#00a2ff', 'Green':'#00e676', 'Yellow':'#ffcc00', 'Purple':'#b366ff', 'Orange':'#ff8800'};
    
    function setupDerbyUI() {
        let container = document.getElementById('hr-lanes-container');
        if(!container) return;
        
        let trackHTML = ''; 
        ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach((c) => {
            trackHTML += `
            <div class="hr-lane">
                <div id="horse-${c}" class="hr-horse-group horse-${c}" style="left: 0%;">
                    <img src="./giphy.gif" class="hr-gif" alt="Horse">
                </div>
            </div>`;
        });
        container.innerHTML = trackHTML;
        
        let bg = document.getElementById('hr-bet-grid');
        if(bg) {
            bg.innerHTML = '';
            ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach((c) => {
                let oText = hrState.currentOdds && hrState.currentOdds[c] ? hrState.currentOdds[c] + 'x' : '?x';
                let myB = myHRBets[c] || 0;
                
                bg.innerHTML += `
                <button class="hr-bet-btn" style="--h-bg:${btnColors[c]};" onclick="placeHRBet('${c}', this)">
                    ${c} 
                    <span style="color: white; text-shadow: 1px 1px 2px black;">${oText}</span>
                    <span class="bet-badge" id="b-${c}">${myB > 0 ? myB + ' TC' : ''}</span>
                </button>`;
            });
        }
        let fLineEl = document.getElementById('hr-finish-line');
        if(fLineEl) fLineEl.style.right = '-100px'; 
        let gate = document.getElementById('hr-gate');
        if(gate) gate.classList.remove('gate-open');
    }

    function placeHRBet(c, btnElement) {
        if(hrState.status !== 'BETTING') return;
        let i = document.getElementById('hr-bet-input');
        let a = parseFloat(i.value);
        if(isNaN(a) || a < 10) return;
        
        btnElement.classList.add('flash-bet');
        setTimeout(() => btnElement.classList.remove('flash-bet'), 200);

        socket.emit('placeSharedBet', { room: 'horserace', choice: c, amount: a });
    }

    socket.on('sharedBetConfirmed', (data) => {
        if(data.room !== 'horserace') return;
        myHRBets[data.choice] = (myHRBets[data.choice] || 0) + data.amount;
        let e = document.getElementById('b-' + data.choice);
        if(e) e.innerText = myHRBets[data.choice] + ' TC';
    });

    socket.on('hrTimerUpdate', (data) => {
        hrState.time = data.time;
        if (data.odds) hrState.currentOdds = data.odds;
        if(activeGame === 'horserace' && document.getElementById('hr-ticker').innerText !== "AND THEY'RE OFF!") {
            let s = document.getElementById('hr-timer');
            if(s) s.innerText = data.time;
        }
    });

    socket.on('hrLockBets', () => {
        if(activeGame !== 'horserace') return;
        hrState.status = 'RACING';
        document.getElementById('hr-ticker').innerText = "AND THEY'RE OFF!";
        document.querySelectorAll('.hr-bet-btn').forEach(b => b.disabled = true);
    });

    let hrRaceInterval;
    socket.on('hrRaceStart', (data) => {
        if(activeGame !== 'horserace') return;
        const horses = ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'];
        
        let currentPos = { Red: 0, Blue: 0, Green: 0, Yellow: 0, Purple: 0, Orange: 0 };
        let targetPos = { Red: 0, Blue: 0, Green: 0, Yellow: 0, Purple: 0, Orange: 0 };

        let duration = data.duration; let startTime = Date.now();
        
        let gate = document.getElementById('hr-gate');
        if(gate) gate.classList.add('gate-open');
        document.getElementById('hr-environment').className = 'hr-track-window track-moving';
        
        let fLineEl = document.getElementById('hr-finish-line');
        if(fLineEl) { fLineEl.style.transition = 'right 2s ease-out'; fLineEl.style.right = '-100px'; }
        
        if(hrRaceInterval) clearInterval(hrRaceInterval);

        horses.forEach(h => {
            let el = document.getElementById('horse-' + h);
            if (el) { el.classList.remove('loser-fade', 'winner-glow'); }
        });

        let nextTargetUpdate = startTime + 500;
        let sprintTriggered = false;

        hrRaceInterval = setInterval(() => {
            let now = Date.now(); let elapsed = now - startTime; let timeRemaining = duration - elapsed;

            if (timeRemaining > 3000) {
                if (now > nextTargetUpdate) {
                    horses.forEach(h => { targetPos[h] = Math.random() * 60 - 10; });
                    nextTargetUpdate = now + 800 + Math.random() * 1000; 
                }
            } else {
                if (!sprintTriggered) {
                    sprintTriggered = true;
                    document.getElementById('hr-environment').className = 'hr-track-window track-slowing'; 
                    if (fLineEl) { fLineEl.style.transition = 'none'; fLineEl.style.right = '5%'; }
                    horses.forEach(h => { targetPos[h] = (h === data.winner) ? 95 : 60 + (Math.random() * 20); });
                }
            }

            if(elapsed >= duration) {
                clearInterval(hrRaceInterval);
                horses.forEach(h => {
                    let el = document.getElementById('horse-' + h);
                    if(el) { 
                        el.style.left = (h === data.winner ? 95 : Math.min(currentPos[h], 85)) + '%'; 
                    }
                });
                return;
            }

            horses.forEach(h => {
                let speed = (timeRemaining <= 3000) ? 0.03 : 0.015; 
                currentPos[h] += (targetPos[h] - currentPos[h]) * speed;
                
                let el = document.getElementById('horse-' + h);
                if(el) el.style.left = currentPos[h] + '%';
            });
        }, 30); 
    });

    socket.on('hrRaceResults', (data) => {
        if(activeGame !== 'horserace') return;
        let w = data.winner;
        document.getElementById('hr-ticker').innerText = `${w.toUpperCase()} WINS!`;
        document.getElementById('hr-ticker').style.color = btnColors[w];
        
        ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach(c => {
            let el = document.getElementById('horse-' + c);
            if (el) {
                if (c === w) el.classList.add('winner-glow');
                else el.classList.add('loser-fade');
            }
        });

        let myPayout = data.payouts ? (data.payouts[myUsername] || 0) : 0;
        if (myPayout > 0) showLocalFlash(`WON +${myPayout} TC`, 'success');
        else showLocalFlash(`RACE FINISHED`, 'error');
    });

    socket.on('hrNewRound', (data) => {
        if(activeGame === 'horserace') {
            hrState.status = 'BETTING'; hrState.time = 15;
            if (data && data.odds) hrState.currentOdds = data.odds;
            document.getElementById('hr-ticker').innerText = "WAITING FOR NEXT RACE...";
            document.getElementById('hr-ticker').style.color = "white";
            myHRBets = {};
            setupDerbyUI(); 
            document.querySelectorAll('.hr-bet-btn').forEach(b => b.disabled = false);
        }
    });
  </script>
</body>
</html>
