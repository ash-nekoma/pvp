<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick N' Trade | Premium VIP Blackjack</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Rajdhani:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* ================= BASE STYLES & LAYOUT ================= */
        :root { 
            --ps-bg: #000814; 
            --ps-glow: #00a2ff; 
            --glass-bg: rgba(0, 10, 25, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.15); 
            --danger: #ff3366; 
            --success: #00e676; 
            --credits: #ffb400; 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Outfit', sans-serif; 
            outline: none; 
            user-select: none;
        }
        
        body { 
            background: linear-gradient(135deg, #000a1f 0%, #001f4d 50%, #000000 100%); 
            color: white; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            margin: 0;
            padding: 0;
        }
        
        input, textarea { user-select: auto; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { display: none; }

        .topbar { 
            flex: 0 0 75px; 
            background: rgba(0, 5, 15, 0.95); 
            border-bottom: 1px solid rgba(255,255,255,0.15); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 25px; 
            z-index: 1000; 
        }
        
        .brand-title { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 162, 255, 0.5); cursor: pointer; }
        
        .main-wrapper { 
            flex: 1; 
            position: relative; 
            width: 100%; 
            height: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        
        .view-container { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            width: 100%; 
            height: 100%; 
        }

        .btn-play { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.15); 
            padding: 12px 15px; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s; 
            text-transform: uppercase; 
        }
        .btn-play:hover:not(:disabled) { background: white; color: black; transform: translateY(-2px); }
        .btn-play:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-back-fixed { 
            position: absolute; 
            top: 20px; 
            left: 25px; 
            z-index: 1000; 
            background: rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.15); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .btn-back-fixed:hover { background: white; color: black; }

        /* ================= DOCKED LIVE CHAT ================= */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px; 
            height: 380px; 
            background: rgba(0, 10, 25, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            z-index: 10000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            transform-origin: bottom right;
        }

        .chat-widget.minimized {
            transform: scale(0.2) translate(120px, 120px);
            opacity: 0.8;
            cursor: pointer;
        }

        .chat-header {
            padding: 12px;
            background: rgba(0, 162, 255, 0.1);
            border-bottom: 1px solid var(--glass-border);
            font-weight: 900;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--ps-glow);
            border-radius: 15px 15px 0 0;
            cursor: pointer;
        }

        .chat-messages {
            flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.8rem;
        }

        .chat-msg-row { display: flex; flex-direction: column; }
        .chat-meta { font-size: 0.65rem; color: #aaa; margin-bottom: 2px; }
        .chat-text { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px; line-height: 1.3; word-wrap: break-word; }
        .chat-text.me { background: rgba(0, 162, 255, 0.2); color: white; border-bottom-right-radius: 0; }
        .chat-text.other { border-bottom-left-radius: 0; }

        .chat-input-area {
            padding: 10px; border-top: 1px solid var(--glass-border); display: flex; gap: 8px; background: rgba(0,0,0,0.5); border-radius: 0 0 15px 15px;
        }

        .chat-input-area input { flex: 1; background: #111; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 12px; border-radius: 15px; font-family: 'Outfit'; font-size: 0.8rem; }
        .chat-input-area button { background: var(--ps-glow); color: black; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: 900; transition: 0.2s; }
        .chat-input-area button:hover { transform: scale(1.1); }

        /* ================= CENTERED SCREEN ALERTS ================= */
        .global-screen-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            border: 2px solid var(--ps-glow); border-radius: 15px;
            padding: 30px 60px; font-size: 2.5rem; font-weight: 900;
            text-transform: uppercase; color: white; text-shadow: 0 5px 15px rgba(0,0,0,1);
            z-index: 99999; display: none; opacity: 0;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,162,255,0.3);
            text-align: center;
        }
        .global-screen-alert.show { display: flex; flex-direction: column; align-items: center; animation: popupAlert 3s forwards; }
        .global-screen-alert.success { border-color: var(--success); box-shadow: 0 15px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,230,118,0.3); color: var(--success); }
        .global-screen-alert.error { border-color: var(--danger); box-shadow: 0 15px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,51,102,0.3); color: var(--danger); }
        
        @keyframes popupAlert { 
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.8); } 
            10% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 
            90% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 
            100% { opacity: 0; transform: translate(-50%, -60%) scale(1.1); } 
        }

        /* ================= VIP BLACKJACK UI ================= */
        .game-board-wrapper { display: flex; flex-direction: column; align-items: center; }

        .mbj-board { 
            width: 1100px; 
            height: 520px; 
            background: radial-gradient(circle at center, #107a3f 0%, #053317 100%); 
            border-radius: 20px; 
            position: relative; 
            border: 15px solid #3e2723; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 0 5px rgba(212, 175, 55, 0.4), inset 0 0 40px rgba(0,0,0,0.8);
            overflow: hidden; 
        }
        .mbj-table-line { position: absolute; inset: 15px; border: 2px solid rgba(212, 175, 55, 0.4); border-radius: 10px; pointer-events: none; z-index: 1; }
        
        .mbj-logo { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.3; mix-blend-mode: overlay; pointer-events: none; width: 100%; z-index: 2; }
        .mbj-logo h1 { font-size: 3.5rem; letter-spacing: 12px; margin-bottom: 5px; color: #000; }
        .mbj-logo p { font-weight: 900; font-size: 1rem; letter-spacing: 4px; color: #000; margin-bottom: 5px;}
        .mbj-logo .limits { font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; color: #000; }

        .mbj-balance-hud {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15); padding: 8px 20px; border-radius: 12px;
            z-index: 20; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }

        .mbj-global-timer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            border: 2px solid var(--ps-glow); padding: 30px 60px; border-radius: 20px;
            z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,162,255,0.3);
            text-align: center; display: none; 
        }
        .mbj-global-timer h2 { color: var(--ps-glow); font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 10px; }
        .mbj-global-timer .time-val { color: white; font-family: 'Rajdhani', monospace; font-size: 4rem; font-weight: 900; line-height: 1; }

        /* 3D SHOE */
        .mbj-shoe { 
            position: absolute; top: 20px; right: 20px; width: 70px; height: 100px; 
            background: repeating-linear-gradient(45deg, #001f4d, #001f4d 5px, #000a1f 5px, #000a1f 10px); 
            border: 1px solid rgba(255,255,255,0.5); border-radius: 4px;
            box-shadow: -1px 1px 0 #ddd, -2px 2px 0 #aaa, -3px 3px 0 #ddd, -4px 4px 0 #aaa, 
                        -5px 5px 0 #ddd, -6px 6px 0 #aaa, -7px 7px 0 #ddd, -8px 8px 0 #aaa, 
                        -12px 12px 15px rgba(0,0,0,0.8);
            z-index: 5; 
        }

        .mbj-dealer-area { 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; flex-direction: column; align-items: center; z-index: 20; 
        }

        #mbj-seats-row { 
            position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; 
            justify-content: space-evenly; align-items: flex-end; padding: 0 20px; z-index: 10; 
        }
        
        .mbj-seat-wrapper { 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            width: 160px; pointer-events: auto; position: relative; 
        }

        .mbj-hands-row { display: flex; justify-content: center; gap: 15px; width: 100%; position: relative; }
        .mbj-hand-column { display: flex; flex-direction: column; align-items: center; position: relative; }

        .mbj-hand-container { 
            position: relative; pointer-events: none; display: flex;
            justify-content: center; align-items: flex-end; height: 100px; margin-bottom: 0px; 
            perspective: 1000px;
        }
        
        .mbj-card { 
            width: 70px; height: 100px; background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%); 
            border-radius: 6px; box-shadow: -4px 4px 10px rgba(0,0,0,0.6); position: absolute; 
            bottom: 0; font-family: 'Outfit', sans-serif; color: black; border: 1px solid #ccc; font-weight: 900; z-index: 2;
        }
        
        .card-tl { position: absolute; top: 4px; left: 4px; display: flex; flex-direction: column; align-items: center; line-height: 0.9; font-size: 1rem; }
        .card-br { position: absolute; bottom: 4px; right: 4px; display: flex; flex-direction: column; align-items: center; line-height: 0.9; font-size: 1rem; transform: rotate(180deg); }
        .card-red { color: #cc0000; } .card-black { color: #000; }
        .card-back { background: repeating-linear-gradient(45deg, #001f4d, #001f4d 10px, #000a1f 10px, #000a1f 20px); border: 2px solid rgba(255,255,255,0.8); }
        
        .card-doubled { transform-origin: bottom left; transform: rotate(90deg) translate(0, -70px); z-index: 10; }

        /* EXACT PERFECT CENTERED BADGES */
        .score-badge {
            position: absolute; top: 50%; transform: translateY(-50%); left: -17px; 
            width: 35px; height: 35px; border-radius: 50%; border: 2px solid #000; 
            display: flex; justify-content: center; align-items: center; 
            box-shadow: 2px 2px 6px rgba(0,0,0,0.6); z-index: 50; 
            font-family: 'Rajdhani', sans-serif; /* Cleaner vertical rendering */
        }
        .score-badge span {
            position: relative;
            top: 1px; /* Corrects standard font ascender gaps for perfect optical center */
            font-weight: 900; 
            line-height: 1;
            text-align: center;
        }
        
        .score-active { background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7); color: black; }
        .score-inactive { background: linear-gradient(to bottom, #555, #333); color: white; }
        
        .status-pill {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 5px 15px; border-radius: 20px; color: white; font-weight: 900; font-size: 0.9rem;
            z-index: 60; box-shadow: 0 4px 10px rgba(0,0,0,0.8); white-space: nowrap; letter-spacing: 1px;
        }
        .pill-bj { background: linear-gradient(to bottom, #00b359, #008040); border: 2px solid #00e676; }
        .pill-bust { background: linear-gradient(to bottom, #cc0033, #9b0022); border: 2px solid #ff3366; }

        .anim-fly-in { animation: flyIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards; }
        @keyframes flyIn { 0% { opacity: 0; transform: translate(300px, -200px) scale(0.3) rotate(45deg); } 100% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); } }
        .anim-flip { animation: flipCard 0.4s ease-in-out forwards; }
        @keyframes flipCard { 0% { transform: rotateY(180deg) scale(1.05); } 100% { transform: rotateY(0deg) scale(1); } }

        /* FLOATING CHEVRON (ABOVE BUTTONS) */
        .turn-chevron {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 55px; /* Sits above buttons */
            color: var(--success);
            font-size: 1.5rem;
            z-index: 30;
            animation: floatChevron 1s infinite;
            text-shadow: 0 0 15px var(--success);
        }
        @keyframes floatChevron { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-8px); } }

        /* PERFECTLY ALIGNED ACTION BUTTONS (HOVERING ABOVE CARDS) */
        .mbj-action-row { 
            position: absolute;
            bottom: 100%; 
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 10px; /* Safely floats above the top of the cards */
            display: flex; justify-content: center; gap: 10px; height: 40px; 
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;
        }
        .mbj-action-row.show { opacity: 1; pointer-events: auto; }
        
        .mbj-action-btn { 
            width: 35px; height: 35px; border-radius: 50%; background: linear-gradient(to bottom, #555, #222); 
            border: 2px solid #777; color: white; font-size: 0.9rem; font-weight: 900; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; transition: 0.1s; 
            box-shadow: 0 4px 0 #111, 0 6px 8px rgba(0,0,0,0.5); 
        }
        .mbj-action-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0px 0 #111, 0 2px 4px rgba(0,0,0,0.5); }
        .mbj-action-btn.hit { background: linear-gradient(to bottom, #00e676, #008040); border-color: #00e676; } 
        .mbj-action-btn.stand { background: linear-gradient(to bottom, #ff3366, #9b0022); border-color: #ff3366; } 
        .mbj-action-btn.double { background: linear-gradient(to bottom, #ffcc00, #997a00); border-color: #ffcc00; font-size: 0.75rem; color: black;}
        .mbj-action-btn.split { background: linear-gradient(to bottom, #00a2ff, #005080); border-color: #00a2ff; font-size: 0.75rem; }
        .mbj-action-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(100%); transform: none; box-shadow: none; }

        .mbj-circle-container { 
            position: relative; width: 75px; height: 55px; display: flex;
            justify-content: center; align-items: center; margin-top: 5px;
        }

        .mbj-seat-circle { 
            width: 60px; height: 60px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; 
            transition: 0.3s; background: rgba(0,0,0,0.4); z-index: 5; 
        }
        .mbj-seat-circle:hover { border-color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.2); }
        .mbj-seat-circle.occupied { border: 2px solid transparent; background: transparent; cursor: default; }

        .bet-pill {
            background: black; color: white; border: 1px solid #333; border-radius: 12px;
            font-size: 0.75rem; font-weight: 900; padding: 2px 10px; margin-top: 2px; 
            z-index: 20; box-shadow: 0 2px 5px rgba(0,0,0,0.8); font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
        }

        .player-timer-track {
            width: 90%; height: 6px; background: rgba(0,0,0,0.6); border-radius: 3px;
            margin-top: 5px; overflow: hidden; display: none; box-shadow: inset 0 1px 3px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .player-timer-fill { height: 100%; background: var(--success); width: 100%; transition: width 1s linear; }
        .active-turn .player-timer-track { display: block; }
        
        .chip-stack-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45px; z-index: 10; }
        .mbj-chip-3d { 
            position: absolute; left: 0; width: 45px; height: 45px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; font-size: 0.75rem; font-weight: 900; 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8), 0 3px 5px rgba(0,0,0,0.8); 
            background: radial-gradient(circle at center, #fff 0%, #fff 40%, transparent 41%),
                        repeating-conic-gradient(var(--c-bg) 0% 10%, #fff 10% 20%);
            border: 2px solid var(--c-bg);
        }
        .mbj-chip-3d.ghost { opacity: 0.5; filter: grayscale(80%); }

        .mbj-seat-name { font-weight: 900; font-size: 0.8rem; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.9); color: white; text-align: center; position: relative; margin-top: 5px; }
        .dimmed { opacity: 0.4; filter: grayscale(50%); }

        .animated-chip {
            position: fixed; z-index: 99999; pointer-events: none;
            transition: left 0.6s linear, top 0.6s cubic-bezier(0.5, -0.5, 0.5, 1.5), transform 0.6s linear, opacity 0.2s ease-in 0.4s;
            width: 45px; height: 45px; border-radius: 50%; font-weight: 900; 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.9); 
            background: radial-gradient(circle at center, #fff 0%, #fff 40%, transparent 41%),
                        repeating-conic-gradient(var(--c-bg) 0% 10%, #fff 10% 20%);
            border: 2px solid var(--c-bg);
        }

        .payout-flare { 
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); 
            color: #00e676; font-size: 1.5rem; font-weight: 900; text-shadow: 0 2px 5px black; 
            animation: floatUp 2s forwards; z-index: 500; pointer-events: none; white-space: nowrap;
        }
        @keyframes floatUp { 0% { opacity: 0; transform: translate(-50%, 0); } 20% { opacity: 1; transform: translate(-50%, -20px); } 80% { opacity: 1; transform: translate(-50%, -40px); } 100% { opacity: 0; transform: translate(-50%, -60px); } }

        .chip-rack-container { 
            width: 1100px; margin-top: 15px; display: flex; background: rgba(0,0,0,0.85); padding: 15px 20px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.15); justify-content: center; gap: 15px; align-items: center; z-index: 99; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); transition: 0.3s; position: relative;
        }
        .chip-rack-locked { opacity: 0.5; pointer-events: none; }

        .rack-error-tooltip {
            position: absolute; top: -45px; background: var(--danger); color: white; font-weight: 900;
            padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .rack-error-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 8px; border-style: solid; border-color: var(--danger) transparent transparent transparent; }
        .rack-error-tooltip.show { opacity: 1; }
        
        .rack-chip { 
            width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at center, #fff 0%, #fff 40%, transparent 41%), repeating-conic-gradient(var(--c-bg) 0% 10%, #fff 10% 20%);
            border: 3px solid var(--c-bg); box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 0 5px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: 900; color: black; cursor: pointer; transition: 0.2s; 
        }
        .rack-chip:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 10px 15px rgba(255,255,255,0.3); }
        
        .rack-btn { padding: 10px 20px; border-radius: 8px; font-weight: 900; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 0.9rem; transition: 0.2s; text-transform: uppercase; }
        .rack-btn-clear { background: rgba(255,255,255,0.1); color: white; }
        .rack-btn-clear:hover { background: rgba(255,51,102, 0.8); }
        .rack-btn-confirm { background: var(--success); color: black; box-shadow: 0 0 15px rgba(0,230,118,0.4); }
        .rack-btn-confirm:hover { background: white; }
        .custom-input { width: 100px; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: #111; color: white; font-weight: 900; text-align: center; }
    </style>
</head>
<body>

  <header class="topbar">
      <div class="brand-title" onclick="switchView('casino')">STICK N' TRADE</div>
      <div style="font-weight: 800; font-size: 1.1rem;">
          <i class="fas fa-user-circle" style="color:var(--ps-glow)"></i> 
          <span id="player-name-display">Loading...</span>
      </div>
  </header>

  <div class="main-wrapper">
      <button class="btn-back-fixed hidden" id="global-back-btn" onclick="backToHub()">
          <i class="fas fa-arrow-left"></i> LEAVE TABLE
      </button>
      
      <div id="view-casino" class="view-container">
        <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px;">SELECT TABLE</h1>
        <div class="lobby-modes-container">
            <div class="game-card" onclick="openGame('mbj')">
                <i class="fas fa-cards" style="font-size:4rem;"></i>
                <div>
                    <div style="font-size: 1.5rem; font-weight:900;">VIP BLACKJACK</div>
                    <div style="color:var(--text-muted); font-size:0.9rem; font-weight:600;">Playtech Engine</div>
                </div>
            </div>
        </div>
      </div>

      <div id="view-mbj" class="view-container hidden">
          <div class="game-board-wrapper">
              <div class="mbj-board" id="mbj-board-container">

                  <div class="mbj-global-timer" id="bj-global-timer">
                      <h2>PLACE BETS</h2>
                      <div class="time-val" id="bj-timer-val">15</div>
                  </div>

                  <div class="mbj-table-line"></div>
                  
                  <div class="mbj-logo">
                      <h1>BLACKJACK</h1>
                      <p>PAYS 3 TO 2</p>
                      <p>DEALER MUST DRAW TO 16 AND STAND ON ALL 17s</p>
                      <div class="limits">MIN 10 TC | MAX 50,000 TC</div>
                  </div>

                  <div class="mbj-balance-hud">
                      <div style="font-size:0.7rem; color:#ccc; font-weight:900;">BALANCE</div>
                      <div id="bj-bal" style="font-size:1.3rem; font-weight:900; color:var(--credits);">0 TC</div>
                  </div>

                  <div class="mbj-shoe"></div>

                  <div class="mbj-dealer-area" id="dealer-area">
                      <div id="mbj-fs-dealer-hand" class="mbj-hand-container" style="height: 100px;"></div>
                  </div>
                  
                  <div id="mbj-seats-row"></div>
              </div>

              <div class="chip-rack-container" id="mbj-chip-rack">
                  <div id="rack-alert" class="rack-error-tooltip">MIN BET 10 TC</div>
                  <button class="rack-btn rack-btn-clear" onclick="clearLocalBet()"><i class="fas fa-times"></i></button>
                  <div class="rack-chip chip-10" style="--c-bg:#444;" onclick="addLocalBet(10)">10</div>
                  <div class="rack-chip chip-100" style="--c-bg:#00a2ff;" onclick="addLocalBet(100)">100</div>
                  <div class="rack-chip chip-1k" style="--c-bg:#ff3366;" onclick="addLocalBet(1000)">1K</div>
                  <div class="rack-chip chip-10k" style="--c-bg:#00e676; color:black;" onclick="addLocalBet(10000)">10K</div>
                  <div class="rack-chip chip-50k" style="--c-bg:#ffcc00; color:black;" onclick="addLocalBet(50000)">50K</div>
                  <input type="number" id="custom-bet" class="custom-input" placeholder="Amount">
                  <button class="rack-btn" style="background:#00a2ff; color:white;" onclick="addCustomBet()"><i class="fas fa-plus"></i></button>
                  <button class="rack-btn rack-btn-confirm" onclick="confirmLocalBet()">BET <i class="fas fa-check"></i></button>
              </div>
          </div>
      </div>
  </div>

  <div class="chat-widget minimized" id="chat-widget" onclick="toggleChat(event)">
      <div class="chat-header">
          <span><i class="fas fa-comments"></i> LIVE CHAT</span>
          <i class="fas fa-chevron-up" id="chat-toggle-icon"></i>
      </div>
      <div class="chat-messages" id="chat-messages">
          <div class="chat-msg-row" style="align-items: center; opacity: 0.5;">
              <span style="font-size:0.7rem; margin-top:10px;">Welcome to VIP Premium.</span>
          </div>
      </div>
      <div class="chat-input-area" onclick="event.stopPropagation()">
          <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="handleChatKey(event)">
          <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
      </div>
  </div>

  <div id="global-alert" class="global-screen-alert"></div> 

  <script>
    // Exact sizing dynamically to ensure perfect circle centering
    function getDisplayScore(handCards) {
        let score = 0, aces = 0;
        for (let c of handCards) {
            score += c.bjVal; 
            if (c.raw === 'A') aces++;
        }
        let softScore = score;
        while (score > 21 && aces > 0) { score -= 10; aces--; }
        
        if (aces > 0 && score < 21) {
            return `<span style="font-size:0.75rem; letter-spacing:-0.5px;">${score - 10}/${score}</span>`;
        }
        return `<span style="font-size:1.05rem;">${score}</span>`;
    }

    const socket = io(); 
    let myUsername = '', myCredits = 0;
    let activeGame = null;
    let mbjGameState = 'BETTING';
    let localPendingBet = 0;
    let localSeatId = null;
    let renderedCardCount = { 1:[], 2:[], 3:[], 4:[], 5:[] }; 

    window.onload = () => { socket.emit('login', { username: 'VIP_Tester', password: '123' }); };
    socket.on('loginSuccess', (data) => { myUsername = data.username; updateBalance(data.credits); document.getElementById('player-name-display').innerText = myUsername; switchView('casino'); });
    socket.on('balanceUpdateData', (data) => { updateBalance(data.credits); });

    function updateBalance(amt) {
        myCredits = amt;
        document.getElementById('bj-bal').innerText = amt.toLocaleString() + ' TC';
    }

    function showRackAlert(msg) {
        let r = document.getElementById('rack-alert');
        r.innerText = msg;
        r.classList.add('show');
        setTimeout(() => r.classList.remove('show'), 2000);
    }
    
    function showGlobalAlert(msg, type='success') {
        let f = document.getElementById('global-alert');
        f.innerText = msg;
        f.className = `global-screen-alert show ${type}`;
        setTimeout(() => f.className = 'global-screen-alert', 3000);
    }

    function switchView(viewId) { 
        document.querySelectorAll('.view-container').forEach(d => d.classList.add('hidden')); 
        let v = document.getElementById('view-' + viewId); 
        if (v) v.classList.remove('hidden'); 
        document.getElementById('global-back-btn').classList.toggle('hidden', viewId === 'casino');
        let chat = document.getElementById('chat-widget');
        if (viewId === 'casino') chat.style.display = 'none'; else chat.style.display = 'flex';
    }

    function backToHub() {
        if(activeGame === 'mbj') { socket.emit('mbjLeaveSeat'); document.getElementById('mbj-chip-rack').style.display='none'; }
        if(activeGame) socket.emit('leaveRoom', activeGame);
        activeGame = null;
        switchView('casino');
    }

    function openGame(id) {
        activeGame = id;
        socket.emit('joinRoom', id);
        if (id === 'mbj') {
            renderedCardCount = { 1:[], 2:[], 3:[], 4:[], 5:[] };
            renderMBJSeats({ 1:null, 2:null, 3:null, 4:null, 5:null });
            switchView('mbj');
        }
    }

    const delay = ms => new Promise(res => setTimeout(res, ms));

    let chatOpen = false;
    function toggleChat(e) {
        if(e.target.closest('.chat-input-area') || e.target.closest('.chat-messages')) return;
        let w = document.getElementById('chat-widget'); let i = document.getElementById('chat-toggle-icon'); chatOpen = !chatOpen;
        if(chatOpen) { w.classList.remove('minimized'); i.className = 'fas fa-chevron-down'; document.getElementById('chat-input').focus(); } 
        else { w.classList.add('minimized'); i.className = 'fas fa-chevron-up'; }
    }

    function handleChatKey(e) { if(e.key === 'Enter') sendChat(); }
    function sendChat() {
        let input = document.getElementById('chat-input'); let msg = input.value.trim();
        if(msg.length > 0) { socket.emit('sendChatMessage', msg); input.value = ''; }
    }

    socket.on('receiveChatMessage', (data) => {
        let box = document.getElementById('chat-messages'); let isMe = data.username === myUsername;
        let html = `<div class="chat-msg-row" style="align-items: ${isMe ? 'flex-end' : 'flex-start'};"><div class="chat-meta">${isMe ? 'You' : data.username} • ${data.time}</div><div class="chat-text ${isMe ? 'me' : 'other'}">${data.message}</div></div>`;
        box.innerHTML += html; box.scrollTop = box.scrollHeight;
    });

    function generateCardHTML(c, isHidden = false, animateIn = true, animateFlip = false, leftOffset = 0, isDoubled = false) {
        let animClass = '';
        if(animateIn) animClass = 'anim-fly-in';
        if(animateFlip) animClass += ' anim-flip';
        if(isDoubled) animClass += ' card-doubled';
        
        let styleStr = `left: ${leftOffset}px;`;
        if(isHidden) return `<div class="mbj-card card-back ${animClass}" style="${styleStr}"></div>`;
        let cleanSuit = c.suitHtml.replace(/<[^>]*>?/gm, ''); 
        let colorClass = (cleanSuit === '♥' || cleanSuit === '♦') ? 'card-red' : 'card-black';
        return `<div class="mbj-card ${colorClass} ${animClass}" style="${styleStr}"><div class="card-tl"><div>${c.raw}</div><div style="font-size:1.1rem; margin-top:-2px;">${cleanSuit}</div></div><div class="card-br"><div>${c.raw}</div><div style="font-size:1.1rem; margin-top:-2px;">${cleanSuit}</div></div></div>`;
    }
    
    function getChipStackHTML(amount, isGhost = false) {
        let html = ''; let remaining = amount;
        let chips = [{val: 50000, col: '#ffcc00', text: 'black'}, {val: 10000, col: '#00e676', text: 'black'}, {val: 1000, col: '#ff3366', text: 'white'}, {val: 100, col: '#00a2ff', text: 'white'}, {val: 10, col: '#444', text: 'white'}];
        let offset = 0; let visualCount = 0;
        
        for(let c of chips) {
            while(remaining >= c.val && visualCount < 6) { 
                let label = c.val >= 1000 ? (c.val/1000)+'K' : c.val;
                html += `<div class="mbj-chip-3d ${isGhost ? 'ghost' : ''}" style="--c-bg:${c.col}; color:${c.text}; bottom:${offset}px; z-index:${visualCount};">${label}</div>`;
                remaining -= c.val; offset += 4; visualCount++;
            }
        }
        return `<div class="chip-stack-wrapper" style="height: ${45 + offset}px;">${html}</div>`;
    }

    function animateChipSequence(fromId, toId, color) {
        let fromEl = document.getElementById(fromId); let toEl = document.getElementById(toId);
        if(!fromEl || !toEl) return;
        let fRect = fromEl.getBoundingClientRect(); let tRect = toEl.getBoundingClientRect();
        let chip = document.createElement('div'); chip.className = `animated-chip`;
        chip.style.cssText = `--c-bg: ${color}; left: ${fRect.left + (fRect.width/2)}px; top: ${fRect.top + (fRect.height/2)}px; margin-left: -22.5px; margin-top: -22.5px;`;
        document.body.appendChild(chip);
        
        void chip.offsetWidth;
        chip.style.transform = 'scale(1.5)';
        setTimeout(() => { chip.style.left = `${tRect.left + (tRect.width/2)}px`; chip.style.top = `${tRect.top + (tRect.height/2)}px`; chip.style.transform = 'scale(0.5)'; chip.style.opacity = '0'; }, 50);
        setTimeout(() => { if(chip.parentNode) chip.remove(); }, 650);
    }

    let currentMBJSeats = { 1:null, 2:null, 3:null, 4:null, 5:null };

    function renderMBJSeats(seats, activeTurnObj = null) {
        currentMBJSeats = seats || currentMBJSeats; 
        let cont = document.getElementById('mbj-seats-row'); 
        if(!cont) return; 
        
        let htmlBuffer = '';
        let activeSeatNum = activeTurnObj ? activeTurnObj.seat : null;
        let activeHandIdx = activeTurnObj ? activeTurnObj.handIdx : 0;
        localSeatId = null;

        for(let i=1; i<=5; i++) {
            let s = currentMBJSeats[i]; 
            let isMe = s && s.username === myUsername; 
            if (isMe) localSeatId = i;

            let isMySeatTurn = activeSeatNum == i;
            let dimClass = (mbjGameState === 'PLAYER_TURN' && !isMySeatTurn && s) ? 'dimmed' : '';
            let activeClass = isMySeatTurn ? 'active-turn' : '';
            let boxClass = `mbj-seat-circle ${s ? 'occupied' : ''}`;
            
            let canSit = !s && mbjGameState === 'BETTING' && !Object.values(currentMBJSeats).some(st => st && st.username === myUsername);
            let clickAction = canSit ? `socket.emit('mbjTakeSeat', ${i})` : ``; 

            let html = `<div class="mbj-seat-wrapper ${activeClass} ${dimClass}" id="mbj-seat-${i}">`;
            
            html += `<div class="mbj-hands-row">`;
            
            if (s && s.hands && s.hands.length > 0) {
                if (!renderedCardCount[i]) renderedCardCount[i] = [];
                
                s.hands.forEach((hand, hIdx) => {
                    let isThisHandActive = isMySeatTurn && activeHandIdx === hIdx;
                    let cardCount = hand.cards.length;
                    let containerWidth = cardCount > 0 ? ((cardCount - 1) * 20) + 70 : 70; 
                    let scaleTransform = s.hands.length > 1 ? 'transform: scale(0.85); transform-origin: bottom center;' : '';
                    
                    // Column wrapper is relative so absolute buttons float relative to it safely
                    html += `<div class="mbj-hand-column" style="position: relative;">`;
                    
                    if (isThisHandActive && mbjGameState === 'PLAYER_TURN') {
                        html += `<div class="turn-chevron"><i class="fas fa-chevron-down"></i></div>`;
                    }

                    // Floating Action Buttons (Positioned purely above the cards)
                    let btnClass = (isThisHandActive && mbjGameState === 'PLAYER_TURN' && isMe) ? 'show' : '';
                    let canDouble = hand.cards.length === 2;
                    let canSplit = hand.cards.length === 2 && (hand.cards[0].bjVal === hand.cards[1].bjVal);

                    html += `<div class="mbj-action-row ${btnClass}">
                                <button class="mbj-action-btn hit" onclick="socket.emit('mbjAction', {type:'hit'})"><i class="fas fa-plus"></i></button>
                                <button class="mbj-action-btn stand" onclick="socket.emit('mbjAction', {type:'stand'})"><i class="fas fa-hand-paper"></i></button>
                                <button class="mbj-action-btn double" onclick="socket.emit('mbjAction', {type:'double'})" ${canDouble ? '' : 'disabled'}>x2</button>`;
                    if (canSplit) html += `<button class="mbj-action-btn split" onclick="socket.emit('mbjAction', {type:'split'})"><i class="fas fa-arrows-alt-h"></i></button>`;
                    html += `</div>`;
                    
                    html += `<div class="mbj-hand-container" style="width: ${containerWidth}px; ${scaleTransform}">`;

                    if(hand.cards.length > 0 && hand.status !== 'BUST') { 
                        if(hand.status === 'BLACKJACK') {
                            html += `<div class="status-pill pill-bj">BLACKJACK</div>`;
                        } else {
                            let badgeClass = isThisHandActive ? 'score-active' : 'score-inactive';
                            html += `<div class="score-badge ${badgeClass}">${getDisplayScore(hand.cards)}</div>`; 
                        }
                    } else if (hand.status === 'BUST') {
                        html += `<div class="status-pill pill-bust">${hand.score} BUST</div>`;
                    }

                    let previouslyRendered = renderedCardCount[i][hIdx] || 0;

                    hand.cards.forEach((c, cIdx) => { 
                        let animateThisCard = cIdx >= previouslyRendered;
                        let isDoubledCard = (hand.doubledAmount > 0 && cIdx === hand.cards.length - 1);
                        html += generateCardHTML(c, false, animateThisCard, false, cIdx * 20, isDoubledCard);
                    });
                    html += `</div>`; 
                    
                    let displayBet = hand.bet;
                    if (isMe && mbjGameState === 'BETTING' && localPendingBet > 0 && s.hands.length === 1 && s.hands[0].bet === 0) displayBet = localPendingBet;
                    
                    html += `<div class="mbj-circle-container" id="circle-${i}-${hIdx}">`;
                    html += `<div class="${boxClass}" ${clickAction ? `onclick="${clickAction}"` : ''} style="${canSit ? 'cursor:pointer;' : 'cursor:default;'}">`;
                    if (displayBet > 0) { 
                        html += `<div id="chip-stack-${i}-${hIdx}" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;">${getChipStackHTML(displayBet, hand.bet === 0)}</div>`;
                    } else if (hIdx === 0) {
                        html += `<i class="fas fa-plus" style="font-size:1.5rem; opacity:${mbjGameState==='BETTING' ? 0.7 : 0.1}; color: white;"></i>`;
                    }
                    html += `</div></div>`; 

                    if (displayBet > 0) html += `<div class="bet-pill">${displayBet} TC</div>`;
                    html += `</div>`; 
                });
                renderedCardCount[i] = s.hands.map(h => h.cards.length);
            } else { 
                renderedCardCount[i] = []; 
                html += `<div class="mbj-hand-column" style="position: relative;">`;
                html += `<div class="mbj-hand-container" style="width: 70px;"></div>`;
                html += `<div class="mbj-circle-container" id="circle-${i}-0">`;
                html += `<div class="${boxClass}" ${clickAction ? `onclick="${clickAction}"` : ''} style="${canSit ? 'cursor:pointer;' : 'cursor:default;'}">`;
                if (localPendingBet > 0 && isMe && mbjGameState === 'BETTING') {
                    html += `<div id="chip-stack-${i}-0" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;">${getChipStackHTML(localPendingBet, true)}</div>`;
                } else {
                    html += `<i class="fas fa-plus" style="font-size:1.5rem; opacity:${mbjGameState==='BETTING' ? 0.7 : 0.1}; color: white;"></i>`;
                }
                html += `</div></div>`;
                if (localPendingBet > 0 && isMe && mbjGameState === 'BETTING') html += `<div class="bet-pill">${localPendingBet} TC</div>`;
                html += `</div>`; 
            }
            html += `</div>`; 

            let nameHTML = s ? s.username : 'EMPTY';
            html += `<div class="mbj-seat-name" style="color: ${isMe ? 'var(--ps-glow)' : (s ? 'white' : 'var(--text-muted)')}; opacity:${s || mbjGameState==='BETTING' ? 1 : 0.3};" id="seat-name-${i}">${nameHTML}</div>`;
            html += `<div class="player-timer-track"><div class="player-timer-fill" id="timer-fill-${i}"></div></div>`;

            if(isMe && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0) && mbjGameState === 'BETTING') {
                html += `<div style="margin-top:5px;"><button class="btn-play" onclick="socket.emit('mbjLeaveSeat');" style="padding:4px 10px; font-size:0.7rem; background:rgba(255,51,102,0.2); border-color:var(--danger);">LEAVE</button></div>`;
            }
            html += `</div>`; 
            htmlBuffer += html;
        }
        
        cont.innerHTML = htmlBuffer;

        let rack = document.getElementById('mbj-chip-rack');
        if (mbjGameState === 'BETTING') {
            rack.classList.remove('chip-rack-locked');
            if (localSeatId && currentMBJSeats[localSeatId] && (!currentMBJSeats[localSeatId].hands || currentMBJSeats[localSeatId].hands.length === 0 || currentMBJSeats[localSeatId].hands[0].bet === 0)) {
                // Keep unlocked for betting
            } else {
                rack.classList.add('chip-rack-locked');
            }
        } else {
            rack.classList.add('chip-rack-locked');
            localPendingBet = 0;
        }
    }

    function addLocalBet(amt) {
        if(myCredits >= localPendingBet + amt) { localPendingBet += amt; renderMBJSeats(); } 
        else { showRackAlert('Not enough credits'); }
    }
    function addCustomBet() {
        let v = parseInt(document.getElementById('custom-bet').value);
        if(!isNaN(v) && v > 0) { addLocalBet(v); }
        document.getElementById('custom-bet').value = '';
    }
    function clearLocalBet() { localPendingBet = 0; renderMBJSeats(); }
    function confirmLocalBet() {
        if(localPendingBet < 10) return showRackAlert('Min Bet 10 TC');
        socket.emit('mbjPlaceBet', localPendingBet);
        localPendingBet = 0; 
    }

    socket.on('mbjUpdate', async (data) => {
        if(activeGame !== 'mbj') return;
        let gTimerBox = document.getElementById('bj-global-timer');
        let gTimerVal = document.getElementById('bj-timer-val');

        if(data.event === 'timer') {
            mbjGameState = 'BETTING'; 
            if(data.active) { gTimerBox.style.display = 'block'; gTimerVal.innerText = data.time; } 
            else { gTimerBox.style.display = 'none'; }
            renderMBJSeats(data.seats); 
        } 
        else if (data.event === 'sync_seats') { 
            renderMBJSeats(data.seats, data.activeTurn); 
        } 
        else if (data.event === 'lock_bets') { 
            mbjGameState = 'DEALING'; 
            gTimerBox.style.display = 'none';
            renderMBJSeats(data.seats, null);
        } 
        else if (data.event === 'deal') {
            renderMBJSeats(data.seats, null); 
            let dHand = document.getElementById('mbj-fs-dealer-hand');
            if(dHand) { 
                let html = `<div class="score-badge score-inactive" style="display:flex;"><span>${data.dealerHand[0].bjVal}</span></div>`;
                html += generateCardHTML(data.dealerHand[0], false, true, false, 0); 
                html += generateCardHTML(data.dealerHand[1], true, true, false, 20); 
                dHand.style.width = '90px'; 
                dHand.innerHTML = html; 
            } 
        } 
        else if (data.event === 'turn') {
            mbjGameState = 'PLAYER_TURN'; 
            renderMBJSeats(data.seats, data.activeTurn);
            if (data.activeTurn && data.activeTurn.seat) {
                let bar = document.getElementById(`timer-fill-${data.activeTurn.seat}`);
                if (bar) bar.style.width = ((data.time / 15) * 100) + '%';
            }
        } 
        else if (data.event === 'turn_timer') { 
            if (mbjState && mbjState.activeTurn && mbjState.activeTurn.seat) {
                let bar = document.getElementById(`timer-fill-${mbjState.activeTurn.seat}`);
                if (bar) bar.style.width = ((data.time / 15) * 100) + '%';
            }
        }
        else if (data.event === 'dealer_resolved') {
            mbjGameState = 'RESOLVING'; 
            renderMBJSeats(data.seats); 
            
            let dHand = document.getElementById('mbj-fs-dealer-hand'); 
            if(dHand) {
                let initialDScore = getBJScore(data.dealerHand.slice(0,2));
                let badgeHTML = (initialDScore === 21 && data.dealerHand.length === 2) 
                                ? `<div class="status-pill pill-bj">BLACKJACK</div>` 
                                : `<div class="score-badge score-inactive"><span>${initialDScore}</span></div>`;

                let htmlStr = badgeHTML;
                htmlStr += generateCardHTML(data.dealerHand[0], false, false, false, 0);
                htmlStr += generateCardHTML(data.dealerHand[1], false, false, true, 20); 
                
                dHand.innerHTML = htmlStr;
                
                const drawRemaining = async () => {
                    await delay(800);
                    for(let i=2; i<data.dealerHand.length; i++) { 
                        let currentScore = getBJScore(data.dealerHand.slice(0, i+1));
                        let currentBadge = currentScore > 21 
                                         ? `<div class="status-pill pill-bust">${currentScore} BUST</div>` 
                                         : `<div class="score-badge score-inactive"><span>${currentScore}</span></div>`;
                                         
                        let newHtml = currentBadge;
                        for(let k=0; k<=i; k++) {
                            let isNewCard = (k === i); 
                            newHtml += generateCardHTML(data.dealerHand[k], false, isNewCard, false, k * 20); 
                        }
                        
                        dHand.style.width = `${(i * 20) + 70}px`;
                        dHand.innerHTML = newHtml; 
                        await delay(800); 
                    }
                    
                    await delay(1000);
                    let myNet = 0;
                    
                    for(let i = 1; i <= 5; i++) {
                        let seat = data.seats[i];
                        let res = data.results && data.results[i];
                        if (seat && res) {
                            if (res.status === 'LOSS') {
                                animateChipSequence(`circle-${i}-0`, 'dealer-area', '#444');
                                let cEl = document.getElementById(`chip-stack-${i}-0`);
                                if(cEl) cEl.style.opacity = '0'; 
                            } 
                            else if (res.status === 'WIN') {
                                animateChipSequence('dealer-area', `circle-${i}-0`, '#00e676');
                                setTimeout(() => { document.getElementById(`seat-name-${i}`).innerHTML += `<div class="payout-flare">+ ${res.win}</div>`; }, 600);
                            }
                            else if (res.status === 'PUSH') {
                                setTimeout(() => { document.getElementById(`seat-name-${i}`).innerHTML += `<div class="payout-flare" style="color:#ffcc00;">PUSH</div>`; }, 600);
                            }
                            if (seat.username === myUsername) myNet = res.net;
                            await delay(800);
                        }
                    }

                    await delay(500);
                    if (myNet > 0) showGlobalAlert(`WON +${myNet} TC`, 'success');
                    else if (myNet < 0) showGlobalAlert(`LOST ${Math.abs(myNet)} TC`, 'error');
                    else if (myNet === 0 && data.results && data.results[localSeatId] && data.results[localSeatId].push > 0) showGlobalAlert(`PUSH`, 'success');
                }; 
                drawRemaining();
            }
        } 
        else if (data.event === 'new_round') {
            mbjGameState = 'BETTING'; 
            document.getElementById('mbj-fs-dealer-hand').innerHTML = ''; 
            renderedCardCount = { 1:[], 2:[], 3:[], 4:[], 5:[] };
            renderMBJSeats(data.seats); 
        }
    });

  </script>
</body>
</html>
