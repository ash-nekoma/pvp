<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASINO DUEL ARENA - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* YOUR EXACT CSS PRESERVED */
        :root { --bg-dark: #121216; --bg-panel: #1e1e24; --p1-color: #ff4757; --p2-color: #2e86de; --accent: #feca57; --text: #ffffff; --grid-line: rgba(255, 255, 255, 0.05); --sidebar-width: 340px; --betting-height: 265px; --players-height: 320px; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-dark); background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size: 20px 20px; color: var(--text); font-family: 'Press Start 2P', cursive; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; }
        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: transparent transparent; }
        .custom-scroll::-webkit-scrollbar { width: 6px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #555; border-radius: 3px; }
        
        .main-wrapper { display: flex; width: 100%; height: 100%; padding: 20px; gap: 20px; display: none; /* Hidden until login */ }
        .game-section { flex-grow: 1; display: flex; flex-direction: column; height: 100%; min-width: 0; }
        .social-sidebar { width: var(--sidebar-width); min-width: var(--sidebar-width); display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 4px solid #333; padding-bottom: 15px; }
        h1 { color: var(--accent); font-size: 20px; text-shadow: 3px 3px 0 #000; margin: 0; }
        .game-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; background: #000; padding: 10px; border: 2px solid #333; border-radius: 8px; }
        .game-tab { background: #333; border: 2px solid #555; color: #aaa; padding: 10px 15px; font-size: 10px; font-family: 'Press Start 2P'; cursor: pointer; }
        .game-tab.active { background: var(--accent); color: #000; border-color: #fff; box-shadow: 0 0 10px var(--accent); }
        .arena-container { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 25px; flex-grow: 1; padding: 10px; }
        .player-hud { background: var(--bg-panel); border: 4px solid #000; display: flex; flex-direction: column; box-shadow: 4px 4px 0 #000; }
        .player-header { padding: 10px; text-align: center; border-bottom: 4px solid #000; font-size: 12px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .p1-hud.active-turn { border-color: var(--p1-color); box-shadow: 0 0 20px var(--p1-color); } .p1-hud.active-turn .player-header { background: var(--p1-color); }
        .p2-hud.active-turn { border-color: var(--p2-color); box-shadow: 0 0 20px var(--p2-color); } .p2-hud.active-turn .player-header { background: var(--p2-color); }
        .score-area { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }
        .score-display { font-size: 60px; font-family: 'Rajdhani', sans-serif; font-weight: 700; }
        .controls-area { padding: 15px; display: flex; flex-direction: column; gap: 10px; justify-content: center; min-height: 120px; background: rgba(0,0,0,0.2); }
        .arcade-btn { width: 100%; padding: 12px 5px; font-family: 'Press Start 2P'; font-size: 10px; background: #444; color:#fff; border: 3px solid #000; cursor: pointer; }
        .seat-btn { width: 100%; padding: 20px; background: #333; color: #aaa; border: 2px dashed #666; font-family: 'Press Start 2P'; cursor: pointer; font-size: 10px; }
        .center-stage { background: #000; border: 4px solid #333; display: flex; flex-direction: column; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .round-tracker { background: #222; color: #fff; text-align: center; padding: 8px; font-size: 12px; border-bottom: 2px solid #444; }
        .marquee-status { background: #111; border-bottom: 2px solid #444; color: #888; text-align: center; padding: 10px; font-size: 10px; }
        .game-board { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .vs-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: 900; color: rgba(255, 255, 255, 0.03); font-family: 'Rajdhani', sans-serif; }
        .sidebar-panel { background: var(--bg-panel); border: 4px solid #000; display: flex; flex-direction: column; box-shadow: 4px 4px 0 #000; }
        .panel-header { background: #2f3640; color: #fff; padding: 8px 15px; font-size: 10px; border-bottom: 4px solid #000; }
        .betting-panel { padding: 15px; background: #191919; text-align: center; }
        .chat-container-box { flex: 1 1 auto; display: flex; flex-direction: column; }
        .chat-inner { flex-grow: 1; display: flex; flex-direction: column; background: #1e1e24; overflow: hidden; }
        .chat-log { flex-grow: 1; padding: 15px; font-size: 14px; color: #ccc; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
        .chat-input { background: #000; border: none; border-top: 4px solid #000; color: #fff; padding: 15px; font-family: 'Press Start 2P'; font-size: 12px; outline: none; }
        
        /* OVERLAYS */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .neon-box { background: var(--bg-panel); border: 2px solid var(--accent); padding: 30px; text-align: center; width: 400px; }
        .input-retro { background: #000; border: 2px solid #555; color: #fff; padding: 15px; margin: 10px 0; width: 100%; font-family: 'Press Start 2P'; font-size: 10px; }
        .btn-retro { background: var(--accent); color: #000; border: none; padding: 15px; font-family: 'Press Start 2P'; font-size: 12px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="neon-box">
        <h1 style="color: var(--accent); margin-bottom: 20px;">DUEL ARENA</h1>
        <input type="text" id="loginUser" class="input-retro" placeholder="USERNAME (3-12 CHARS)">
        <input type="password" id="loginPass" class="input-retro" placeholder="PASSWORD">
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn-retro" style="background: var(--p2-color); color: #fff;" onclick="attemptLogin()">LOG IN</button>
            <button class="btn-retro" style="background: var(--p1-color); color: #fff;" onclick="attemptRegister()">SIGN UP</button>
        </div>
        
        <div id="loginError" style="color: var(--p1-color); font-size: 10px; margin-top: 15px;"></div>
    </div>
</div>

<div id="bankOverlay" class="overlay" style="display: none;">
    <div class="neon-box">
        <h2 style="color: var(--success); margin-bottom: 20px; font-size: 16px;">THE BANK</h2>
        <input type="number" id="bankAmt" class="input-retro" placeholder="AMOUNT">
        <div style="display: flex; gap: 10px;">
            <button class="btn-retro" style="background: var(--success);" onclick="requestBank('deposit')">TOP-UP</button>
            <button class="btn-retro" style="background: var(--p1-color); color: #fff;" onclick="requestBank('withdraw')">CASH OUT</button>
        </div>
        <button class="btn-retro" style="background: #333; color: #fff;" onclick="document.getElementById('bankOverlay').style.display='none'">CLOSE</button>
    </div>
</div>

<div class="main-wrapper" id="mainUI">
    <div class="game-section">
        <div class="top-bar">
            <h1>CASINO</h1>
        </div>

        <div class="game-selector">
            <button class="game-tab active" id="tab-dice">DICE</button>
        </div>

        <div class="arena-container">
            <div class="player-hud p1-hud" id="p1Panel">
                <div class="player-header"><div id="p1Name">EMPTY</div></div>
                <div class="score-area"><div class="score-display" id="p1Score">0</div></div>
                <div class="controls-area" id="p1Controls"></div>
            </div>

            <div class="center-stage">
                <div class="round-tracker" id="roundTracker">GLOBAL ROOM</div>
                <div class="marquee-status" id="status">WAITING FOR PLAYERS...</div>
                <div class="game-board" id="gameVisuals"><div class="vs-badge">VS</div></div>
            </div>

            <div class="player-hud p2-hud" id="p2Panel">
                <div class="player-header"><div id="p2Name">EMPTY</div></div>
                <div class="score-area"><div class="score-display" id="p2Score">0</div></div>
                <div class="controls-area" id="p2Controls"></div>
            </div>
        </div>
    </div>

    <div class="social-sidebar">
        <div class="sidebar-panel">
            <div class="panel-header">WALLET</div>
            <div class="betting-panel">
                <div id="walletDisplay" style="color: var(--accent); font-size: 14px; margin-bottom: 15px;">0 TC</div>
                <button class="arcade-btn" style="background: #333;" onclick="document.getElementById('bankOverlay').style.display='flex'">OPEN BANK</button>
            </div>
        </div>

        <div class="sidebar-panel chat-container-box">
            <div class="panel-header">LIVE CHAT</div>
            <div class="chat-inner">
                <div class="chat-log custom-scroll" id="chatLog"></div>
                <input type="text" id="chatInput" class="chat-input" placeholder="Type here..." onkeypress="handleChat(event)">
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // --- ANTI CHEAT ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) { 
        if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) return false; 
    };

    const socket = io();
    let myName = "";

    // DOM Elements
    const DOM = {
        overlay: document.getElementById('loginOverlay'), ui: document.getElementById('mainUI'),
        user: document.getElementById('loginUser'), pass: document.getElementById('loginPass'), err: document.getElementById('loginError'),
        p1Name: document.getElementById('p1Name'), p2Name: document.getElementById('p2Name'),
        p1Score: document.getElementById('p1Score'), p2Score: document.getElementById('p2Score'),
        p1Panel: document.getElementById('p1Panel'), p2Panel: document.getElementById('p2Panel'),
        p1Ctrls: document.getElementById('p1Controls'), p2Ctrls: document.getElementById('p2Controls'),
        status: document.getElementById('status'), wallet: document.getElementById('walletDisplay'),
        chatLog: document.getElementById('chatLog'), visuals: document.getElementById('gameVisuals'),
        chatInput: document.getElementById('chatInput'), bankAmt: document.getElementById('bankAmt')
    };

    // --- AUTHENTICATION ---
    function attemptLogin() {
        socket.emit('login-attempt', { username: DOM.user.value, password: DOM.pass.value });
    }

    function attemptRegister() {
        socket.emit('register-attempt', { username: DOM.user.value, password: DOM.pass.value });
    }

    socket.on('auth-error', msg => {
        DOM.err.innerText = msg;
        if(msg.includes('CREATED')) DOM.err.style.color = 'var(--success)';
        else DOM.err.style.color = 'var(--p1-color)';
    });

    socket.on('auth-success', data => {
        myName = data.name;
        DOM.wallet.innerText = `${data.wallet} TC`;
        DOM.overlay.style.display = 'none';
        DOM.ui.style.display = 'flex';
    });

    // --- BANKING ---
    function requestBank(type) {
        const amt = parseInt(DOM.bankAmt.value);
        if(!isNaN(amt) && amt > 0) {
            socket.emit('request-bank-tx', { type, amount: amt });
            document.getElementById('bankOverlay').style.display = 'none';
        }
    }
    socket.on('wallet-update', amt => DOM.wallet.innerText = `${amt} TC`);

    // --- GAME LOGIC ---
    socket.on('game-state-update', (state) => {
        DOM.p1Name.innerText = state.p1 || "EMPTY"; DOM.p2Name.innerText = state.p2 || "EMPTY";
        DOM.p1Score.innerText = state.p1Score; DOM.p2Score.innerText = state.p2Score;

        if(state.status === 'playing') {
            DOM.p1Panel.classList.toggle('active-turn', state.turn === 1);
            DOM.p2Panel.classList.toggle('active-turn', state.turn === 2);
        } else {
            DOM.p1Panel.classList.remove('active-turn'); DOM.p2Panel.classList.remove('active-turn');
        }

        // Controls
        DOM.p1Ctrls.innerHTML = !state.p1 ? `<button class="seat-btn" onclick="socket.emit('take-seat', 1)">TAKE SEAT</button>` : 
            (state.status === 'playing' && state.turn === 1 && myName === state.p1) ? `<button class="arcade-btn" style="background:var(--p1-color)" onclick="socket.emit('play-turn', 'roll')">ROLL DICE</button>` : `<div style="font-size:10px;color:#666;text-align:center;">WAITING</div>`;
        
        DOM.p2Ctrls.innerHTML = !state.p2 ? `<button class="seat-btn" onclick="socket.emit('take-seat', 2)">TAKE SEAT</button>` : 
            (state.status === 'playing' && state.turn === 2 && myName === state.p2) ? `<button class="arcade-btn" style="background:var(--p2-color)" onclick="socket.emit('play-turn', 'roll')">ROLL DICE</button>` : `<div style="font-size:10px;color:#666;text-align:center;">WAITING</div>`;
    });

    socket.on('game-anim', (data) => {
        const color = data.p === 1 ? 'var(--p1-color)' : 'var(--p2-color)';
        DOM.visuals.innerHTML = `<div style="font-size:60px; color:${color}; font-family:'Rajdhani',sans-serif; text-align:center;">ROLLED:<br><b style="font-size:100px">${data.roll}</b></div>`;
    });

    socket.on('match-over', winner => {
        DOM.visuals.innerHTML = `<div style="color:var(--accent); font-size:30px; text-align:center;">${winner}<br>WINS!</div>`;
    });

    // --- CHAT ---
    function handleChat(e) {
        if(e.key === 'Enter' && DOM.chatInput.value.trim() !== "") {
            socket.emit('send-chat', DOM.chatInput.value);
            DOM.chatInput.value = '';
        }
    }

    socket.on('chat-message', (data) => {
        const div = document.createElement('div');
        div.style.marginBottom = "8px"; div.style.wordWrap = "break-word";
        if(data.type === 'sys') {
            div.innerHTML = `<span style="color:var(--success)">[SYS]: ${data.text}</span>`;
        } else {
            const color = data.role === 'admin' ? 'var(--accent)' : '#fff';
            div.innerHTML = `<span style="color:${color}; font-weight:800; margin-right:5px;">${data.sender}:</span><span style="color:#eee">${data.text}</span>`;
        }
        DOM.chatLog.appendChild(div);
        DOM.chatLog.scrollTop = DOM.chatLog.scrollHeight;
    });
</script>
</body>
</html>
