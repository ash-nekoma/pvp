<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stick N' Trade | VIP Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Rajdhani:wght@600;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* ================= BASE STYLES ================= */
        :root { --ps-bg: #000814; --ps-glow: #00a2ff; --glass-bg: rgba(0, 10, 25, 0.75); --glass-border: rgba(255, 255, 255, 0.15); --danger: #ff3366; --success: #00e676; --credits: #ffb400; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; outline: none; }
        body { background: linear-gradient(135deg, #000a1f 0%, #001f4d 50%, #000000 100%); color: white; height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; }
        input, textarea { user-select: auto; -webkit-user-select: auto; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { display: none; }
        .btn-play { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); padding: 12px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-play:hover:not(:disabled) { background: white; color: black; transform: translateY(-2px); }
        .btn-play:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .input-control { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; border-radius: 8px; font-size: 1rem; font-weight: 600; text-align: center; }

        /* ================= TOP NAVIGATION ================= */
        #app-container { display: block; height: 100vh; width: 100vw; position: relative; }
        .topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(0, 5, 15, 0.95); border-bottom: 1px solid var(--glass-border); height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .brand-title { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 162, 255, 0.5); cursor: pointer;}
        .main-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 75px); margin-top: 75px; width: 100%; position: relative; }
        .view-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; }
        .btn-back-fixed { position: fixed; top: 95px; left: 25px; z-index: 1000; background: rgba(0,0,0,0.8); border: 1px solid var(--glass-border); color: white; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .btn-back-fixed:hover { background: white; color: black; }
        .lobby-modes-container { display: flex; gap: 40px; }
        .game-card { width: 320px; height: 380px; background: #020813; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; cursor: pointer; transition: 0.3s; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .game-card:hover { transform: translateY(-8px); border-color: var(--ps-glow); box-shadow: 0 15px 40px rgba(0,162,255,0.2); }
        .local-flash { position: fixed; bottom: 25px; right: 25px; z-index: 9999; color: var(--danger); font-size: 1.2rem; font-weight: 900; text-transform: uppercase; opacity: 0; display: none; text-shadow: 0 2px 10px rgba(0,0,0,0.9); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--danger); }
        .local-flash.show { display: block; animation: flashAnim 2.5s forwards; }
        .local-flash.success { color: var(--success); border-color: var(--success); }
        @keyframes flashAnim { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-10px); } }

        /* ================= VIP BLACKJACK - GUARANTEED SEAT VISIBILITY ================= */
        .mbj-board { width: 1100px; height: 580px; background: #111; border-radius: 20px; position: relative; box-shadow: 0 25px 80px rgba(0,0,0,0.9); overflow: hidden; margin-top: 10px; border: 4px solid #222; }
        .mbj-felt { position: absolute; inset: 15px; background: radial-gradient(ellipse at center, #0a5a2a 0%, #032b11 100%); border: 20px solid #2e1a10; border-radius: 300px; box-shadow: inset 0 0 60px rgba(0,0,0,0.9); pointer-events: none; }
        .mbj-table-line { position: absolute; inset: 15px; border: 2px solid rgba(255,255,255,0.15); border-radius: 300px; pointer-events: none; }
        .mbj-table-text { position: absolute; top: 240px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; width: 100%; z-index: 1; }
        .mbj-table-text h1 { font-size: 3.2rem; letter-spacing: 8px; margin-bottom: 5px; color: rgba(255,255,255,0.15); font-family: 'Outfit'; }
        .mbj-table-text p { font-weight: 800; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,215,0,0.3); }

        #mbj-seats-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; }
        
        .mbj-dealer-area { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 20; }
        .mbj-shoe { position: absolute; top: 40px; right: 60px; width: 65px; height: 100px; background: repeating-linear-gradient(45deg, #111, #111 10px, #222 10px, #222 20px); border: 4px solid #555; border-radius: 8px; box-shadow: -10px 15px 25px rgba(0,0,0,0.8); z-index: 5; }

        .mbj-timer-display { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 5px 30px; border-radius: 50px; border: 1px solid var(--ps-glow); display: none; flex-direction: column; align-items: center; box-shadow: 0 5px 15px rgba(0,162,255,0.3); z-index: 20; }
        .mbj-timer-display .hud-title { color: var(--ps-glow); font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; }
        .mbj-timer-display .hud-val { color: white; font-family: 'Rajdhani', monospace; font-size: 1.8rem; font-weight: 900; line-height: 1; }

        .mbj-seat-anchor { position: absolute; display: flex; flex-direction: column; align-items: center; width: 80px; pointer-events: auto; }
        #mbj-anchor-1 { bottom: 120px; left: 120px; }
        #mbj-anchor-2 { bottom: 60px; left: 280px; }
        #mbj-anchor-3 { bottom: 40px; left: 50%; transform: translateX(-50%); }
        #mbj-anchor-4 { bottom: 60px; right: 280px; }
        #mbj-anchor-5 { bottom: 120px; right: 120px; }

        .dimmed { opacity: 0.4; filter: grayscale(80%); }
        .seat-glow { position: absolute; top: -50px; left: -50px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 1; display: none; }
        .active-turn { opacity: 1 !important; z-index: 100; filter: grayscale(0) !important; }
        .active-turn .seat-glow { display: block; animation: pulseGlow 2s infinite; }

        .mbj-seat-circle { width: 65px; height: 65px; border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.5); z-index: 5; position: relative;}
        .mbj-seat-circle:hover { border-color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.2); }
        .mbj-seat-circle.occupied { border: 3px solid var(--credits); background: transparent; cursor: default; box-shadow: inset 0 0 15px rgba(255,180,0,0.2); }
        
        .chip-stack { background: #222; border: 3px dashed #ffcc00; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.7rem; font-weight: 900; color: white; position: absolute; box-shadow: 0 5px 10px rgba(0,0,0,0.9); }
        .seat-name { font-weight: 900; font-size: 0.8rem; text-transform: uppercase; margin-top: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); color: white;}

        .mbj-hand-cards { position: absolute; bottom: 85px; left: -10px; display: flex; z-index: 10; pointer-events: none; }
        .mbj-card { width: 55px; height: 80px; background: white; border-radius: 6px; box-shadow: -3px 3px 10px rgba(0,0,0,0.6); position: absolute; bottom: 0; font-family: 'Outfit', sans-serif; color: black; opacity: 0; border: 1px solid #ccc; }
        .card-tl { position: absolute; top: 4px; left: 4px; display: flex; flex-direction: column; align-items: center; line-height: 0.9; font-size: 0.9rem; font-weight: 900;}
        .card-br { position: absolute; bottom: 4px; right: 4px; display: flex; flex-direction: column; align-items: center; line-height: 0.9; font-size: 0.9rem; font-weight: 900; transform: rotate(180deg); }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; }
        .card-red { color: #e60000; } .card-black { color: #000; }
        .card-back { background: repeating-linear-gradient(45deg, #001f4d, #001f4d 10px, #000a1f 10px, #000a1f 20px); border: 2px solid rgba(255,255,255,0.8); }

        .mbj-hand-score { position: absolute; top: -12px; left: -12px; width: 24px; height: 24px; background: #222; border: 2px solid white; border-radius: 50%; font-weight: 900; font-size: 0.85rem; color: white; z-index: 20; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.8);}
        .dealer-score-badge { position: absolute; top: -10px; left: -25px; width: 28px; height: 28px; background: #222; border: 2px solid white; border-radius: 50%; font-weight: 900; font-size: 1rem; color: white; z-index: 20; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.8); margin-bottom: 5px;}
        .mbj-status { position: absolute; top: 15px; left: -20px; background: var(--ps-bg); padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; border: 1px solid var(--glass-border); white-space: nowrap; z-index: 25; pointer-events: none; }
        .status-bust { color: var(--danger); border-color: var(--danger); animation: shakeRed 0.5s forwards; }
        
        .anim-fly-in { animation: flyIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes flyIn { 0% { opacity: 0; transform: translate(300px, -300px) scale(0.3) rotate(45deg); } 100% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); } }
        .anim-flip { animation: flipCard 0.5s ease-in-out forwards; }
        @keyframes flipCard { 0% { transform: rotateY(180deg); } 100% { transform: rotateY(0deg); } }
        
        .seat-bet-ui { position: absolute; top: 110%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.8); pointer-events: auto; width: 140px; }
        .seat-actions-wrapper { position: absolute; top: 110%; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.9); padding: 8px; border-radius: 50px; border: 1px solid var(--glass-border); z-index: 100; pointer-events: auto; animation: popUp 0.3s ease-out; }
        @keyframes popUp { from { transform: translateX(-50%) scale(0.5); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }
        .mbj-action-btn { width: 45px; height: 45px; border-radius: 50%; background: #111; border: 2px solid rgba(255,255,255,0.3); color: white; font-size: 1.2rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.9); }
        .mbj-action-btn:hover:not(:disabled) { transform: scale(1.15); border-color: white; }
        .mbj-action-btn.hit { background: #008040; border-color: #00e676; }
        .mbj-action-btn.stand { background: #9b0022; border-color: #ff3366; }
        .mbj-action-btn.double { background: #997a00; border-color: #ffcc00; color: black; font-size: 0.9rem; }

        .mbj-hud-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 10; }
        .hud-capsule { background: rgba(0,0,0,0.85); border: 1px solid var(--glass-border); padding: 10px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.8); width: 160px; pointer-events: auto; }
        .hud-capsule .hud-title { font-size: 0.7rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
        .hud-capsule .hud-val { font-size: 1.2rem; font-weight: 900; color: var(--credits); }

        /* ================= RETRO HORSE DERBY - PIXEL TRACK & SVG HORSES ================= */
        .hr-board { width: 900px; height: 600px; background: #0a0a0a; border: 4px solid #333; border-radius: 12px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); margin-top: 20px;}
        .hr-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .hr-ticker { flex: 1; text-align: center; color: var(--credits); font-family: 'Press Start 2P', monospace; font-size: 1.1rem; text-shadow: 0 0 10px var(--credits); padding: 10px; background: #111; border: 2px solid #333; border-radius: 8px; margin: 0 20px; text-transform: uppercase;}
        
        .hr-track-window { flex: 1; border: 4px solid #222; position: relative; overflow: hidden; border-radius: 8px; background: #4eb2e8; /* Sky */ }
        
        /* The Environment Layers (From Ref image) */
        .hr-grass-bg { position: absolute; top: 20%; width: 100%; height: 25%; background: #2a8f3d; border-bottom: 4px solid white; z-index: 1;}
        .hr-dirt-bg { position: absolute; bottom: 0; width: 200%; height: 55%; background: repeating-linear-gradient(90deg, #4a3026 0px, #4a3026 40px, #3d251d 40px, #3d251d 80px); z-index: 2;}
        
        .track-moving .hr-dirt-bg { animation: scrollTrack 0.3s linear infinite; }
        @keyframes scrollTrack { from { transform: translateX(0); } to { transform: translateX(-80px); } }

        /* Finish Line perfectly mapped to the dirt area */
        .hr-finish-line { position: absolute; right: -100px; top: 45%; bottom: 0; width: 40px; background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000); background-size: 20px 20px; background-position: 0 0, 10px 10px; background-color: #fff; z-index: 5; border-left: 6px solid #ffcc00; box-shadow: -15px 0 30px rgba(0,0,0,0.6); }
        
        /* 6 Equal Lanes on the dirt */
        .hr-lanes-overlay { position: absolute; bottom: 0; width: 100%; height: 55%; display: flex; flex-direction: column; justify-content: space-evenly; z-index: 10; }
        .hr-lane { width: 100%; height: 16.6%; border-bottom: 2px dashed rgba(255,255,255,0.1); position: relative; }
        
        /* The SVG Horse Grounded accurately */
        .hr-horse-group { position: absolute; left: 10%; bottom: 0; display: flex; align-items: flex-end; justify-content: center; transition: left 0.1s linear; z-index: 15; }
        
        /* SVG Leg Animation & Body Physics */
        .horse-svg .b-leg1 { transform-origin: 16px 28px; }
        .horse-svg .b-leg2 { transform-origin: 24px 28px; }
        .horse-svg .f-leg1 { transform-origin: 40px 28px; }
        .horse-svg .f-leg2 { transform-origin: 48px 28px; }
        
        .running .b-leg1 { animation: gallopB 0.25s infinite linear; }
        .running .b-leg2 { animation: gallopB 0.25s infinite linear reverse; }
        .running .f-leg1 { animation: gallopF 0.25s infinite linear; }
        .running .f-leg2 { animation: gallopF 0.25s infinite linear reverse; }
        .running .horse-body { animation: bodyBob 0.25s infinite alternate linear; }
        
        @keyframes gallopB { 0%, 100% { transform: rotate(-25deg); } 50% { transform: rotate(35deg); } }
        @keyframes gallopF { 0%, 100% { transform: rotate(35deg); } 50% { transform: rotate(-25deg); } }
        @keyframes bodyBob { 0% { transform: translateY(0); } 100% { transform: translateY(2px); } }

        .hr-controls-area { margin-top: 15px; display: flex; flex-direction: column; gap: 15px; }
        .hr-bet-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 100%; }
        .hr-bet-btn { background: #111; border: 2px solid #444; color: white; padding: 15px 5px; font-family: 'Press Start 2P', monospace; font-size: 0.6rem; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .hr-bet-btn:hover:not(:disabled) { transform: translateY(-3px); border-color: white; }
        .hr-bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .hr-odds-text { color: var(--success); font-size: 0.9rem; text-shadow: 0 0 5px var(--success); }
    </style>
</head>
<body>

  <div id="app-container">
      <header class="topbar">
          <div class="brand-title" onclick="backToHub()">STICK N' TRADE</div>
          <div class="topbar-right" style="display:flex; gap:15px; align-items:center;">
              <div style="font-weight: 800; font-size: 1.1rem;"><i class="fas fa-user-circle" style="color:var(--ps-glow)"></i> <span id="player-name-display">Loading...</span></div>
          </div>
      </header>

      <div class="main-wrapper">
        <button class="btn-back-fixed hidden" id="global-back-btn" onclick="backToHub()"><i class="fas fa-arrow-left"></i> LEAVE TABLE</button>
        
        <div class="content">
          <div id="view-casino" class="view-container">
            <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 15px rgba(0,0,0,0.8);">SELECT TABLE</h1>
            <div class="lobby-modes-container">
                <div class="game-card" onclick="openGame('mbj')">
                    <i class="fas fa-cards"></i>
                    <div>
                        <div class="game-title">VIP BLACKJACK</div>
                        <div style="color:var(--text-muted); font-size:0.9rem; font-weight:600;">Rigid Oblong UI & Multi-Hit</div>
                    </div>
                </div>
                <div class="game-card" onclick="openGame('horserace')">
                    <i class="fas fa-horse-head" style="color: var(--danger);"></i>
                    <div>
                        <div class="game-title">RETRO DERBY</div>
                        <div style="color:var(--text-muted); font-size:0.9rem; font-weight:600;">Vector Running Legs & Parallax</div>
                    </div>
                </div>
            </div>
          </div>

          <div id="view-mbj" class="view-container hidden">
              <div class="mbj-board">
                  <div class="mbj-table-surface"><div class="mbj-felt"><div class="mbj-table-line"></div></div></div>
                  
                  <div class="mbj-table-text">
                      <h1>BLACKJACK</h1>
                      <p>BLACKJACK PAYS 3 TO 2<br>DEALER MUST DRAW TO 16 AND STAND ON ALL 17s</p>
                  </div>

                  <div class="mbj-interactive-layer">
                      <div class="mbj-timer-display" id="mbj-timer-box">
                          <div class="hud-title" id="mbj-timer-title">PLACE BETS</div>
                          <div class="hud-val" id="mbj-timer">15</div>
                      </div>

                      <div class="mbj-dealer-area">
                          <div class="dealer-score-badge" id="mbj-d-score-val" style="display:none;">0</div>
                          <div id="mbj-fs-dealer-hand" style="display:flex; height:85px; z-index:10; position:relative;"></div>
                      </div>
                      
                      <div class="mbj-shoe"></div>
                      
                      <div id="mbj-seats-container"></div>
                  </div>

                  <div class="mbj-hud-container">
                      <div class="hud-capsule"><div class="hud-title">BALANCE</div><div class="hud-val" id="mbj-hud-balance">0 TC</div></div>
                      <div class="hud-capsule"><div class="hud-title">TOTAL BET</div><div class="hud-val" id="mbj-hud-bet">0 TC</div></div>
                  </div>

                  <div id="flash-mbj" class="local-flash"></div> 
              </div>
          </div>

          <div id="view-horserace" class="view-container hidden">
              <div class="hr-board">
                  <div class="hr-top-bar">
                      <div style="background:rgba(0,0,0,0.8); border:1px solid var(--glass-border); padding: 10px 20px; border-radius: 8px; color:white; font-weight:900; font-size:1.2rem; font-family: 'Rajdhani', monospace;" id="hr-timer-box"><i class="fas fa-clock" style="margin-right:10px;"></i> <span id="hr-timer">15</span></div>
                      <div class="hr-ticker" id="hr-ticker">WAITING FOR NEXT RACE...</div>
                      <div class="hud-capsule" style="width: 140px; padding: 5px; background: #111;">
                          <div class="hud-title" style="font-family:'Outfit'; font-size:0.7rem; color:var(--text-muted);">TOTAL BET</div>
                          <div class="hud-val" id="hr-my-bet" style="font-family:'Press Start 2P'; font-size:0.8rem; color:white; margin-top:5px;">0 TC</div>
                      </div>
                  </div>
                  
                  <div class="hr-track-window" id="hr-environment">
                      <div class="hr-grass-bg"></div>
                      <div class="hr-dirt-bg"></div>
                      
                      <div class="hr-lanes-overlay">
                          <div class="hr-finish-line" id="hr-finish-line"></div>
                          <div id="hr-lanes-container" style="width: 100%; height: 100%; position: absolute;"></div>
                      </div>
                  </div>

                  <div class="hr-controls-area">
                      <div style="display:flex; gap:15px; justify-content:center;">
                          <input type="number" id="hr-bet-input" class="input-control bet-input" placeholder="BET AMOUNT (TC)" style="max-width:300px; font-size:1.2rem; height:50px; font-family:'Outfit';">
                      </div>
                      <div class="hr-bet-grid" id="hr-bet-grid"></div>
                  </div>
                  <div id="flash-horserace" class="local-flash" style="bottom: 10px;"></div> 
              </div>
          </div>

        </div> 
      </div>
  </div>

  <script>
    const socket = io(); 
    let myUsername = '', myCredits = 0;
    let activeGame = null;
    let mbjGameState = 'BETTING';
    let hrState = { time: 15, status: 'BETTING', currentOdds: {} };
    let mySBets = {};

    window.onload = () => { socket.emit('login', { username: 'VIP_Tester', password: '123' }); };
    
    socket.on('loginSuccess', (data) => { 
        myUsername = data.username; 
        myCredits = data.credits; 
        document.getElementById('mbj-hud-balance').innerText = myCredits.toLocaleString() + ' TC';
        document.getElementById('player-name-display').innerText = myUsername;
        switchView('casino'); 
    });
    
    socket.on('balanceUpdateData', (data) => {
        myCredits = data.credits;
        document.getElementById('mbj-hud-balance').innerText = myCredits.toLocaleString() + ' TC';
    });

    function showLocalFlash(game, msg, type='error') {
        let f = document.getElementById('flash-' + game);
        if(f) {
            f.innerText = msg;
            f.classList.remove('show', 'success');
            void f.offsetWidth;
            f.classList.add('show');
            if(type === 'success') f.classList.add('success');
            setTimeout(() => f.classList.remove('show'), 2500);
        }
    }

    function switchView(viewId) { 
        document.querySelectorAll('.view-container').forEach(d => d.classList.add('hidden')); 
        let v = document.getElementById('view-' + viewId); 
        if (v) v.classList.remove('hidden'); 
        document.getElementById('global-back-btn').classList.toggle('hidden', viewId === 'casino');
    }

    function backToHub() {
        if(activeGame === 'mbj') socket.emit('mbjLeaveSeat');
        if(activeGame === 'horserace' && hrState.status === 'RACING') { showLocalFlash('horserace', "Wait for race to finish!", "error"); return; }
        if(activeGame) socket.emit('leaveRoom', activeGame);
        activeGame = null;
        switchView('casino');
    }

    function openGame(id) {
        activeGame = id;
        socket.emit('joinRoom', id);
        if (id === 'mbj') {
            renderMBJSeats({ 1:null, 2:null, 3:null, 4:null, 5:null }); // Render empties instantly
            switchView('mbj');
        } else if (id === 'horserace') {
            setupDerbyUI();
            switchView('horserace');
        }
    }

    const delay = ms => new Promise(res => setTimeout(res, ms));

    // =========================================================================
    // VIP BLACKJACK (Bulletproof Seat Rendering)
    // =========================================================================
    let currentMBJSeats = { 1:null, 2:null, 3:null, 4:null, 5:null };

    function generateCardHTML(c, isHidden = false, animDelay = 0) {
        let styleStr = `animation-delay: ${animDelay}s;`;
        if(isHidden) return `<div class="mbj-card card-back anim-fly-in" style="${styleStr}"></div>`;
        let cleanSuit = c.suitHtml.replace(/<[^>]*>?/gm, ''); 
        let colorClass = (cleanSuit === '♥' || cleanSuit === '♦') ? 'card-red' : 'card-black';
        return `<div class="mbj-card anim-fly-in ${colorClass}" style="${styleStr}">
                    <div class="card-tl"><div>${c.raw}</div><div style="font-size:1.1rem; margin-top:-2px;">${cleanSuit}</div></div>
                    <div class="card-center">${cleanSuit}</div>
                    <div class="card-br"><div>${c.raw}</div><div style="font-size:1.1rem; margin-top:-2px;">${cleanSuit}</div></div>
                </div>`;
    }
    
    function renderMBJSeats(seats, activeTurnObj = null, time = 0, isInitialDeal = false) {
        currentMBJSeats = seats || currentMBJSeats; 
        let cont = document.getElementById('mbj-seats-container'); 
        if(!cont) return; 
        cont.innerHTML = '';
        
        let myTotalBet = 0;
        let cardSequenceIdx = 0; 
        let activeSeatNum = activeTurnObj ? activeTurnObj.seat : null;

        for(let i=1; i<=5; i++) {
            let s = currentMBJSeats[i]; 
            let isMe = s && s.username === myUsername; 
            let isMySeatTurn = activeSeatNum == i;
            let dimClass = (mbjGameState === 'PLAYER_TURN' && !isMySeatTurn && s) ? 'dimmed' : '';
            let activeClass = isMySeatTurn ? 'active-turn' : '';
            let boxClass = `mbj-seat-circle ${s ? 'occupied' : ''}`;
            
            // Allow click if empty AND betting AND I am not seated elsewhere
            let canSit = !s && mbjGameState === 'BETTING' && !Object.values(currentMBJSeats).some(st => st && st.username === myUsername);
            let clickAction = canSit ? `socket.emit('mbjTakeSeat', ${i})` : ``; 

            // Create seat container explicitly
            let html = `<div class="mbj-seat-anchor ${activeClass} ${dimClass}" id="mbj-anchor-${i}">`;
            html += `<div class="seat-glow"></div>`;
            
            // Render Cards
            html += `<div class="mbj-hand-cards">`;
            if (s && s.hands && s.hands.length > 0) {
                s.hands.forEach((hand, hIdx) => {
                    if(hand.cards.length > 0 && hand.status !== 'BUST') { html += `<div class="mbj-hand-score" style="left: ${(hIdx * 100) - 12}px;">${hand.score}</div>`; }
                    hand.cards.forEach((c, cIdx) => { 
                        let offsetLeft = (hIdx * 100) + (cIdx * 20); 
                        let animDelay = isInitialDeal ? (cardSequenceIdx * 0.4) : 0; 
                        html += generateCardHTML(c, false, animDelay).replace('style="', `style="left: ${offsetLeft}px; `);
                        if(isInitialDeal) cardSequenceIdx++;
                    });
                    if(hand.status && hand.status !== 'WAITING' && hand.status !== 'PLAYING') {
                        let stClass = hand.status === 'BUST' ? 'status-bust' : (hand.status === 'BLACKJACK' ? 'status-bj' : '');
                        html += `<div class="mbj-status ${stClass}" style="left: ${(hIdx * 100) - 10}px;">${hand.status}</div>`;
                    }
                });
            }
            html += `</div>`;

            // Render Circle
            html += `<div class="${boxClass}" ${clickAction ? `onclick="${clickAction}"` : ''} style="${canSit ? 'cursor:pointer;' : 'cursor:default;'}">`;
            if (s) {
                let totalSeatBet = s.hands && s.hands.length > 0 ? s.hands.reduce((sum, h)=>sum+h.bet, 0) : s.bet || 0;
                if (totalSeatBet > 0) { html += `<div class="chip-stack">${totalSeatBet}</div>`; }
                if(isMe) myTotalBet += totalSeatBet;
            } else {
                // BUG FIX: ALWAYS draw the plus, just make it opaque if it's betting time
                html += `<i class="fas fa-plus" style="font-size:1.5rem; opacity:${mbjGameState==='BETTING' ? 0.7 : 0.1}; color: white;"></i>`;
            }
            html += `</div>`; 

            // Render Name/Label
            html += `<div class="seat-name" style="color: ${isMe ? 'var(--ps-glow)' : (s ? 'white' : 'var(--text-muted)')}; opacity:${mbjGameState==='BETTING' || s ? 1 : 0.2};">`;
            html += s ? s.username : 'EMPTY';
            html += `</div>`;
                
            // Render Betting Pod
            if(isMe && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0) && mbjGameState === 'BETTING') {
                html += `<div class="seat-bet-ui">
                            <input type="number" id="mbj-bet-input-${i}" class="input-control" placeholder="Amount" style="padding:6px; font-size:0.9rem;">
                            <div style="display:flex; gap:5px; width:100%;">
                                <button class="btn-play" onclick="event.stopPropagation(); placeMBJBet(${i})" style="flex:1; padding:6px; background:var(--success); color:black; font-size:0.8rem; border:none;">BET</button>
                                <button class="btn-play" onclick="event.stopPropagation(); socket.emit('mbjLeaveSeat');" style="flex:1; padding:6px; background:var(--danger); color:white; font-size:0.8rem; border:none;">LEAVE</button>
                            </div>
                         </div>`;
            }

            // Render Hit/Stand
            if (isMySeatTurn && mbjGameState === 'PLAYER_TURN' && isMe) {
                let activeHand = s.hands[activeTurnObj.handIdx];
                let canDouble = activeHand && activeHand.cards.length === 2;
                html += `<div class="seat-actions-wrapper">
                            <button class="mbj-action-btn hit" onclick="socket.emit('mbjAction', {type:'hit'})"><i class="fas fa-plus"></i></button>
                            <button class="mbj-action-btn stand" onclick="socket.emit('mbjAction', {type:'stand'})"><i class="fas fa-hand-paper"></i></button>
                            <button class="mbj-action-btn double" onclick="socket.emit('mbjAction', {type:'double'})" ${canDouble ? '' : 'disabled'}>x2</button>
                         </div>`;
            }

            html += `</div>`; 
            cont.innerHTML += html;
        }
        document.getElementById('mbj-hud-bet').innerText = myTotalBet + ' TC';
    }

    function placeMBJBet(seatNum) { 
        let i = document.getElementById('mbj-bet-input-' + seatNum); 
        if(!i) return;
        let a = parseFloat(i.value); 
        if (isNaN(a) || a < 10) return showLocalFlash('mbj', 'Min Bet 10 TC', 'error'); 
        socket.emit('mbjPlaceBet', a); 
    }

    socket.on('mbjUpdate', async (data) => {
        if(activeGame !== 'mbj') return;
        let dBadge = document.getElementById('mbj-d-score-val');
        let tTitle = document.getElementById('mbj-timer-title');
        let tVal = document.getElementById('mbj-timer');
        let tBox = document.getElementById('mbj-timer-box');

        if(data.event === 'timer') {
            mbjGameState = 'BETTING'; 
            dBadge.style.display = 'none';
            if(data.active) {
                tBox.style.display = 'flex';
                if (tVal) tVal.innerText = data.time; 
                tTitle.innerText = "PLACE BETS"; tTitle.style.color = "var(--ps-glow)";
            } else { tBox.style.display = 'none'; }
            renderMBJSeats(data.seats); 
        } 
        else if (data.event === 'sync_seats') { renderMBJSeats(data.seats, data.activeTurn); } 
        else if (data.event === 'lock_bets') { mbjGameState = 'DEALING'; tTitle.innerText = "DEALING"; tTitle.style.color = "var(--danger)"; if (tVal) tVal.innerText = '--'; } 
        else if (data.event === 'deal') {
            renderMBJSeats(data.seats, null, 0, true); 
            let dHand = document.getElementById('mbj-fs-dealer-hand');
            if(dHand) { 
                dHand.innerHTML = ''; 
                let baseDelay = Object.values(data.seats).reduce((cnt, s) => count + (s && s.hands[0] ? s.hands[0].cards.length : 0), 0) * 0.4; 
                dHand.innerHTML += generateCardHTML(data.dealerHand[0], false, baseDelay).replace('style="', 'style="position:absolute; left: 0px; '); 
                dHand.innerHTML += generateCardHTML(data.dealerHand[1], true, baseDelay + 0.4).replace('style="', 'style="position:absolute; left: 20px; '); 
                setTimeout(() => { dBadge.style.display = 'flex'; dBadge.innerText = data.dealerHand[0].bjVal; }, (baseDelay + 0.4) * 1000);
            } 
        } 
        else if (data.event === 'turn') {
            mbjGameState = 'PLAYER_TURN'; 
            tTitle.innerText = "PLAYER TURN"; tTitle.style.color = "white";
            if (tVal) tVal.innerText = data.time; 
            renderMBJSeats(data.seats, data.activeTurn);
        } 
        else if (data.event === 'turn_timer') { if (tVal) tVal.innerText = data.time; }
        else if (data.event === 'dealer_resolved') {
            mbjGameState = 'RESOLVING'; tBox.style.display = 'none'; 
            renderMBJSeats(data.seats); 
            let dHand = document.getElementById('mbj-fs-dealer-hand'); 
            if(dHand) {
                dHand.innerHTML = generateCardHTML(data.dealerHand[0]).replace('anim-fly-in', '').replace('style="', 'style="position:absolute; left: 0px; ');
                dHand.innerHTML += generateCardHTML(data.dealerHand[1]).replace('anim-fly-in', 'anim-flip').replace('style="', 'style="position:absolute; left: 20px; ');
                dBadge.innerText = getBJScore(data.dealerHand.slice(0,2));
                const drawRemaining = async () => {
                    await delay(800);
                    for(let i=2; i<data.dealerHand.length; i++) { 
                        dHand.innerHTML += generateCardHTML(data.dealerHand[i]).replace('style="', `style="position:absolute; left:${i * 20}px; z-index:${i}; `); 
                        dBadge.innerText = getBJScore(data.dealerHand.slice(0, i+1));
                        await delay(800); 
                    }
                    dBadge.innerText = data.dealerScore;
                    let myNet = 0;
                    for(let i=1; i<=5; i++) {
                        let seat = data.seats[i];
                        if (seat && seat.username === myUsername && data.results && data.results[i]) {
                            let tb = seat.hands.reduce((sum, h)=>sum+h.bet, 0);
                            myNet = data.results[i].win - (tb - data.results[i].push);
                        }
                    }
                    if (myNet > 0) showLocalFlash('mbj', `WON +${myNet} TC`, 'success');
                    else if (myNet < 0) showLocalFlash('mbj', `LOST ${myNet} TC`, 'error');
                }; 
                drawRemaining();
            }
        } 
        else if (data.event === 'new_round') {
            mbjGameState = 'BETTING'; tBox.style.display = 'none';
            document.getElementById('mbj-fs-dealer-hand').innerHTML = ''; 
            dBadge.style.display = 'none';
            renderMBJSeats(data.seats); 
        }
    });

    // =========================================================================
    // RETRO HORSE DERBY LOGIC (Pure SVG Vector Horses)
    // =========================================================================
    const hexColors = {'Red':'#ff3366', 'Blue':'#00a2ff', 'Green':'#00e676', 'Yellow':'#ffcc00', 'Purple':'#b366ff', 'Orange':'#ff8800'};
    
    // A customized, perfectly grounded 2D pixel-style horse SVG
    function getHorseSVG(color) {
        return `
        <svg viewBox="0 0 64 48" width="70" height="52" class="horse-svg">
            <g class="b-leg2"><rect x="22" y="28" width="4" height="18" rx="2" fill="#3a2518"/></g>
            <g class="b-leg1"><rect x="14" y="28" width="4" height="18" rx="2" fill="#5c3a21"/></g>
            <g class="f-leg2"><rect x="46" y="28" width="4" height="18" rx="2" fill="#3a2518"/></g>
            <g class="f-leg1"><rect x="38" y="28" width="4" height="18" rx="2" fill="#5c3a21"/></g>
            <g class="horse-body">
                <path d="M 10 18 Q 4 18 6 30" stroke="#221100" stroke-width="3" fill="none" stroke-linecap="round"/>
                <rect x="14" y="14" width="34" height="16" rx="8" fill="#7a4b2b"/>
                <path d="M 40 20 L 54 6 L 60 8 L 56 16 L 48 24 Z" fill="#7a4b2b"/>
                <path d="M 54 6 Q 58 2 60 8" fill="#7a4b2b"/>
                <rect x="28" y="6" width="12" height="12" rx="3" fill="${color}"/>
                <circle cx="34" cy="4" r="5" fill="${color}"/>
                <rect x="30" y="12" width="5" height="10" rx="2" fill="#fff" transform="rotate(20 30 12)"/>
            </g>
        </svg>`;
    }

    function setupDerbyUI() {
        let container = document.getElementById('hr-lanes-container');
        if(!container) return;
        
        let trackHTML = '';
        let laneHeight = 100 / 6; // 6 lanes
        
        ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach((c, index) => {
            trackHTML += `
            <div class="hr-lane" style="top: ${index * laneHeight}%; height: ${laneHeight}%;">
                <div id="horse-${c}" class="hr-horse-group">
                    ${getHorseSVG(hexColors[c])}
                </div>
            </div>`;
        });
        container.innerHTML = trackHTML;
        
        let bg = document.getElementById('hr-bet-grid');
        if(bg) {
            bg.innerHTML = '';
            ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach((c) => {
                let oText = hrState.currentOdds && hrState.currentOdds[c] ? hrState.currentOdds[c] + 'x' : '?x';
                bg.innerHTML += `<button class="hr-bet-btn" data-choice="${c}" style="border-bottom-color:${hexColors[c]};" onclick="placeHRBet('${c}')">${c}<span class="hr-odds-text" id="odds-${c}">${oText}</span><div class="tile-bet-badge" id="badge-${c}">0</div></button>`;
            });
        }
        let fLineEl = document.getElementById('hr-finish-line');
        if(fLineEl) fLineEl.style.right = '-100px'; 
    }

    function placeHRBet(c) {
        if(hrState.status !== 'BETTING') return;
        let i = document.getElementById('hr-bet-input');
        let a = parseFloat(i.value);
        if(isNaN(a) || a < 10) return;
        socket.emit('placeSharedBet', { room: 'horserace', choice: c, amount: a });
    }

    socket.on('sharedBetConfirmed', (data) => {
        if (data.room !== activeGame) return;
        let c = data.choice;
        if (!mySBets[c]) mySBets[c] = 0;
        mySBets[c] += data.amount;
        let mb = document.getElementById('hr-my-bet');
        if (mb) mb.innerHTML = `${Object.values(mySBets).reduce((sum, val) => sum + val, 0)} TC`;
        let badge = document.getElementById('badge-' + c);
        if (badge) { badge.innerText = mySBets[c]; badge.style.display = 'block'; }
    });

    socket.on('hrTimerUpdate', (data) => {
        hrState.time = data.time;
        if (data.odds) hrState.currentOdds = data.odds;
        if(activeGame === 'horserace' && hrState.status === 'BETTING') {
            let s = document.getElementById('hr-timer');
            if(s) s.innerText = data.time;
            ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach(c => {
                let el = document.getElementById('odds-' + c);
                if(el && hrState.currentOdds[c]) el.innerText = hrState.currentOdds[c] + 'x';
            });
        }
    });

    socket.on('hrLockBets', () => {
        if(activeGame !== 'horserace') return;
        hrState.status = 'RACING';
        document.getElementById('hr-ticker').innerText = "AND THEY'RE OFF!";
        document.querySelectorAll('.hr-bet-btn').forEach(b => b.disabled = true);
    });

    let hrRaceInterval;
    socket.on('hrRaceStart', (data) => {
        if(activeGame !== 'horserace') return;
        const horses = ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'];
        let currentPos = { Red: 10, Blue: 10, Green: 10, Yellow: 10, Purple: 10, Orange: 10 };
        let targetPos = { Red: 10, Blue: 10, Green: 10, Yellow: 10, Purple: 10, Orange: 10 };

        let duration = data.duration; let startTime = Date.now();
        document.getElementById('hr-environment').classList.add('track-moving');
        let fLineEl = document.getElementById('hr-finish-line');
        if(fLineEl) { fLineEl.style.transition = 'right 1.5s ease-out'; fLineEl.style.right = '-100px'; }
        if(hrRaceInterval) clearInterval(hrRaceInterval);

        horses.forEach(h => {
            let el = document.getElementById('horse-' + h);
            if (el) { el.style.left = '10%'; el.classList.add('running'); }
        });

        let nextTargetUpdate = startTime + 500;
        let sprintTriggered = false;

        hrRaceInterval = setInterval(() => {
            let now = Date.now(); let elapsed = now - startTime; let timeRemaining = duration - elapsed;

            if (timeRemaining > 3000) {
                if (now > nextTargetUpdate) {
                    horses.forEach(h => { targetPos[h] = 10 + (Math.random() * 40); });
                    nextTargetUpdate = now + 800 + Math.random() * 800; 
                }
            } else {
                if (!sprintTriggered) {
                    sprintTriggered = true;
                    document.getElementById('hr-environment').classList.remove('track-moving'); 
                    if (fLineEl) { fLineEl.style.transition = 'none'; fLineEl.style.right = '10%'; }
                    horses.forEach(h => { targetPos[h] = (h === data.winner) ? 88 : 30 + (Math.random() * 40); });
                }
            }

            if(elapsed >= duration) {
                clearInterval(hrRaceInterval);
                horses.forEach(h => {
                    let el = document.getElementById('horse-' + h);
                    if(el) { el.classList.remove('running'); el.style.left = (h === data.winner ? 88 : Math.min(currentPos[h], 80)) + '%'; }
                });
                return;
            }

            horses.forEach(h => {
                let speed = (timeRemaining <= 3000 && h === data.winner) ? 0.08 : 0.03;
                currentPos[h] += (targetPos[h] - currentPos[h]) * speed;
                let el = document.getElementById('horse-' + h);
                if(el) el.style.left = currentPos[h] + '%';
            });
        }, 30); 
    });

    socket.on('hrRaceResults', (data) => {
        if(activeGame !== 'horserace') return;
        let w = data.winner;
        document.getElementById('hr-ticker').innerText = `${w.toUpperCase()} WINS!`;
        document.getElementById('hr-ticker').style.color = hexColors[w];
        let tba = Object.values(mySBets).reduce((a,b)=>a+b,0);
        if (mySBets[w]) showLocalFlash('horserace', `WON +${mySBets[w] * hrState.currentOdds[w] - tba} TC`, 'success');
        else if (tba > 0) showLocalFlash('horserace', `LOST -${tba} TC`, 'error');
    });

    socket.on('hrNewRound', (data) => {
        if(activeGame === 'horserace') {
            hrState.status = 'BETTING'; hrState.time = 15;
            if (data && data.odds) hrState.currentOdds = data.odds;
            document.getElementById('hr-ticker').innerText = "WAITING FOR NEXT RACE...";
            document.getElementById('hr-ticker').style.color = "var(--credits)";
            setupDerbyUI(); mySBets = {};
            let m = document.getElementById('hr-my-bet'); if (m) m.innerHTML = '0 TC'; 
            document.querySelectorAll('.hr-bet-btn').forEach(b => b.disabled = false);
        }
    });
  </script>
</body>
