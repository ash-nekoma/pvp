<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stick N' Trade | VIP Test Build</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Rajdhani:wght@600;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* ================= BASE STYLES & STRICT NO-SCROLL ================= */
        :root {
            --ps-bg: #000814; --ps-glow: #00a2ff;
            --glass-bg: rgba(0, 10, 25, 0.75); --glass-border: rgba(255, 255, 255, 0.15);
            --danger: #ff3366; --success: #00e676; --credits: #ffb400;
            --table-green: #006400; --table-dark: #002200; --table-wood: #3d2314;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; outline: none; user-select: none; }
        
        body {
            background: linear-gradient(135deg, #000a1f 0%, #001f4d 50%, #000000 100%);
            color: white;
            height: 100vh !important;
            width: 100vw !important;
            overflow: hidden !important; 
        }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { display: none; }
        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent; }

        /* ================= UI COMPONENTS ================= */
        .btn-play { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); padding: 12px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.2s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-play:hover:not(:disabled) { background: white; color: black; transform: translateY(-2px); }
        .btn-play:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .input-control { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; border-radius: 8px; font-size: 1rem; font-weight: 600; text-align: center; }
        .input-control:focus { border-color: var(--ps-glow); }

        /* ================= AUTHENTICATION ================= */
        #auth-container { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 9999; background: rgba(0, 5, 15, 0.95); backdrop-filter: blur(15px); }
        .auth-box { width: 400px; background: rgba(0,0,0,0.8); padding: 2.5rem; border-radius: 16px; border-top: 3px solid var(--ps-glow); border: 1px solid var(--glass-border); text-align: center; }

        /* ================= TOP NAVIGATION (Visual Only) ================= */
        .topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(0, 5, 15, 0.95); border-bottom: 1px solid var(--glass-border); height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .brand-title { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 162, 255, 0.5); cursor: pointer;}
        .wallet-pill { background: rgba(0,0,0,0.8); border: 1px solid rgba(255,180,0,0.4); padding: 5px 15px; height: 45px; border-radius: 8px; display: flex; align-items: center; gap: 8px; font-weight: 900; color: var(--credits); font-size: 1.1rem; }

        /* ================= MAIN LAYOUT ================= */
        .main-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 75px); margin-top: 75px; width: 100%; position: relative; }
        .view-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; }
        
        .btn-back-fixed { position: fixed; top: 95px; left: 25px; z-index: 1000; background: rgba(0,0,0,0.8); border: 1px solid var(--glass-border); color: white; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .btn-back-fixed:hover { background: white; color: black; }

        /* ================= LOBBY CARDS ================= */
        .lobby-modes-container { display: flex; gap: 40px; }
        .game-card { width: 320px; height: 380px; background: #020813; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; cursor: pointer; transition: 0.3s; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .game-card:hover { transform: translateY(-8px); border-color: var(--ps-glow); box-shadow: 0 15px 40px rgba(0,162,255,0.2); }
        .game-card i { font-size: 6rem; color: white; margin-top: 20px; }
        .game-title { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }

        /* ================= ALERTS ================= */
        .local-flash { position: fixed; bottom: 25px; right: 25px; z-index: 9999; color: var(--danger); font-size: 1.2rem; font-weight: 900; text-transform: uppercase; opacity: 0; display: none; text-shadow: 0 2px 10px rgba(0,0,0,0.9); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--danger); }
        .local-flash.show { display: block; animation: flashAnim 2.5s forwards; }
        .local-flash.success { color: var(--success); border-color: var(--success); }
        @keyframes flashAnim { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-10px); } }

        /* ================================================================= */
        /* VIP BLACKJACK - RECTANGULAR BOARD WITH CONTEXTUAL BUTTONS         */
        /* ================================================================= */
        .mbj-board {
            width: 1000px;
            height: 560px;
            background: #050505;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            overflow: hidden; 
        }

        .mbj-table-surface {
            position: absolute;
            top: -250px;
            left: 50%;
            transform: translateX(-50%);
            width: 1300px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 100%, var(--table-green), var(--table-dark));
            border: 20px solid var(--table-wood);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            pointer-events: none; 
        }

        .mbj-table-text { position: absolute; top: 250px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; width: 100%; }
        .mbj-table-text h1 { font-size: 3rem; letter-spacing: 5px; margin-bottom: 5px; color: rgba(255,255,255,0.3); }
        .mbj-table-text p { font-weight: 800; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; line-height: 1.4; color: rgba(255,255,255,0.2); }

        .mbj-dealer-area { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .mbj-shoe { position: absolute; top: 20px; right: 60px; width: 60px; height: 90px; background: repeating-linear-gradient(45deg, #111, #111 10px, #222 10px, #222 20px); border: 3px solid #555; border-radius: 8px; box-shadow: -5px 10px 20px rgba(0,0,0,0.8); }

        /* TIMER */
        .mbj-timer-display { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--glass-border); color: white; font-weight: 900; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; font-family: 'Rajdhani', monospace; }
        .mbj-timer-display.closing { color: var(--danger); border-color: var(--danger); animation: pulseRed 1s infinite; }

        /* SEAT ANCHORS */
        .mbj-seat-anchor { position: absolute; width: 100px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        
        #mbj-anchor-1 { bottom: 100px; left: 80px; }
        #mbj-anchor-2 { bottom: 30px; left: 260px; }
        #mbj-anchor-3 { bottom: 10px; left: 50%; transform: translateX(-50%); }
        #mbj-anchor-4 { bottom: 30px; right: 260px; }
        #mbj-anchor-5 { bottom: 100px; right: 80px; }

        .mbj-seat-circle { width: 65px; height: 65px; border: 2px dashed rgba(255,255,255,0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.3); z-index: 5;}
        .mbj-seat-circle:hover { border-color: white; background: rgba(255,255,255,0.2); }
        .mbj-seat-circle.occupied { border: 2px solid rgba(255,255,255,0.9); background: transparent; cursor: default; }
        .mbj-seat-anchor.active-turn .mbj-seat-circle { border-color: var(--ps-glow); box-shadow: 0 0 20px var(--ps-glow); background: rgba(0, 162, 255, 0.2); }

        /* ================= CONTEXTUAL CONTROLS (Attached to Seat) ================= */
        .seat-bet-ui { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 15px; display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); z-index: 100; }
        .seat-action-ui { position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 50px; border: 1px solid var(--ps-glow); box-shadow: 0 5px 20px rgba(0,162,255,0.4); z-index: 100; white-space: nowrap; }

        .mbj-action-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); color: white; font-size: 0.8rem; font-weight: 900; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.8); text-transform: uppercase; line-height: 1.2; }
        .mbj-action-circle:hover { transform: scale(1.1); border-color: white; }
        .mbj-action-circle.hit { background: radial-gradient(circle, #00e676, #008040); color: black; border: none; }
        .mbj-action-circle.stand { background: radial-gradient(circle, #ff3366, #99002b); color: white; border: none; }
        .mbj-action-circle.double { background: radial-gradient(circle, #ffcc00, #997a00); color: black; border: none; }
        .mbj-action-circle.split { background: radial-gradient(circle, #b366ff, #5900b3); color: black; border: none; }

        /* ================= NEW CLASSIC PLAYING CARDS ================= */
        .mbj-hand-cards { position: absolute; bottom: 75px; display: flex; justify-content: center; width: 100px; height: 85px; pointer-events: none; z-index: 5; }
        
        .mbj-card { width: 60px; height: 85px; background: white; color: black; border-radius: 6px; box-shadow: 2px 5px 15px rgba(0,0,0,0.8); position: relative; font-family: 'Outfit', sans-serif; flex-shrink: 0; overflow: hidden; }
        .mbj-hand-cards .mbj-card { position: absolute; bottom: 0; }
        
        .card-tl { position: absolute; top: 3px; left: 4px; display: flex; flex-direction: column; align-items: center; line-height: 0.9; font-size: 0.85rem; font-weight: 900;}
        .card-br { position: absolute; bottom: 3px; right: 4px; display: flex; flex-direction: column; align-items: center; line-height: 0.9; font-size: 0.85rem; font-weight: 900; transform: rotate(180deg); }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; }
        
        .card-red { color: #e60000; }
        .card-back { background: repeating-linear-gradient(45deg, #001f4d, #001f4d 10px, #000a1f 10px, #000a1f 20px); border: 2px solid rgba(255,255,255,0.8); }

        .mbj-hand-score { background: rgba(0,0,0,0.9); border: 1px solid var(--glass-border); padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 0.8rem; color: white; margin-top: 5px; z-index: 10; position: relative; }
        .mbj-status { position: absolute; top: -20px; background: var(--ps-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; border: 1px solid var(--glass-border); white-space: nowrap; z-index: 15; pointer-events: none; }
        
        .anim-slide-deal { animation: slideDeal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideDeal { 0% { opacity: 0; transform: translate(0, -300px) scale(0.5) rotateY(180deg); } 100% { opacity: 1; transform: translate(0, 0) scale(1) rotateY(0deg); } }

        /* ================= RETRO HORSE DERBY (Dynamic Animation) ================= */
        .hr-board { width: 1000px; height: 560px; background: #0a0a0a; border: 4px solid #333; border-radius: 12px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        
        .hr-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .hr-ticker { flex: 1; text-align: center; color: var(--credits); font-family: 'Press Start 2P', monospace; font-size: 1.1rem; text-shadow: 0 0 10px var(--credits); padding: 10px; background: #111; border: 2px solid #333; border-radius: 8px; margin: 0 20px; }
        
        .hr-track { flex: 1; background: #222; border: 4px solid #444; position: relative; display: flex; flex-direction: column; justify-content: space-evenly; overflow: hidden; border-radius: 8px; }
        .hr-lane { width: 100%; height: 16%; border-bottom: 2px dashed #555; position: relative; display: flex; align-items: center; }
        
        .hr-horse-group { position: absolute; left: 0; display: flex; align-items: center; gap: 10px; z-index: 10; }
        .hr-badge { width: 28px; height: 28px; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-weight: 900; color: white; font-size: 0.9rem; font-family: 'Press Start 2P', monospace; box-shadow: 2px 2px 0px rgba(0,0,0,0.8); }
        .hr-sprite { font-size: 3rem; transform: scaleX(-1); filter: drop-shadow(-5px 5px 2px rgba(0,0,0,0.5)); transform-origin: center bottom; }
        
        /* The aggressive physical gallop keyframes */
        @keyframes retroBounce { 
            0%, 100% { transform: scaleX(-1) translateY(0) rotate(0deg); } 
            25% { transform: scaleX(-1) translateY(-6px) rotate(8deg); } 
            50% { transform: scaleX(-1) translateY(-2px) rotate(0deg); } 
            75% { transform: scaleX(-1) translateY(-6px) rotate(-8deg); } 
        }
        .retro-gallop { animation: retroBounce 0.4s infinite linear; }

        .hr-finish-line { position: absolute; right: -50px; top: 0; bottom: 0; width: 20px; background: repeating-linear-gradient(to bottom, #fff, #fff 20px, #000 20px, #000 40px); z-index: 5; border-left: 4px solid white; transition: right 2s cubic-bezier(0.1, 0.7, 0.1, 1); }
        
        .hr-controls-area { margin-top: 15px; display: flex; flex-direction: column; gap: 15px; }
        .hr-bet-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 100%; }
        .hr-bet-btn { background: #111; border: 2px solid #444; color: white; padding: 15px 5px; font-family: 'Press Start 2P', monospace; font-size: 0.6rem; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
        .hr-bet-btn:hover:not(:disabled) { transform: translateY(-3px); border-color: white; }
        .hr-bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .hr-odds-text { color: var(--success); font-size: 0.9rem; text-shadow: 0 0 5px var(--success); }

        .tile-bet-badge { position: absolute; top: -10px; right: -10px; background: var(--credits); color: black; font-size: 0.8rem; font-weight: 900; padding: 4px 8px; border-radius: 8px; display: none; font-family: 'Outfit', sans-serif;}

        @keyframes pulseRed { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

  <div id="auth-container">
      <div class="auth-box">
          <div class="auth-title">STICK N' TRADE</div>
          <div class="auth-sub">VIP TEST BUILD</div>
          <div id="auth-form-login">
              <div class="input-group" style="margin-bottom:20px;">
                  <input type="text" id="login-user" class="input-control" placeholder="Username">
              </div>
              <div class="input-group" style="margin-bottom:15px;">
                  <input type="password" id="login-pass" class="input-control" placeholder="Password">
              </div>
              <div id="auth-error-login" class="auth-msg auth-error"></div>
              <button class="btn-play" style="width:100%;" onclick="submitAuth('login')">LOGIN</button>
          </div>
      </div>
  </div>

  <div id="app-container">
      
      <header class="topbar">
          <div class="brand-title" onclick="backToHub()">STICK N' TRADE</div>
          <div class="topbar-right">
              <div class="player-profile"><i class="fas fa-user-circle"></i> <span id="player-name-display">Player</span></div>
              <div class="wallet-pill">
                  <div class="wallet-main"><i class="fas fa-coins"></i> <span id="nav-credits">0</span></div>
              </div>
          </div>
      </header>

      <div class="main-wrapper">
        <button class="btn-back-fixed hidden" id="global-back-btn" onclick="backToHub()">
            <i class="fas fa-arrow-left"></i> LEAVE TABLE
        </button>
        
        <div class="content">
          
          <div id="view-casino" class="view-container">
            <h1 class="header-title">SELECT TABLE</h1>
            <div class="lobby-modes-container">
                <div class="game-card" onclick="openGame('mbj')">
                    <i class="fas fa-coins"></i>
                    <div>
                        <div class="game-title">VIP BLACKJACK</div>
                        <div style="color:var(--text-muted); font-size:0.9rem; font-weight:600;">Classic Cards & Fixed Seats</div>
                    </div>
                </div>
                <div class="game-card" onclick="openGame('horserace')">
                    <i class="fas fa-horse-head" style="color: var(--danger);"></i>
                    <div>
                        <div class="game-title">RETRO DERBY</div>
                        <div style="color:var(--text-muted); font-size:0.9rem; font-weight:600;">Dynamic Racing & Odds</div>
                    </div>
                </div>
            </div>
          </div>

          <div id="view-mbj" class="view-container hidden">
              <div class="mbj-board">
                  <div class="mbj-table-surface"></div>
                  
                  <div class="mbj-text">
                      <h1>BLACKJACK</h1>
                      <p>BLACKJACK PAYS 3 TO 2<br>DEALER MUST DRAW TO 16 AND STAND ON ALL 17s</p>
                  </div>

                  <div class="mbj-dealer-area">
                      <div style="color:white; font-weight:900; background:rgba(0,0,0,0.7); padding:4px 15px; border-radius:50px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.2); font-size: 0.8rem; z-index: 15;">DEALER <span id="mbj-d-score-val" style="color:var(--danger); margin-left: 5px;">0</span></div>
                      <div id="mbj-fs-dealer-hand" style="display:flex; gap:5px; height:85px; z-index:10; position:relative;"></div>
                  </div>
                  <div class="mbj-shoe"></div>

                  <div class="mbj-timer-display" id="mbj-timer-box">
                      <i class="fas fa-clock"></i> <span id="mbj-timer">15</span>
                  </div>

                  <div id="mbj-seats-container"></div>

                  <div id="flash-mbj" class="local-flash"></div> 
              </div>
          </div>

          <div id="view-horserace" class="view-container hidden">
              <div class="hr-board">
                  
                  <div class="hr-top-bar">
                      <div class="timer-box" id="hr-timer-box" style="margin:0; font-family:'Press Start 2P'; font-size:1rem; padding: 10px 20px;"><i class="fas fa-clock" style="margin-right:10px;"></i> <span id="hr-timer">40</span></div>
                      <div class="hr-ticker" id="hr-ticker">WAITING FOR NEXT RACE...</div>
                      <div style="font-family:'Press Start 2P'; font-size:0.8rem; color:var(--text-muted);">TOTAL BET<br><span id="hr-my-bet" style="color:white; font-size:1.2rem; display:block; margin-top:5px;">0 TC</span></div>
                  </div>
                  
                  <div class="hr-track">
                      <div class="hr-finish-line" id="hr-finish-line"></div>
                      <div id="hr-lanes-container"></div>
                  </div>

                  <div class="hr-controls-area">
                      <div style="display:flex; gap:15px; justify-content:center;">
                          <input type="number" id="hr-bet-input" class="input-control bet-input" placeholder="BET AMOUNT (TC)" style="max-width:300px; font-size:1.2rem; height:50px;">
                      </div>
                      <div class="hr-bet-grid" id="hr-bet-grid"></div>
                  </div>

                  <div id="flash-horserace" class="local-flash" style="bottom: 10px;"></div> 
              </div>
          </div>

        </div> 
      </div>
  </div>

  <script>
    const socket = io(); 
    let myUsername = '', myCredits = 0;
    let activeGame = null;
    
    let mbjGameState = 'BETTING';
    let hrState = { time: 40, status: 'BETTING', currentOdds: {} };
    let mySBets = {};

    function submitAuth(mode) { 
        const user = document.getElementById('login-user').value.trim(); 
        const pass = document.getElementById('login-pass').value; 
        if(!user || !pass) return document.getElementById('auth-error-login').innerText = "Please fill all fields."; 
        socket.emit('login', { username: user, password: pass }); 
    }
    
    socket.on('loginSuccess', (data) => { 
        myUsername = data.username; 
        myCredits = data.credits; 
        document.getElementById('nav-credits').innerText = myCredits.toLocaleString(); 
        document.getElementById('player-name-display').innerText = myUsername;
        document.getElementById('auth-container').style.display = 'none'; 
        document.getElementById('app-container').style.display = 'block'; 
        switchView('casino'); 
    });
    
    socket.on('balanceUpdateData', (data) => {
        myCredits = data.credits;
        document.getElementById('nav-credits').innerText = myCredits.toLocaleString();
    });

    function showLocalFlash(game, msg, type='error') {
        let f = document.getElementById('flash-' + game);
        if(f) {
            f.innerText = msg;
            f.classList.remove('show', 'success');
            void f.offsetWidth;
            f.classList.add('show');
            if(type === 'success') f.classList.add('success');
            setTimeout(() => f.classList.remove('show'), 2500);
        }
    }
    socket.on('localGameError', (data) => showLocalFlash(data.game, data.msg, "error"));

    function switchView(viewId) { 
        document.querySelectorAll('.view-container').forEach(d => d.classList.add('hidden')); 
        let v = document.getElementById('view-' + viewId); 
        if (v) v.classList.remove('hidden'); 
        
        let backBtn = document.getElementById('global-back-btn'); 
        if (viewId === 'casino') { 
            backBtn.classList.add('hidden'); 
        } else { 
            backBtn.classList.remove('hidden'); 
        } 
    }

    function backToHub() {
        if(activeGame === 'mbj') socket.emit('mbjLeaveSeat');
        if(activeGame === 'horserace' && hrState.status === 'RACING') {
            showLocalFlash('horserace', "Wait for race to finish!", "error");
            return;
        }
        if(activeGame) socket.emit('leaveRoom', activeGame);
        activeGame = null;
        switchView('casino');
    }

    function openGame(id) {
        activeGame = id;
        socket.emit('joinRoom', id);
        if (id === 'mbj') {
            renderMBJSeats({ 1:null, 2:null, 3:null, 4:null, 5:null });
            switchView('mbj');
        } else if (id === 'horserace') {
            setupDerbyUI();
            switchView('horserace');
        }
    }

    const delay = ms => new Promise(res => setTimeout(res, ms));

    // =========================================================================
    // VIP BLACKJACK LOGIC 
    // =========================================================================
    let currentMBJSeats = { 1:null, 2:null, 3:null, 4:null, 5:null };

    // Generates the new classic card layout
    function generateCardHTML(c, isHidden = false) {
        if(isHidden) return `<div class="mbj-card card-back"></div>`;
        return `<div class="mbj-card">
                    <div class="card-tl"><div>${c.raw}</div><div class="suit">${c.suitHtml}</div></div>
                    <div class="card-center">${c.suitHtml}</div>
                    <div class="card-br"><div>${c.raw}</div><div class="suit">${c.suitHtml}</div></div>
                </div>`;
    }
    
    function renderMBJSeats(seats, activeTurnObj = null, turnTime = 0) {
        currentMBJSeats = seats; 
        let cont = document.getElementById('mbj-seats-container'); 
        if(!cont) return; 
        cont.innerHTML = '';
        
        for(let i=1; i<=5; i++) {
            let s = seats[i]; 
            let isMe = s && s.username === myUsername; 
            let isMySeatTurn = activeTurnObj && activeTurnObj.seat == i;
            let boxClass = `mbj-seat-circle ${s ? 'occupied' : ''}`;
            
            let clickAction = `socket.emit('mbjTakeSeat', ${i})`;
            if (s && !isMe && mbjGameState === 'BETTING') clickAction = `placeMBJBetBehind(${i})`;

            // Absolute Wrapper for the Seat
            let html = `<div class="mbj-seat-anchor ${isMySeatTurn ? 'active-turn' : ''}" id="mbj-anchor-${i}">`;
            
            // ACTION BUTTONS (Spawn above the cards when it's your turn)
            if (isMySeatTurn && mbjGameState === 'PLAYER_TURN' && isMe) {
                let activeHand = s.hands[activeTurnObj.handIdx];
                let canDouble = activeHand && activeHand.cards.length === 2;
                let canSplit = canDouble && activeHand.cards[0].raw === activeHand.cards[1].raw;

                html += `<div class="seat-action-ui">
                            <button class="mbj-action-circle hit" onclick="handleMBJClick('hit')" title="Hit"><i class="fas fa-hand-pointer"></i></button>
                            <button class="mbj-action-circle stand" onclick="handleMBJClick('stand')" title="Stand"><i class="fas fa-hand-paper"></i></button>
                            ${canDouble ? `<button class="mbj-action-circle double" onclick="handleMBJClick('double')" title="Double">x2</button>` : ''}
                            ${canSplit ? `<button class="mbj-action-circle split" onclick="handleMBJClick('split')" title="Split"><i class="fas fa-arrows-alt-h"></i></button>` : ''}
                         </div>`;
            }

            // CARDS (Flow upwards from seat)
            html += `<div class="mbj-hand-cards">`;
            if (s && s.hands && s.hands.length > 0) {
                s.hands.forEach((hand, hIdx) => {
                    hand.cards.forEach((c, cIdx) => { 
                        let offset = (hIdx * 50) + (cIdx * 15); 
                        let cardHtml = generateCardHTML(c);
                        // Inject the offset into the style of the first child (.mbj-card)
                        cardHtml = cardHtml.replace('class="mbj-card"', `class="mbj-card" style="left: ${offset}px;"`);
                        html += cardHtml;
                    });
                    if(hand.status && hand.status !== 'WAITING' && hand.status !== 'PLAYING') {
                        let stColor = hand.status === 'BUST' ? 'var(--danger)' : (hand.status === 'BLACKJACK' ? 'var(--credits)' : 'white');
                        html += `<div class="mbj-status" style="left: ${hIdx * 50}px; color:${stColor}; border-color:${stColor};">${hand.status}</div>`;
                    }
                });
            }
            html += `</div>`;

            // SEAT CIRCLE
            html += `<div class="${boxClass}" onclick="${clickAction}">`;
            if (s) {
                let sScore = s.hands && s.hands.length > 0 ? s.hands[0].score : '';
                html += `<div style="font-weight:900; font-size:1.5rem; color:white;">${sScore}</div>`;
                html += `</div>`; 

                let totalSeatBet = s.hands && s.hands.length > 0 ? s.hands.reduce((sum, h)=>sum+h.bet, 0) : s.bet || 0;
                
                html += `<div style="text-align: center; margin-top: 5px;">`;
                html += `<div style="font-weight: 900; color: ${isMe ? 'var(--ps-glow)' : 'white'}; font-size: 0.8rem; text-transform: uppercase; white-space:nowrap;">${s.username}</div>`;
                html += `<div style="color: var(--credits); font-weight: 800; font-size: 0.75rem; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; margin-top: 2px; border:1px solid var(--glass-border);">${totalSeatBet > 0 ? totalSeatBet + ' TC' : 'WAITING'}</div>`;
                html += `</div>`;
                
                // BETTING CONTROLS (Spawn right below the seat during betting phase)
                if(isMe && (!s.hands || s.hands.length === 0 || s.hands[0].bet === 0) && mbjGameState === 'BETTING') {
                    html += `<div class="seat-bet-ui">
                                <input type="number" id="mbj-bet-input" class="input-control" placeholder="Amount" style="padding:6px; font-size:0.9rem;">
                                <div style="display:flex; gap:5px; width:100%;">
                                    <button class="btn-play" onclick="event.stopPropagation(); placeMBJBet()" style="flex:1; padding:6px; background:var(--success); color:black; font-size:0.8rem; border:none;">BET</button>
                                    <button class="btn-play" onclick="event.stopPropagation(); socket.emit('mbjLeaveSeat');" style="flex:1; padding:6px; background:var(--danger); color:white; font-size:0.8rem; border:none;">LEAVE</button>
                                </div>
                             </div>`;
                }
            } else { 
                html += `<i class="fas fa-plus" style="font-size:1.2rem; opacity:0.5; color: white;"></i></div>`; 
                html += `<div style="color:var(--text-muted); font-weight:800; font-size:0.7rem; margin-top: 5px; text-transform: uppercase;">Empty</div>`;
            }
            html += `</div>`; 
            cont.innerHTML += html;
        }
    }

    function placeMBJBet() { 
        let i = document.getElementById('mbj-bet-input'); 
        if(!i) return;
        let a = parseFloat(i.value); 
        if (isNaN(a) || a < 10) return; 
        socket.emit('mbjPlaceBet', a); 
    }

    function placeMBJBetBehind(seatNum) {
        // Quick prompt for bet behind since the main input is tied to a specific seat now
        let amt = prompt("Enter Bet Behind Amount (Min 10):", "10");
        if(amt) {
            let a = parseFloat(amt);
            if (!isNaN(a) && a >= 10) socket.emit('mbjBetBehind', { seatNum: seatNum, amount: a }); 
        }
    }

    function handleMBJClick(actionType) { 
        socket.emit('mbjAction', { type: actionType }); 
    }

    socket.on('mbjUpdate', async (data) => {
        if(activeGame !== 'mbj') return;
        
        if(data.event === 'timer') {
            mbjGameState = 'BETTING'; 
            let r = document.getElementById('mbj-timer-box'), s = document.getElementById('mbj-timer'); 
            if (s) s.innerText = data.time; 
            if (data.time <= 5 && r) r.classList.add('closing'); else if(r) r.classList.remove('closing');
        } 
        else if (data.event === 'sync_seats') {
            renderMBJSeats(data.seats, data.activeTurn, data.time);
        } 
        else if (data.event === 'lock_bets') {
            mbjGameState = 'DEALING'; 
            let r = document.getElementById('mbj-timer-box'); 
            if (r) { r.classList.remove('closing'); r.style.color = 'var(--danger)'; r.style.borderColor = 'var(--danger)'; } 
            let s = document.getElementById('mbj-timer'); if (s) s.innerText = '0'; 
        } 
        else if (data.event === 'deal') {
            renderMBJSeats(data.seats); 
            let dHand = document.getElementById('mbj-fs-dealer-hand');
            if(dHand) { 
                dHand.innerHTML = ''; 
                const dealInit = async () => {
                    for(let i=0; i<data.dealerHand.length; i++) {
                        let c = data.dealerHand[i];
                        let isHidden = c.raw === '?'; 
                        let cardHtml = generateCardHTML(c, isHidden);
                        cardHtml = cardHtml.replace('class="mbj-card"', 'class="mbj-card anim-slide-deal"');
                        dHand.innerHTML += cardHtml; 
                        await delay(800);
                    }
                };
                dealInit();
            } 
        } 
        else if (data.event === 'turn') {
            mbjGameState = 'PLAYER_TURN'; 
            renderMBJSeats(data.seats, data.activeTurn, data.time);
        } 
        else if (data.event === 'dealer_resolved') {
            mbjGameState = 'RESOLVING'; 
            renderMBJSeats(data.seats);
            
            let dHand = document.getElementById('mbj-fs-dealer-hand'); 
            let dScore = document.getElementById('mbj-d-score-val');
            
            if(dHand) {
                dHand.innerHTML = generateCardHTML(data.dealerHand[0]);
                let revealHtml = generateCardHTML(data.dealerHand[1]);
                dHand.innerHTML += revealHtml.replace('class="mbj-card"', 'class="mbj-card anim-flip"');
                
                const drawRemaining = async () => {
                    for(let i=2; i<data.dealerHand.length; i++) { 
                        await delay(800); 
                        let c = data.dealerHand[i]; 
                        let slideHtml = generateCardHTML(c);
                        dHand.innerHTML += slideHtml.replace('class="mbj-card"', 'class="mbj-card anim-slide-deal"'); 
                    }
                    await delay(500); 
                    if(dScore) dScore.innerText = data.dealerScore;
                    
                    let myNet = 0;
                    for(let i=1; i<=5; i++) {
                        let seat = data.seats[i];
                        if (seat && seat.username === myUsername && data.results && data.results[i]) {
                            let tb = seat.hands.reduce((sum, h)=>sum+h.bet, 0);
                            let tw = data.results[i].win;
                            let tp = data.results[i].push;
                            myNet = tw - (tb - tp);
                        }
                    }
                    if (myNet > 0) showLocalFlash('mbj', `WON +${myNet} TC`, 'success');
                    else if (myNet < 0) showLocalFlash('mbj', `LOST ${myNet} TC`, 'error');
                    
                }; 
                drawRemaining();
            }
        } 
        else if (data.event === 'new_round') {
            mbjGameState = 'BETTING'; 
            let r = document.getElementById('mbj-timer-box'); 
            if (r) { r.style.color = 'white'; r.style.borderColor = 'var(--glass-border)'; } 
            let dHand = document.getElementById('mbj-fs-dealer-hand'); 
            let dScore = document.getElementById('mbj-d-score-val'); 
            if(dHand) dHand.innerHTML = ''; 
            if(dScore) dScore.innerText = '0'; 
            renderMBJSeats(data.seats); 
        }
    });

    // =========================================================================
    // RETRO HORSE DERBY LOGIC
    // =========================================================================
    const hexColors = {'Red':'#ff3366', 'Blue':'#00a2ff', 'Green':'#00e676', 'Yellow':'#ffcc00', 'Purple':'#b366ff', 'Orange':'#ff8800'};
    
    function setupDerbyUI() {
        let container = document.getElementById('hr-lanes-container');
        if(!container) return;
        
        let trackHTML = '';
        ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach((c, idx) => {
            trackHTML += `
            <div class="hr-lane">
                <div id="horse-${c}" class="hr-horse-group">
                    <div class="hr-badge" style="background:${hexColors[c]};">${idx+1}</div>
                    <div class="hr-sprite" id="sprite-${c}">🏇</div>
                </div>
            </div>`;
        });
        container.innerHTML = trackHTML;
        
        let bg = document.getElementById('hr-bet-grid');
        if(bg) {
            bg.innerHTML = '';
            ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach((c) => {
                let oText = hrState.currentOdds && hrState.currentOdds[c] ? hrState.currentOdds[c] + 'x' : '?x';
                bg.innerHTML += `<button class="hr-bet-btn" data-choice="${c}" style="border-bottom-color:${hexColors[c]};" onclick="placeHRBet('${c}')">${c}<span class="hr-odds-text" id="odds-${c}">${oText}</span><div class="tile-bet-badge" id="badge-${c}">0</div></button>`;
            });
        }
        let fLineEl = document.getElementById('hr-finish-line');
        if(fLineEl) fLineEl.style.right = '-50px'; 
    }

    function placeHRBet(c) {
        if(hrState.status !== 'BETTING') return;
        let i = document.getElementById('hr-bet-input');
        let a = parseFloat(i.value);
        if(isNaN(a) || a < 10) return;
        socket.emit('placeSharedBet', { room: 'horserace', choice: c, amount: a });
    }

    socket.on('sharedBetConfirmed', (data) => {
        if (data.room !== activeGame) return;
        let c = data.choice;
        if (!mySBets[c]) mySBets[c] = 0;
        mySBets[c] += data.amount;
        
        let tot = Object.values(mySBets).reduce((sum, val) => sum + val, 0);
        let mb = document.getElementById('hr-my-bet');
        if (mb) mb.innerHTML = `${tot} TC`;

        let badge = document.getElementById('badge-' + c);
        if (badge) { badge.innerText = mySBets[c]; badge.style.display = 'block'; }
    });

    socket.on('hrTimerUpdate', (data) => {
        hrState.time = data.time;
        if (data.odds) hrState.currentOdds = data.odds;
        if(activeGame === 'horserace' && hrState.status === 'BETTING') {
            let s = document.getElementById('hr-timer');
            if(s) s.innerText = data.time;
            
            ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'].forEach(c => {
                let el = document.getElementById('odds-' + c);
                if(el && hrState.currentOdds[c]) el.innerText = hrState.currentOdds[c] + 'x';
            });
        }
    });

    socket.on('hrLockBets', () => {
        if(activeGame !== 'horserace') return;
        hrState.status = 'RACING';
        document.getElementById('hr-ticker').innerText = "AND THEY'RE OFF!";
        document.querySelectorAll('.hr-bet-btn').forEach(b => b.disabled = true);
    });

    let hrRaceInterval;
    socket.on('hrRaceStart', (data) => {
        if(activeGame !== 'horserace') return;
        
        const horses = ['Red', 'Blue', 'Green', 'Yellow', 'Purple', 'Orange'];
        let targetPos = { Red: 0, Blue: 0, Green: 0, Yellow: 0, Purple: 0, Orange: 0 };
        let currentPos = { Red: 0, Blue: 0, Green: 0, Yellow: 0, Purple: 0, Orange: 0 };
        let speeds = { Red: 0.05, Blue: 0.05, Green: 0.05, Yellow: 0.05, Purple: 0.05, Orange: 0.05 };

        let duration = data.duration; 
        let startTime = Date.now();
        let finishLineX = 85; 

        let fLineEl = document.getElementById('hr-finish-line');
        if(fLineEl) fLineEl.style.right = '-50px'; 

        if(hrRaceInterval) clearInterval(hrRaceInterval);

        horses.forEach(h => {
            let el = document.getElementById('horse-' + h);
            if (el) el.style.left = '0%';
            let sprite = document.getElementById('sprite-' + h);
            if(sprite) { sprite.classList.add('retro-gallop'); }
        });

        let nextTargetUpdate = startTime + 500;

        hrRaceInterval = setInterval(() => {
            let now = Date.now();
            let elapsed = now - startTime;
            let timeRemaining = duration - elapsed;

            // Aggressive Rubber-banding/Jostling logic
            if (now > nextTargetUpdate && timeRemaining > 4000) {
                horses.forEach(h => {
                    let distanceToWin = 85 - currentPos[h];
                    let maxBurst = Math.min(25, distanceToWin); 
                    // Horses can fall back slightly (-2) or surge forward
                    targetPos[h] = Math.max(0, currentPos[h] + (Math.random() * maxBurst - 2));
                    speeds[h] = 0.02 + Math.random() * 0.04;
                });
                nextTargetUpdate = now + 600 + Math.random() * 800; // chaotic frequency
            }

            // Final sprint to the line
            if (timeRemaining <= 4000) {
                if (fLineEl) fLineEl.style.right = '10%'; 
                horses.forEach(h => {
                    if (h === data.winner) { targetPos[h] = 100; speeds[h] = 0.08; } 
                    else { targetPos[h] = finishLineX - (Math.random() * 25 + 5); speeds[h] = 0.03; }
                });
            }

            // Stop
            if(elapsed >= duration) {
                clearInterval(hrRaceInterval);
                horses.forEach(h => {
                    let sprite = document.getElementById('sprite-' + h);
                    if(sprite) sprite.classList.remove('retro-gallop');
                    let el = document.getElementById('horse-' + h);
                    if(el) el.style.left = (h === data.winner ? 100 : Math.min(currentPos[h], finishLineX - 2)) + '%';
                });
                return;
            }

            // Apply calculated movement
            horses.forEach(h => {
                currentPos[h] += (targetPos[h] - currentPos[h]) * speeds[h];
                let el = document.getElementById('horse-' + h);
                if(el) el.style.left = Math.max(0, Math.min(currentPos[h], 100)) + '%';
            });
        }, 30); 
    });

    socket.on('hrRaceResults', (data) => {
        if(activeGame !== 'horserace') return;
        let w = data.winner;
        let msg = `${w.toUpperCase()} WINS!`;
        document.getElementById('hr-ticker').innerText = msg;
        document.getElementById('hr-ticker').style.color = hexColors[w];
        
        let tba = Object.values(mySBets).reduce((a,b)=>a+b,0);
        if (mySBets[w]) {
            let winAmt = mySBets[w] * hrState.currentOdds[w];
            let net = winAmt - tba;
            showLocalFlash('horserace', `WON +${net} TC`, 'success');
        } else if (tba > 0) {
            showLocalFlash('horserace', `LOST -${tba} TC`, 'error');
        }
    });

    socket.on('hrNewRound', (data) => {
        if(activeGame === 'horserace') {
            hrState.status = 'BETTING'; hrState.time = 40;
            if (data && data.odds) hrState.currentOdds = data.odds;
            
            document.getElementById('hr-ticker').innerText = "WAITING FOR NEXT RACE...";
            document.getElementById('hr-ticker').style.color = "var(--credits)";
            
            setupDerbyUI();
            mySBets = {};
            let m = document.getElementById('hr-my-bet'); 
            if (m) m.innerHTML = '0 TC'; 
            document.querySelectorAll('.hr-bet-btn').forEach(b => b.disabled = false);
        }
    });

  </script>
</body>
</html>
