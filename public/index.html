<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIP Blackjack Sandbox</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: sans-serif; outline: none; }
        body { background: #000814; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #login-screen { text-align: center; background: rgba(0, 10, 25, 0.9); padding: 40px; border-radius: 12px; border: 1px solid #00a2ff; }
        #login-screen input { padding: 12px; font-size: 1.2rem; text-align: center; margin-bottom: 20px; width: 100%; border-radius: 8px; border: none; }
        #login-screen button { padding: 12px 20px; font-size: 1.2rem; cursor: pointer; background: #00a2ff; color: black; font-weight: bold; border: none; border-radius: 8px; width: 100%; }

        #main-layout { display: none; display: flex; gap: 20px; width: 100%; max-width: 1400px; height: 700px; }
        
        /* GAME BOARD */
        #game-screen { flex: 1; height: 100%; background: radial-gradient(circle, #0f5132 0%, #062c19 100%); border-radius: 20px; border: 15px solid #3e2723; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        .dealer-area { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .hand { display: flex; gap: -20px; justify-content: center; min-height: 100px; margin-top: 10px; }
        .card { width: 70px; height: 100px; background: white; color: black; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; font-size: 1rem; border: 1px solid #ccc; box-shadow: -2px 2px 5px rgba(0,0,0,0.5); }
        .card-red { color: #ff3366; }
        .card-hidden { background: repeating-linear-gradient(45deg, #001f4d, #001f4d 10px, #000a1f 10px, #000a1f 20px); border: 2px solid white; color: transparent; }
        
        #timer-display { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); font-size: 4rem; font-weight: bold; text-shadow: 0 5px 15px black; color: white; pointer-events: none; transition: opacity 0.3s;}
        
        /* DYNAMIC CENTERED SEATS */
        .seats-container { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 30px; padding: 0 20px; transition: all 0.5s ease; }
        .seat { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 120px; position: relative; transition: all 0.5s ease; }
        .seat-circle { width: 60px; height: 60px; border: 2px dashed rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; background: rgba(0,0,0,0.4); }
        .seat-circle:hover { background: rgba(255,255,255,0.2); border-color: white; }
        .seat.occupied .seat-circle { border: 2px solid transparent; cursor: default; background: transparent; }
        .seat.active-turn .seat-circle { box-shadow: 0 0 20px #00e676; border: 2px solid #00e676; background: rgba(0, 230, 118, 0.2); }
        
        .seat-name { margin-top: 10px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; text-shadow: 0 2px 4px black; }
        .seat-bet { background: rgba(0,0,0,0.8); color: #ffb400; padding: 2px 10px; border-radius: 10px; font-weight: bold; font-size: 0.9rem; border: 1px solid rgba(255, 180, 0, 0.4); margin-top: 5px; }
        .seat-score { position: absolute; top: 30px; left: -10px; background: #333; border: 2px solid black; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; border-radius: 50%; font-weight: bold; z-index: 20; box-shadow: 2px 2px 5px black; }
        .score-active { background: linear-gradient(to bottom, #bf953f, #fcf6ba); color: black; }
        
        #controls { margin-top: 20px; display: flex; gap: 10px; height: 54px; justify-content: center; width: 1000px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; }
        #controls button { padding: 0 20px; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; text-transform: uppercase; display: none; height: 100%; transition: 0.2s; }
        #controls input { padding: 0 20px; font-size: 1.2rem; text-align: center; width: 180px; display: none; height: 100%; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; font-weight: bold; }
        
        #btn-leave { background: rgba(255,51,102,0.2); color: #ff3366; }
        #btn-bet { background: #00e676; color: black; }
        #btn-hit { background: rgba(0,230,118,0.2); color: #00e676; border: 1px solid #00e676; }
        #btn-stand { background: rgba(255,51,102,0.2); color: #ff3366; border: 1px solid #ff3366; }
        #btn-double { background: rgba(255,180,0,0.2); color: #ffb400; border: 1px solid #ffb400; }

        /* LIVE CHAT */
        .chat-panel { width: 320px; height: 700px; display: flex; flex-direction: column; background: rgba(0, 10, 25, 0.85); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; overflow: hidden; }
        .chat-header { padding: 15px; background: rgba(0,0,0,0.7); font-weight: bold; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-line { font-size: 0.95rem; line-height: 1.4; text-align: left; }
        .chat-line .name { color: #00a2ff; font-weight: bold; margin-right: 5px; }
        .chat-input-area { display: flex; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); gap: 10px; }
        .chat-input-area input { flex: 1; padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; text-align: left; }
        .chat-input-area input::placeholder { text-align: left; color: rgba(255,255,255,0.4); }
        .chat-input-area button { width: 44px; height: 44px; background: #00a2ff; border: none; border-radius: 8px; cursor: pointer; color: black; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Enter VIP Sandbox</h2>
        <input type="text" id="username" placeholder="Enter your name">
        <button onclick="joinSandbox()">ENTER CASINO</button>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center;">
        <div id="main-layout">
            <div id="game-screen">
                <div class="dealer-area">
                    <div id="dealer-score" class="seat-score" style="display:none; left: -40px;">0</div>
                    <div id="dealer-hand" class="hand"></div>
                </div>
                
                <div id="timer-display">15</div>

                <div class="seats-container" id="seats-container">
                    </div>
            </div>

            <div class="chat-panel">
                <div class="chat-header">LIVE CHAT</div>
                <div class="chat-body custom-scroll" id="chat-box">
                    <div class="chat-line" style="color: #00a2ff; text-align: center; font-weight: bold;">Connected to table.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Chat here..." onkeypress="if(event.key==='Enter') sendChat();">
                    <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div id="controls">
            <button id="btn-leave" onclick="leaveSeat()">LEAVE</button>
            <input type="number" id="bet-input" placeholder="Amount">
            <button id="btn-bet" onclick="placeBet()">PLACE BET</button>
            <button id="btn-hit" onclick="sendAction('hit')">HIT</button>
            <button id="btn-stand" onclick="sendAction('stand')">STAND</button>
            <button id="btn-double" onclick="sendAction('double')">DOUBLE</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = '';
        let mySeat = null;

        function joinSandbox() {
            let name = document.getElementById('username').value.trim();
            if(!name) return alert("Enter a name");
            myName = name;
            socket.emit('join', myName);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-layout').style.display = 'flex';
        }

        function takeSeat(seatNum) { socket.emit('takeSeat', seatNum); }
        function leaveSeat() { socket.emit('leaveSeat'); }
        function placeBet() {
            let amt = parseInt(document.getElementById('bet-input').value);
            if(!amt || amt <= 0) return alert("Invalid bet");
            socket.emit('placeBet', amt);
            document.getElementById('bet-input').value = '';
        }
        function sendAction(action) { socket.emit('playerAction', action); }

        // CHAT FUNCTIONS
        function sendChat() {
            let input = document.getElementById('chat-input');
            let msg = input.value.trim();
            if (msg) {
                socket.emit('sendChat', msg);
                input.value = '';
            }
        }
        socket.on('chatMessage', (data) => {
            let box = document.getElementById('chat-box');
            box.innerHTML += `<div class="chat-line"><span class="name">${data.name}:</span> ${data.msg}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        // GAME RENDERER
        socket.on('stateUpdate', (state) => {
            let timerEl = document.getElementById('timer-display');
            if (state.status === 'BETTING') {
                let hasBets = Object.values(state.seats).some(s => s !== null && s.bet > 0);
                timerEl.innerText = state.timer;
                timerEl.style.opacity = hasBets ? '1' : '0.2';
            } else {
                timerEl.style.opacity = '0'; // Hide timer during deal/play
            }

            // Render Dealer
            let dHand = document.getElementById('dealer-hand');
            dHand.innerHTML = '';
            state.dealer.cards.forEach((c, idx) => {
                if (c === 'hidden') dHand.innerHTML += `<div class="card card-hidden" style="margin-left: ${idx > 0 ? '-40px' : '0'};">?</div>`;
                else dHand.innerHTML += `<div class="card ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}" style="margin-left: ${idx > 0 ? '-40px' : '0'};">
                    <div style="font-size:0.8rem">${c.val}</div>
                    <div style="font-size:1.5rem; text-align:center; margin-top:10px;">${c.suit}</div>
                </div>`;
            });
            let dScoreEl = document.getElementById('dealer-score');
            if (state.dealer.score > 0) {
                dScoreEl.style.display = 'flex'; dScoreEl.innerText = state.dealer.score;
            } else { dScoreEl.style.display = 'none'; }

            // Render Seats with DYNAMIC CENTERING
            let seatsHtml = '';
            mySeat = null;
            
            for(let i=1; i<=5; i++) {
                let seat = state.seats[i];
                let isActiveTurn = state.activeSeat === i;
                
                if (seat) {
                    if (seat.name === myName) mySeat = i;
                    
                    // If round is running and this seat didn't bet, HIDE THEM so flex centers the rest
                    if (state.status !== 'BETTING' && seat.bet === 0) {
                        continue; 
                    }

                    let cardsHtml = '';
                    seat.cards.forEach((c, idx) => {
                        cardsHtml += `<div class="card ${c.suit === '♥' || c.suit === '♦' ? 'card-red' : ''}" style="margin-left: ${idx > 0 ? '-40px' : '0'}; z-index: ${idx};">
                            <div style="font-size:0.8rem">${c.val}</div>
                            <div style="font-size:1.5rem; text-align:center; margin-top:10px;">${c.suit}</div>
                        </div>`;
                    });

                    seatsHtml += `
                    <div class="seat occupied ${isActiveTurn ? 'active-turn' : ''}">
                        ${seat.result ? `<div style="position:absolute; top:-40px; color:${seat.result==='WIN'?'#00e676':(seat.result==='PUSH'?'white':'#ff3366')}; font-weight:bold; font-size:1.2rem; text-shadow:0 0 10px black; z-index:50;">${seat.result}</div>` : ''}
                        <div class="seat-score ${isActiveTurn ? 'score-active' : ''}" style="display:${seat.score > 0 ? 'flex' : 'none'}">${seat.score}</div>
                        <div class="hand">${cardsHtml}</div>
                        <div class="seat-circle">
                            ${seat.bet > 0 ? `<i class="fas fa-check" style="color: #00e676; font-size: 1.5rem;"></i>` : '<i class="fas fa-user" style="color: white; opacity:0.5;"></i>'}
                        </div>
                        ${seat.bet > 0 ? `<div class="seat-bet">${seat.bet}</div>` : ''}
                        <div class="seat-name" style="color:${seat.name === myName ? '#00a2ff' : 'white'};">${seat.name}</div>
                    </div>`;
                } else {
                    // Empty seats ALSO disappear during active rounds to force centering
                    if (state.status === 'BETTING') {
                        seatsHtml += `
                        <div class="seat">
                            <div class="seat-circle" onclick="takeSeat(${i})"><i class="fas fa-plus" style="color:white; opacity:0.3;"></i></div>
                        </div>`;
                    }
                }
            }
            document.getElementById('seats-container').innerHTML = seatsHtml;

            // Update Controls
            document.getElementById('btn-leave').style.display = (mySeat !== null && state.status === 'BETTING' && state.seats[mySeat].bet === 0) ? 'block' : 'none';
            
            let canBet = mySeat !== null && state.status === 'BETTING' && state.seats[mySeat].bet === 0;
            document.getElementById('bet-input').style.display = canBet ? 'block' : 'none';
            document.getElementById('btn-bet').style.display = canBet ? 'block' : 'none';

            let isMyTurn = mySeat !== null && state.activeSeat === mySeat && state.status === 'PLAYER_TURN';
            document.getElementById('btn-hit').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('btn-stand').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('btn-double').style.display = (isMyTurn && state.seats[mySeat].cards.length === 2) ? 'block' : 'none';
        });

    </script>
</body>
</html>
