<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stick N' Trade | Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Rajdhani:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        :root { 
            --ps-bg: #000814; --ps-blue: #00439c; --ps-glow: #00a2ff; 
            --danger: #ff3366; --success: #00e676; --credits: #ffb400; --playable: #b366ff; 
            --text-main: #f8fafc; --text-muted: #8c9eb5; 
            --glass: rgba(0, 10, 25, 0.75); --glass-border: rgba(255, 255, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; user-select: none; }
        body { background: #000; color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Ambient Background */
        .bg-layer { position: fixed; inset: 0; background: linear-gradient(135deg, #000a1f 0%, #001f4d 50%, #000000 100%); background-size: 200% 200%; animation: AmbientBG 15s ease infinite; z-index: -1; }
        @keyframes AmbientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Top Navigation */
        .topbar { background: rgba(0, 5, 15, 0.95); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); z-index: 100; backdrop-filter: blur(20px);}
        .brand { font-size: 1.5rem; font-weight: 900; color: white; display: flex; align-items: center; gap: 10px; letter-spacing: 2px;} 
        .brand i { color: var(--ps-glow); text-shadow: 0 0 10px var(--ps-glow); }
        
        /* Balance Display */
        .balance-container { display: flex; gap: 15px; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--glass-border); }
        .bal-item { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .bal-tc { color: var(--credits); } .bal-p { color: var(--playable); }
        
        /* Smart Navigation (Desktop vs Mobile) */
        .desktop-nav { display: flex; gap: 10px; }
        .mobile-nav-btn { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        
        @media (max-width: 800px) {
            .desktop-nav { display: none; }
            .mobile-nav-btn { display: block; }
            .brand span { display: none; } /* Hide text on small screens, keep icon */
        }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 800; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;}
        .btn-blue { background: rgba(0, 162, 255, 0.15); color: var(--ps-glow); border: 1px solid var(--ps-glow); } .btn-blue:hover { background: var(--ps-glow); color: black; box-shadow: 0 0 15px rgba(0,162,255,0.4);}
        .btn-red { background: rgba(255, 51, 102, 0.15); color: var(--danger); border: 1px solid var(--danger); } .btn-red:hover { background: var(--danger); color: white; box-shadow: 0 0 15px rgba(255,51,102,0.4);}
        
        /* Layout */
        .main-content { display: flex; flex: 1; overflow: hidden; position: relative; padding-bottom: 70px; /* Space for floating dock */ }
        .game-area { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; position: relative;}
        .chat-sidebar { width: 300px; background: var(--glass); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        
        @media (max-width: 800px) {
            .chat-sidebar { display: none; } /* Hide chat on mobile to save space */
        }

        /* Game Board & Betting Visual Locks */
        .board { background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-radius: 12px; padding: 20px; text-align: center; position: relative; overflow: hidden; transition: 0.3s; }
        .flash-red { animation: flashRed 0.5s ease; border-color: var(--danger); box-shadow: 0 0 20px rgba(255,51,102,0.3); }
        @keyframes flashRed { 0% { background: rgba(255,51,102,0.2); } 100% { background: rgba(0,0,0,0.6); } }
        
        .bet-lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10; flex-direction: column; }
        .bet-lock-overlay.active { display: flex; }
        .lock-text { color: var(--danger); font-size: 2rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 0 15px var(--danger); }

        /* Floating Betting Dock */
        .floating-dock { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0, 5, 15, 0.95); border-top: 1px solid var(--glass-border); padding: 10px 20px; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 90; backdrop-filter: blur(20px); }
        .chip-container { display: flex; gap: 10px; }
        .chip { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 0.8rem; cursor: pointer; border: 2px dashed rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); transition: 0.2s; color: white; }
        .chip.active { border: 2px solid var(--ps-glow); background: rgba(0,162,255,0.2); box-shadow: 0 0 15px rgba(0,162,255,0.5); transform: translateY(-5px); }
        
        /* Playing Cards */
        .card { display: inline-block; width: 60px; height: 85px; background: white; border-radius: 6px; border: 1px solid #ccc; margin: 0 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); text-align: center; line-height: 85px; font-size: 1.5rem; font-weight: 900; position: relative; }
        .card-red { color: #d00; } .card-black { color: #000; }
        .card-val-top { position: absolute; top: 5px; left: 5px; font-size: 0.9rem; line-height: 1; }

        /* Spam-Proof Chat */
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; }
        .chat-msg { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; }
        .chat-msg span.user { font-weight: 900; color: var(--ps-glow); margin-right: 5px; }
        .sys-msg { background: rgba(255, 51, 102, 0.1); border-left: 3px solid var(--danger); padding: 8px 12px; border-radius: 4px; color: white; font-weight: 600; font-size: 0.85rem;}
        .sys-msg.open { background: rgba(0, 230, 118, 0.1); border-left-color: var(--success); }
        .chat-input-area { padding: 15px; border-top: 1px solid var(--glass-border); display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; padding: 10px; border-radius: 8px; outline: none; }

        /* Betting Tiles */
        .tile-grid { display: grid; gap: 15px; margin-top: 20px; }
        .baccarat-grid { grid-template-columns: 1fr 1fr 1fr; }
        .tile { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; padding: 20px; cursor: pointer; transition: 0.2s; position: relative; }
        .tile:hover { background: rgba(255,255,255,0.1); }
        .tile-name { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }
        .tile-bet { position: absolute; bottom: 5px; right: 10px; font-size: 0.8rem; color: var(--credits); font-weight: 900; }

        /* Login Screen */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-box { width: 400px; background: var(--glass); padding: 40px; border-radius: 16px; border: 1px solid var(--ps-glow); box-shadow: 0 0 30px rgba(0,162,255,0.2); text-align: center; }
        .auth-box input { width: 100%; margin-bottom: 15px; padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); color: white; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color: white; font-weight: 900; margin-bottom: 5px; letter-spacing: 2px;">STICK N' TRADE</h1>
            <p style="color: var(--ps-glow); margin-bottom: 30px; font-weight: 800; letter-spacing: 3px;">CASINO SERVER</p>
            <input type="text" id="login-user" placeholder="USERNAME">
            <input type="password" id="login-pass" placeholder="PASSWORD">
            <button class="btn btn-blue" style="width: 100%; justify-content: center; padding: 15px; font-size: 1.1rem;" onclick="login()">ENTER CASINO</button>
            <div id="auth-err" style="color: var(--danger); margin-top: 15px; font-weight: 600; font-size: 0.9rem;"></div>
        </div>
    </div>

    <header class="topbar">
        <div class="brand"><i class="fas fa-gamepad"></i> <span>SNT CASINO</span></div>
        
        <div class="balance-container">
            <div class="bal-item bal-tc"><i class="fas fa-coins"></i> <span id="ui-tc">0</span></div>
            <div class="bal-item bal-p"><i class="fas fa-ticket-alt"></i> <span id="ui-ptc">0</span></div>
        </div>

        <div class="desktop-nav">
            <button class="btn btn-blue" onclick="toggleAudio()" title="Toggle Audio"><i id="audio-icon" class="fas fa-volume-up"></i></button>
            <button class="btn btn-blue" onclick="joinRoom('baccarat')">Baccarat</button>
            <button class="btn btn-blue" onclick="joinRoom('blackjack')">Solo BJ</button>
            <button class="btn btn-blue" onclick="joinRoom('mbj')">VIP BJ</button>
        </div>
        
        <button class="mobile-nav-btn"><i class="fas fa-bars"></i></button>
    </header>

    <div class="main-content">
        <div class="game-area" id="main-stage">
            
            <div id="room-baccarat" class="board" style="display: none;">
                <div class="bet-lock-overlay" id="lock-baccarat">
                    <i class="fas fa-lock" style="font-size: 3rem; color: var(--danger); margin-bottom: 10px;"></i>
                    <div class="lock-text">BETS CLOSED</div>
                    <div style="color: white; font-weight: 800; margin-top: 10px;" id="res-baccarat">RESOLVING HAND...</div>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="font-weight: 900; letter-spacing: 2px;">LIVE BACCARAT</h2>
                    <div style="font-family: 'Rajdhani'; font-size: 2rem; font-weight: 900; color: var(--success);" id="timer-baccarat">15s</div>
                </div>

                <div style="display: flex; justify-content: space-around; margin-bottom: 30px; min-height: 120px;" id="cards-baccarat">
                    </div>

                <div class="tile-grid baccarat-grid">
                    <div class="tile" onclick="placeBet('baccarat', 'Player')">
                        <div class="tile-name" style="color: var(--ps-glow);">PLAYER (1:1)</div>
                        <div class="tile-bet" id="bet-baccarat-Player">0 TC</div>
                    </div>
                    <div class="tile" onclick="placeBet('baccarat', 'Tie')">
                        <div class="tile-name" style="color: var(--success);">TIE (9:1)</div>
                        <div class="tile-bet" id="bet-baccarat-Tie">0 TC</div>
                    </div>
                    <div class="tile" onclick="placeBet('baccarat', 'Banker')">
                        <div class="tile-name" style="color: var(--danger);">BANKER (1:0.95)</div>
                        <div class="tile-bet" id="bet-baccarat-Banker">0 TC</div>
                    </div>
                </div>
            </div>

            <div id="room-blackjack" class="board" style="display: none;">
                <h2 style="font-weight: 900; letter-spacing: 2px; margin-bottom: 20px;">SOLO BLACKJACK</h2>
                
                <div style="margin-bottom: 20px;">
                    <div style="font-weight: 800; color: var(--text-muted); margin-bottom: 10px;">DEALER</div>
                    <div id="bj-dealer-cards" style="min-height: 90px;"></div>
                </div>
                
                <div style="margin-bottom: 30px;">
                    <div style="font-weight: 800; color: var(--ps-glow); margin-bottom: 10px;">YOUR HAND</div>
                    <div id="bj-player-cards" style="min-height: 90px;"></div>
                </div>

                <div style="font-size: 1.5rem; font-weight: 900; color: var(--credits); margin-bottom: 20px;" id="bj-result">PLACE YOUR BET</div>

                <div style="display: flex; justify-content: center; gap: 15px;" id="bj-controls">
                    <button class="btn btn-blue" id="btn-bj-start" onclick="playSoloBJ('start')">DEAL HAND</button>
                    <button class="btn btn-green" id="btn-bj-hit" style="display:none;" onclick="playSoloBJ('hit')">HIT</button>
                    <button class="btn btn-red" id="btn-bj-stand" style="display:none;" onclick="playSoloBJ('stand')">STAND</button>
                    <button class="btn btn-blue" id="btn-bj-double" style="display:none;" onclick="playSoloBJ('double')">DOUBLE</button>
                </div>
            </div>

        </div>

        <div class="chat-sidebar">
            <div style="padding: 15px; border-bottom: 1px solid var(--glass-border); font-weight: 900; letter-spacing: 1px; display: flex; justify-content: space-between;">
                LOBBY CHAT <i class="fas fa-users" style="color: var(--ps-glow);"></i>
            </div>
            <div class="chat-messages" id="chat-box">
                <div class="sys-msg open">Welcome to Stick N' Trade Casino.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn btn-blue" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="floating-dock">
        <div class="chip-container">
            <div class="chip" onclick="setChip(10)">10</div>
            <div class="chip" onclick="setChip(50)">50</div>
            <div class="chip active" onclick="setChip(100)">100</div>
            <div class="chip" onclick="setChip(500)">500</div>
            <div class="chip" onclick="setChip(1000)">1k</div>
        </div>
        <button class="btn btn-red" onclick="undoBet()"><i class="fas fa-undo"></i> UNDO</button>
    </div>

    <script>
        // --- CORE SETUP ---
        // CHANGE THIS URL IF HOSTING FRONTEND ON GITHUB BUT BACKEND ON RAILWAY
        const socket = io(); 
        
        let currentChip = 100;
        let activeRoom = null;
        let myUsername = '';
        
        // 3-State Audio
        let audioState = 2; // 2=Max, 1=Low, 0=Mute
        function toggleAudio() {
            audioState = (audioState + 2) % 3; // cycles 2 -> 1 -> 0 -> 2
            let icon = document.getElementById('audio-icon');
            if(audioState === 2) { icon.className = 'fas fa-volume-up'; icon.style.color = 'white'; }
            else if(audioState === 1) { icon.className = 'fas fa-volume-down'; icon.style.color = 'var(--text-muted)';}
            else { icon.className = 'fas fa-volume-mute'; icon.style.color = 'var(--danger)'; }
        }

        function setChip(val) {
            currentChip = val;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
        }

        function formatCard(card) {
            if(!card) return '';
            let colorClass = (card.suit === '♥' || card.suit === '♦') ? 'card-red' : 'card-black';
            return `<div class="card ${colorClass}"><div class="card-val-top">${card.raw}</div>${card.suit}</div>`;
        }

        // --- AUTH & BALANCE ---
        function login() {
            let u = document.getElementById('login-user').value;
            let p = document.getElementById('login-pass').value;
            if(!u || !p) return;
            socket.emit('login', { username: u, password: p });
        }

        socket.on('authError', msg => document.getElementById('auth-err').innerText = msg);
        
        socket.on('loginSuccess', data => {
            myUsername = data.username;
            document.getElementById('ui-tc').innerText = data.credits;
            document.getElementById('ui-ptc').innerText = data.playable;
            document.getElementById('auth-screen').style.display = 'none';
            joinRoom('baccarat');
        });

        socket.on('balanceUpdateData', data => {
            document.getElementById('ui-tc').innerText = data.credits;
            document.getElementById('ui-ptc').innerText = data.playable;
        });

        // --- NAVIGATION ---
        function joinRoom(room) {
            if(activeRoom) {
                document.getElementById(`room-${activeRoom}`).style.display = 'none';
                socket.emit('leaveRoom', activeRoom);
            }
            activeRoom = room;
            document.getElementById(`room-${room}`).style.display = 'block';
            socket.emit('joinRoom', room);
            appendChat(`[SYSTEM] Joined ${room.toUpperCase()}`, true);
        }

        // --- CHAT SYSTEM (SPAM PROOF) ---
        function sendChat() {
            let i = document.getElementById('chat-input');
            if(!i.value.trim()) return;
            socket.emit('sendChat', { msg: i.value });
            appendChat(`<span class="user">${myUsername}:</span> ${i.value}`, false);
            i.value = '';
        }

        socket.on('chatMessage', data => {
            appendChat(`<span class="user" style="color:${data.sys?'var(--danger)':'white'};">${data.user}:</span> ${data.text}`, data.sys);
        });

        function appendChat(html, isSys) {
            let box = document.getElementById('chat-box');
            let div = document.createElement('div');
            div.className = isSys ? 'sys-msg' : 'chat-msg';
            if(isSys && html.includes('OPEN')) div.classList.add('open');
            div.innerHTML = html;
            box.appendChild(div);
            // Limit to 50 max to prevent lag
            if(box.children.length > 50) box.removeChild(box.firstChild);
            box.scrollTop = box.scrollHeight; // Auto-scroll
        }

        // --- SHARED TABLES (BACCARAT) ---
        function placeBet(room, choice) {
            socket.emit('placeSharedBet', { room, choice, amount: currentChip });
        }
        function undoBet() {
            if(activeRoom && activeRoom !== 'blackjack' && activeRoom !== 'mbj') {
                socket.emit('undoSharedBet', { room: activeRoom });
            }
        }

        socket.on('sharedBetConfirmed', data => {
            let el = document.getElementById(`bet-${data.room}-${data.choice}`);
            if(el) {
                let current = parseInt(el.innerText) || 0;
                el.innerText = `${current + data.amount} TC`;
            }
            document.getElementById('ui-tc').innerText = data.newBalance.credits;
            document.getElementById('ui-ptc').innerText = data.newBalance.playable;
        });

        socket.on('undoSuccess', data => {
            let el = document.getElementById(`bet-${activeRoom}-${data.choice}`);
            if(el) el.innerText = `0 TC`;
            document.getElementById('ui-tc').innerText = data.newBalance.credits;
            document.getElementById('ui-ptc').innerText = data.newBalance.playable;
        });

        socket.on('timerUpdate', time => {
            let t = document.getElementById(`timer-${activeRoom}`);
            if(t) {
                t.innerText = `${time}s`;
                t.style.color = time <= 5 ? 'var(--danger)' : 'var(--success)';
            }
        });

        // Visual Locks
        socket.on('lockBets', () => {
            let lock = document.getElementById(`lock-${activeRoom}`);
            if(lock) lock.classList.add('active');
            let board = document.getElementById(`room-${activeRoom}`);
            if(board) board.classList.add('flash-red');
            setTimeout(() => { if(board) board.classList.remove('flash-red'); }, 500);
            appendChat(`[SYSTEM] BETS ARE CLOSED FOR ${activeRoom.toUpperCase()}`, true);
        });

        socket.on('sharedResults', data => {
            let resText = document.getElementById(`res-${data.room}`);
            if(resText) resText.innerText = data.resStr;
            
            if(data.room === 'baccarat') {
                let html = `<div><div style="color:var(--ps-glow); font-weight:900;">PLAYER (${data.pScore})</div>`;
                data.pCards.forEach(c => html += formatCard(c));
                html += `</div><div><div style="color:var(--danger); font-weight:900;">BANKER (${data.bScore})</div>`;
                data.bCards.forEach(c => html += formatCard(c));
                html += `</div>`;
                document.getElementById('cards-baccarat').innerHTML = html;
            }
        });

        socket.on('newRound', () => {
            let lock = document.getElementById(`lock-${activeRoom}`);
            if(lock) lock.classList.remove('active');
            
            // Clear board
            document.querySelectorAll('.tile-bet').forEach(e => e.innerText = '0 TC');
            if(activeRoom === 'baccarat') document.getElementById('cards-baccarat').innerHTML = '';
            
            appendChat(`[SYSTEM] BETS ARE OPEN FOR ${activeRoom.toUpperCase()}`, true);
            let board = document.getElementById(`room-${activeRoom}`);
            if(board) {
                board.style.borderColor = 'var(--ps-glow)';
                board.style.boxShadow = '0 0 20px rgba(0,162,255,0.3)';
                setTimeout(() => { board.style.borderColor = 'var(--glass-border)'; board.style.boxShadow = 'none'; }, 1000);
            }
        });

        // --- SOLO BLACKJACK FIXED RENDER ---
        function playSoloBJ(action) {
            socket.emit('playSolo', { game: 'blackjack', action: action, bet: currentChip });
        }

        socket.on('bjUpdate', data => {
            let pDiv = document.getElementById('bj-player-cards');
            let dDiv = document.getElementById('bj-dealer-cards');
            let res = document.getElementById('bj-result');
            
            pDiv.innerHTML = ''; dDiv.innerHTML = '';
            
            if(data.pHand) data.pHand.forEach(c => pDiv.innerHTML += formatCard(c));
            if(data.dHand) {
                if(data.event === 'deal' || data.event === 'hit') {
                    // Hide dealer second card during active play
                    dDiv.innerHTML += formatCard(data.dHand[0]);
                    dDiv.innerHTML += `<div class="card card-black" style="background:#222; color:white;">?</div>`;
                } else {
                    data.dHand.forEach(c => dDiv.innerHTML += formatCard(c));
                }
            }

            let sBtn = document.getElementById('btn-bj-start');
            let hBtn = document.getElementById('btn-bj-hit');
            let stBtn = document.getElementById('btn-bj-stand');
            let dBtn = document.getElementById('btn-bj-double');

            if(data.event === 'deal' || data.event === 'hit') {
                res.innerText = `HAND ACTIVE - BET: ${data.bet || currentChip} TC`;
                sBtn.style.display = 'none';
                hBtn.style.display = 'block'; stBtn.style.display = 'block'; dBtn.style.display = 'block';
            } 
            if(data.event === 'resolved' || data.naturalBJ) {
                res.innerText = `${data.resStr} - PAYOUT: ${data.payout} TC`;
                if(data.newBalance) {
                    document.getElementById('ui-tc').innerText = data.newBalance.credits;
                    document.getElementById('ui-ptc').innerText = data.newBalance.playable;
                }
                sBtn.style.display = 'block'; sBtn.innerText = 'PLAY AGAIN';
                hBtn.style.display = 'none'; stBtn.style.display = 'none'; dBtn.style.display = 'none';
            }
        });

        socket.on('localGameError', data => alert(data.msg));

    </script>
</body>
</html>
