<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENA COMMAND - ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #121216; --bg-panel: #1e1e24; --accent: #feca57; --success: #2ecc71; --danger: #ff4757; }
        * { box-sizing: border-box; font-family: 'Press Start 2P', cursive; color: #fff; }
        body { background: var(--bg-dark); height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
        .neon-box { background: var(--bg-panel); border: 2px solid var(--accent); padding: 30px; text-align: center; width: 100%; max-width: 900px; }
        .input-retro { background: #000; border: 2px solid #555; padding: 15px; margin: 10px 0; width: 100%; font-size: 12px; }
        .btn-retro { background: var(--accent); color: #000; border: none; padding: 15px; cursor: pointer; width: 100%; margin-top: 10px; }
        .dashboard { display: none; width: 100%; height: 100%; padding: 20px; gap: 20px; flex-direction: row; align-items: flex-start; }
        table { width: 100%; border-collapse: collapse; font-family: 'Rajdhani', sans-serif; font-size: 18px; text-align: left; margin-top: 20px;}
        th, td { border: 1px solid #444; padding: 12px; } th { background: #222; color: var(--accent); font-size: 10px; font-family: 'Press Start 2P'; }
    </style>
</head>
<body>

<div id="loginScreen" class="neon-box" style="max-width: 400px; border-color: var(--danger);">
    <h1 style="color: var(--danger); margin-bottom: 20px; font-size: 20px;">RESTRICTED</h1>
    <input type="text" id="adminUser" class="input-retro" placeholder="ADMIN USERNAME">
    <input type="password" id="adminPass" class="input-retro" placeholder="PASSWORD">
    <button class="btn-retro" style="background: var(--danger); color: #fff;" onclick="loginAdmin()">AUTHORIZE</button>
    <div id="loginErr" style="color: var(--danger); font-size: 10px; margin-top: 15px;"></div>
</div>

<div id="dashboardScreen" class="dashboard">
    <div class="neon-box" style="flex-grow: 1; text-align: left;">
        <h2 style="color: var(--success); margin-bottom: 10px;">PENDING BANK TRANSACTIONS</h2>
        <table>
            <thead><tr><th>PLAYER</th><th>TYPE</th><th>AMOUNT</th><th>ACTIONS</th></tr></thead>
            <tbody id="bankQueue"><tr><td colspan="4" style="text-align:center; color:#666;">Waiting...</td></tr></tbody>
        </table>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    function loginAdmin() {
        socket.emit('auth-attempt', { username: document.getElementById('adminUser').value, password: document.getElementById('adminPass').value });
    }

    socket.on('auth-error', msg => document.getElementById('loginErr').innerText = msg);
    socket.on('auth-success', data => {
        if(data.role !== 'admin') { document.getElementById('loginErr').innerText = 'ACCESS DENIED: NOT ADMIN.'; return; }
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'flex';
        document.body.style.alignItems = 'flex-start';
        socket.emit('admin-fetch-bank-queue');
    });

    socket.on('admin-bank-queue-update', (requests) => {
        const queue = document.getElementById('bankQueue'); queue.innerHTML = '';
        if(requests.length === 0) return queue.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#666;">No pending requests.</td></tr>`;
        requests.forEach(req => {
            queue.innerHTML += `<tr>
                <td style="font-weight:bold;">${req.username}</td>
                <td style="color: ${req.type==='deposit'?'var(--success)':'var(--danger)'};">${req.type.toUpperCase()}</td>
                <td style="color: var(--accent);">${req.amount} TC</td>
                <td>
                    <button style="background:var(--success); color:#000; padding:5px; cursor:pointer;" onclick="process('${req._id}', 'approve')">APPROVE</button>
                    <button style="background:var(--danger); color:#fff; padding:5px; cursor:pointer;" onclick="process('${req._id}', 'deny')">DENY</button>
                </td>
            </tr>`;
        });
    });

    function process(id, action) { socket.emit('admin-process-bank', { requestId: id, action }); }
</script>
</body>
</html>
